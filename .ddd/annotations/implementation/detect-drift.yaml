patterns:
  - id: iJ9cN0fF
    type: custom
    description: >
      SyncState vocabulary: the code uses 'synced' (not 'in_sync') as the
      in-sync state value. The flow-mapping schema spec says
      values: [in_sync, spec_ahead, code_ahead, diverged] but the TypeScript
      type is 'synced' | 'spec_ahead' | 'code_ahead' | 'diverged' and the
      implementation writes 'synced' to mapping entries. Any mapping.yaml
      file with 'in_sync' will trigger the code to overwrite it with 'synced'.
      The detect-drift flow spec doesn't capture this implementation vocabulary.
    applies_to_nodes: [process-classifyDrift, process-updateMapping]
    code_evidence:
      file: src/stores/implementation-store.ts
      lines: "207-210"
      snippet: >
        if (mapping.syncState !== 'synced') {
          const updatedMapping = { ...mapping, syncState: 'synced' as const };
          set((s) => ({ mappings: { ...s.mappings, [flowKey]: updatedMapping } }));
        }
    status: promoted

  - id: kL1dO2gG
    type: custom
    description: >
      Bidirectional drift detection sequence: (1) compute forward hash
      (spec file changed?); (2) compute reverse hash for each file in
      fileHashes (code changed?); (3) if BOTH changed → 'diverged' (new_logic);
      if only spec → 'spec_ahead'; if only code → 'code_ahead' (driftType: code_ahead);
      if neither → 'synced'. The spec describes this at a high level but
      doesn't capture the 4-way classification or that 'diverged' maps to
      driftType 'new_logic' in DriftInfo.
    applies_to_nodes: [process-classifyDrift]
    code_evidence:
      file: src/stores/implementation-store.ts
      lines: "157-215"
      snippet: >
        if (hasForwardDrift && hasReverseDrift) {
          driftItems.push({ ..., driftType: 'new_logic' });
        } else if (hasForwardDrift) {
          // spec_ahead
        } else if (hasReverseDrift) {
          driftItems.push({ ..., driftType: 'code_ahead' });
        } else { syncState: 'synced' }
    status: promoted
