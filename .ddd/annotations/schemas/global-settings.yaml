  - id: eF7nY4pL
    type: custom
    description: >
      Storage paths not captured in schema. Settings are stored at
      {homeDir}/.ddd-tool/settings.json and recent projects at
      {homeDir}/.ddd-tool/recent-projects.json. The home directory is resolved
      via the window.__HOME_DIR__ global (injected on boot). On settings load,
      the code deep-merges with DEFAULT_SETTINGS: { ...DEFAULT_SETTINGS, ...loaded }
      — loaded values override defaults but missing keys fall back to defaults.
