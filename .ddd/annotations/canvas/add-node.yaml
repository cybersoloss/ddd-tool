patterns:
  - id: undo-push
    type: store_interaction
    description: >
      Every addNode call pushes a snapshot to the per-flow undo stack before
      modifying state. The snapshot captures the entire FlowDocument via
      JSON deep clone. The undo push is registered lazily via
      registerUndoPush() to avoid circular imports between flow-store and
      undo-store. The same undo integration applies to moveNode, deleteNode,
      addConnection, removeConnection, updateNodeSpec, updateNodeLabel,
      reparentNode, and autoLayout.
    applies_to_nodes: [all-nodes]
    code_evidence:
      file: src/stores/flow-store.ts
      lines: "49-62, 285"
    status: candidate

  - id: dbnc-save
    type: timing
    description: >
      Node changes trigger a 500ms debounced YAML write via debouncedSave().
      Each mutation (addNode, moveNode, deleteNode, etc.) calls debouncedSave()
      which clears any pending timer and sets a new 500ms timeout. The save
      writes to specs/domains/{domainId}/flows/{flowId}.yaml and updates the
      metadata.modified timestamp. Auto-save can be disabled via settings
      (registerAutoSaveEnabledGetter).
    applies_to_nodes: [all-nodes]
    code_evidence:
      file: src/stores/flow-store.ts
      lines: "151-162"
    status: candidate

  - id: skip-flag
    type: implementation_detail
    description: >
      A module-level _skipUndo boolean flag prevents undo push during
      restore operations. When undo-store calls restoreFlow(), it sets
      _skipUndo=true before restoring and _skipUndo=false after. This
      prevents the restore from creating a new undo entry, which would
      cause an infinite loop. The flag is exported via setSkipUndo() and
      getSkipUndo() for the undo-store to use.
    applies_to_nodes: [all-nodes]
    code_evidence:
      file: src/stores/flow-store.ts
      lines: "17-19"
    status: candidate

  - id: node-ids
    type: implementation_detail
    description: >
      Node IDs are generated as "{type}-{nanoid(8)}" (e.g., "process-x3k9m2a1").
      The 8-character nanoid suffix provides ~2.8 trillion unique values per
      node type, making collisions effectively impossible within a single flow.
    applies_to_nodes: [all-nodes]
    code_evidence:
      file: src/stores/flow-store.ts
      lines: "288"
    status: candidate

  - id: writ-mark
    type: store_interaction
    description: >
      Every file write from the flow store calls markWriting() from
      write-guard.ts before invoking the Tauri write_file command. This
      sets a 2-second guard window so the file watcher won't trigger a
      self-reload when it detects the file we just wrote.
    applies_to_nodes: [all-nodes]
    code_evidence:
      file: src/stores/flow-store.ts
      lines: "132-133"
    status: candidate
