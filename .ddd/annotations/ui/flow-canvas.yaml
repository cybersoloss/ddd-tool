patterns:
  - id: iJ1pA7rN
    type: custom
    description: >
      Auto-save timer: when a flow loads, an interval timer starts that writes
      the current flow state to .ddd/autosave/{flowId}.yaml at the interval
      set in settings (default 30s, configurable via editor.autoSaveInterval).
      The autosave file is deleted on clean unload (cleanupAutoSave).
      This is separate from the 500ms debounced spec save — autosave is a
      crash-recovery backup, not the real save. The page spec does not capture
      this autosave lifecycle (start on load, stop and delete on unload).
    applies_to_sections: [canvas]
    code_evidence:
      file: src/stores/flow-store.ts
      lines: "175-207"
      snippet: >
        function startAutoSave(_projectPath: string, flowId: string) {
          autoSaveTimer = setInterval(async () => {
            await invoke('write_file', {
              path: getAutoSavePath(state.projectPath, flowId),
              contents: stringify(state.currentFlow),
            });
          }, intervalSec * 1000);
        }
    status: promoted

  - id: kL3qB8sO
    type: custom
    description: >
      Flush-on-unload: when navigating away from the flow canvas (unloadFlow),
      any pending 500ms debounced save is flushed immediately before state is
      cleared. This prevents losing edits when the user navigates quickly.
      The spec's save-flow flow doesn't capture this flush-on-unload guarantee.
    applies_to_sections: [canvas, flow-toolbar]
    code_evidence:
      file: src/stores/flow-store.ts
      lines: "249-265"
      snippet: >
        if (saveTimer) {
          clearTimeout(saveTimer);
          saveTimer = null;
          if (currentFlow?.flow && domainId && projectPath) {
            void performSave(currentFlow, domainId, projectPath);
          }
        }
    status: promoted

  - id: mN5rC9tP
    type: state_management
    description: >
      Lazy undo registration pattern: flow-store registers undo callbacks
      (registerUndoPush, registerUndoClear) lazily via module-level variables
      to avoid circular imports between flow-store and undo-store.
      A _skipUndo flag prevents undo loops when undo-store restores state.
      The page spec's state section does not capture this lazy-binding pattern.
    applies_to_sections: [canvas]
    code_evidence:
      file: src/stores/flow-store.ts
      lines: "49-62"
      snippet: >
        let _pushSnapshotFn: ((flowId: string, description: string) => void) | null = null;
        export function registerUndoPush(fn: ...) { _pushSnapshotFn = fn; }
        let _skipUndo = false;
        export function setSkipUndo(v: boolean) { _skipUndo = v; }
    status: promoted
