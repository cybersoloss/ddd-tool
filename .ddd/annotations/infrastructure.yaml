patterns:
  - id: log-rotat
    type: configuration
    description: >
      Log rotation is implemented in the append_log Tauri command. When a log
      file exceeds max_bytes, files are rotated (current -> .1, .1 -> .2, etc.)
      up to max_files rotated copies. The caller passes max_bytes and max_files
      as parameters; the typical invocation uses 1MB (1048576) per file and 3
      rotated files.
    applies_to_services: [file-system]
    code_evidence:
      file: src-tauri/src/commands/file.rs
      lines: "55-93"
    status: candidate

  - id: watch-ext
    type: filtering
    description: >
      The file watcher (notify crate, RecursiveMode::Recursive) only emits
      spec-files-changed events for files ending in .yaml, .yml, or .json.
      All other file changes (e.g., .ts, .rs, .lock) are silently filtered
      out at the Rust level before reaching the frontend. Events are emitted
      for Create, Modify, and Remove event kinds.
    applies_to_services: [file-watcher]
    code_evidence:
      file: src-tauri/src/commands/file.rs
      lines: "135-151"
    status: candidate

  - id: git-ident
    type: hardcoded_value
    description: >
      Git commits created by the DDD Tool use a hardcoded identity:
      name="DDD Tool", email="ddd-tool@local". This is set via
      git2::Signature::now() in the git_commit Tauri command. The user's
      system git config (user.name / user.email) is NOT used. This is
      intentional — DDD Tool commits are machine-generated and should be
      distinguishable from the developer's manual commits.
    applies_to_services: [git]
    code_evidence:
      file: src-tauri/src/commands/project.rs
      lines: "38-39"
    status: candidate

  - id: writ-gard
    type: timing
    description: >
      The write guard prevents self-triggered reloads by setting a 2-second
      window (writeGuardUntil = Date.now() + 2000) after any file write
      from the tool. When the file watcher fires a spec-files-changed event,
      isOwnWrite() returns true if we are still within the 2s window,
      causing the reload handler to skip processing. This is a timestamp-
      based approach (no counter/lock) — simple but effective for the
      single-threaded JS event loop.
    applies_to_services: [file-watcher]
    code_evidence:
      file: src/stores/write-guard.ts
      lines: "10-18"
    status: candidate

  - id: ext-debou
    type: timing
    description: >
      External file change events from the watcher are debounced with a
      1-second (1000ms) timer in AppShell.tsx before triggering project
      reload or flow reload. This coalesces rapid file-system events
      (e.g., from git checkout or batch saves) into a single reload.
    applies_to_services: [file-watcher]
    code_evidence:
      file: src/AppShell.tsx
      lines: "126-129"
    status: candidate
