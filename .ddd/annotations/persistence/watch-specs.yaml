patterns:
  - id: ntfy-crat
    type: implementation_detail
    description: >
      File watching uses the notify crate (Rust) with RecursiveMode::Recursive
      on the project's specs/ directory. The watcher runs in a dedicated OS
      thread (std::thread::spawn) with a blocking mpsc channel. This thread
      lives for the entire lifetime of the watched project.
    applies_to_nodes: [all-nodes]
    code_evidence:
      file: src-tauri/src/commands/file.rs
      lines: "116-162"
    status: candidate

  - id: ext-filtr
    type: filtering
    description: >
      Only .yaml, .yml, and .json file changes are emitted to the frontend.
      The filter is applied at the Rust level (file.rs lines 143-147) so
      that TypeScript, CSS, and other file changes never reach the React
      event listener. Only Create, Modify, and Remove event kinds are
      processed — Rename and other kinds are ignored.
    applies_to_nodes: [all-nodes]
    code_evidence:
      file: src-tauri/src/commands/file.rs
      lines: "135-151"
    status: candidate

  - id: writ-gard
    type: timing
    description: >
      The write guard pattern uses a timestamp-based approach: markWriting()
      sets writeGuardUntil = Date.now() + 2000 (2 seconds). When the file
      watcher event arrives, isOwnWrite() checks if we are still within
      that 2-second window. If so, the entire spec-files-changed event
      is skipped. This prevents the tool from reloading files it just wrote.
    applies_to_nodes: [all-nodes]
    code_evidence:
      file: src/stores/write-guard.ts
      lines: "10-18"
    status: candidate

  - id: chng-debv
    type: timing
    description: >
      External file change events that pass the write guard are debounced
      with a 1-second timer in AppShell.tsx. Changes are classified into
      3 categories: flow YAML changes (reload current flow if affected),
      domain/project changes (full project reload), and specs changes
      (reload schemas/UI/infra via specs-store). A green "Synced" flash
      appears in the breadcrumb bar after successful reload.
    applies_to_nodes: [all-nodes]
    code_evidence:
      file: src/AppShell.tsx
      lines: "23-60, 123-129"
    status: candidate
