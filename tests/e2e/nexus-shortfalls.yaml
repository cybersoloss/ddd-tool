      severity: low
      limitation: "No built-in support for message reactions, thread replies, or rich message attachments (images, cards) within the chat interface"
      suggestion: "Add message_features: { reactions, threads, attachments } to chat-interface spec"
      pages_affected:
        - "editorial-queue"

  form_limitations:
