required:
  - name: DATABASE_URL
    type: string
    description: PostgreSQL connection string
    example: "postgresql://user:pass@localhost:5432/nexus"
    sensitive: true
  - name: REDIS_URL
    type: string
    description: Redis connection string
    example: "redis://localhost:6379"
    sensitive: false
  - name: JWT_SECRET
    type: string
    description: Secret key for JWT signing
    sensitive: true
  - name: ANTHROPIC_API_KEY
    type: string
    description: Anthropic API key for AI processing
    sensitive: true
  - name: OPENAI_API_KEY
    type: string
    description: OpenAI API key (secondary AI provider)
    sensitive: true
  - name: TWITTER_BEARER_TOKEN
    type: string
    description: Twitter API v2 bearer token
    sensitive: true
  - name: TWITTER_API_KEY
    type: string
    description: Twitter OAuth 1.0a consumer key
    sensitive: true
  - name: TWITTER_API_SECRET
    type: string
    description: Twitter OAuth 1.0a consumer secret
    sensitive: true
  - name: TWITTER_ACCESS_TOKEN
    type: string
    description: Twitter OAuth 1.0a access token
    sensitive: true
  - name: TWITTER_ACCESS_TOKEN_SECRET
    type: string
    description: Twitter OAuth 1.0a access token secret
    sensitive: true
  - name: SENDGRID_API_KEY
    type: string
    description: SendGrid API key for email delivery
    sensitive: true
  - name: GOOGLE_CSE_API_KEY
    type: string
    description: Google Custom Search API key
    sensitive: true
  - name: GOOGLE_CSE_ID
    type: string
    description: Google Custom Search engine ID
  - name: STRIPE_SECRET_KEY
    type: string
    description: Stripe secret key for billing
    sensitive: true

optional:
  - name: PORT
    type: number
    default: 3001
    description: Backend API server port
  - name: FRONTEND_PORT
    type: number
    default: 3000
    description: Frontend server port
  - name: LOG_LEVEL
    type: string
    default: "info"
    description: "Logging level (debug, info, warn, error)"
  - name: CORS_ORIGINS
    type: string
    default: "*"
    description: Comma-separated allowed CORS origins
  - name: RATE_LIMIT_RPM
    type: number
    default: 60
    description: Requests per minute per IP
  - name: WEBHOOK_SECRET
    type: string
    description: HMAC secret for webhook signature verification
    sensitive: true
  - name: NODE_ENV
    type: string
    default: "development"
    description: Node environment
