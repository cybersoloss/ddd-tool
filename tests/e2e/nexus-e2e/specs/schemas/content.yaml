name: Content
inherits: _base
description: Core content entity — ingested from external sources, analyzed by AI, reviewed by editors, and published to channels
owned_by: content

fields:
  - name: title
    type: string
    required: true
    max_length: 500
    description: Content headline or title

  - name: body
    type: text
    required: true
    description: Full content body text

  - name: summary
    type: text
    required: false
    description: AI-generated or manually written summary

  - name: category
    type: enum
    ref: ContentCategory
    required: false
    description: AI-assigned classification category

  - name: status
    type: enum
    ref: ContentStatus
    required: true
    default: draft
    description: Current lifecycle status

  - name: quality_score
    type: decimal
    required: false
    min: 0.0
    max: 1.0
    description: AI quality score (0.0 low — 1.0 high)

  - name: bias_score
    type: decimal
    required: false
    min: 0.0
    max: 1.0
    description: AI bias detection score (0.0 neutral — 1.0 highly biased)

  - name: source_type
    type: string
    required: true
    description: Origin source type (rss, web, csv, webhook, social, filesystem)

  - name: source_id
    type: string
    required: false
    description: External source item identifier for deduplication

  - name: metadata
    type: json
    required: false
    description: Additional source-specific metadata (tags, author, original URL, etc.)

  - name: deleted_at
    type: date
    required: false
    description: Soft delete timestamp — null means active

relationships:
  - type: has_many
    model: ContentVersion
    foreign_key: content_id
    description: Version history snapshots

  - type: has_many
    model: ContentRejection
    foreign_key: content_id
    description: Rejection records with reasons

  - type: belongs_to
    model: ContentSource
    foreign_key: source_id
    as: source
    description: The ingestion source this content came from

  - type: many_to_many
    model: Channel
    through: content_channels
    as: channels
    description: Channels this content has been published to

indexes:
  - fields: [title]
    type: gin
    description: Full-text search index on content title

  - fields: [status, created_at]
    type: btree
    description: Filter by status with date ordering — most common query pattern

  - fields: [source_type, source_id]
    unique: true
    type: btree
    description: Deduplication index — prevents ingesting the same external item twice

transitions:
  field: status
  states:
    - from: draft
      to: [review]
    - from: review
      to: [approved, rejected]
    - from: approved
      to: [published]
    - from: published
      to: [archived]
    - from: rejected
      to: [draft]
  on_invalid: error

