name: Role
inherits: _base
description: User role defining permission sets for access control
owned_by: users

fields:
  - name: name
    type: string
    required: true
    unique: true
    description: Role identifier (admin, editor, reviewer, viewer)

  - name: permissions
    type: json
    required: true
    description: Permission set — map of resource:action pairs (e.g. { "content:approve": true, "users:admin": false })

indexes:
  - fields: [name]
    unique: true
    type: btree
    description: Role name uniqueness and lookup

