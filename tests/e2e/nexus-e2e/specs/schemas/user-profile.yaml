name: UserProfile
description: Extended user profile information
inherits: _base
fields:
  - name: user_id
    type: uuid
    required: true
    constraints:
      unique: true
  - name: display_name
    type: string
    required: false
    constraints:
      max_length: 100
  - name: avatar_url
    type: string
    required: false
  - name: bio
    type: text
    required: false
  - name: timezone
    type: string
    required: false

relationships:
  - name: user
    type: belongs_to
    target: User
    foreign_key: user_id

indexes:
  - fields: [user_id]
    unique: true

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
