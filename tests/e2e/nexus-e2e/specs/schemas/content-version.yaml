name: ContentVersion
inherits: _base
description: Immutable snapshot of content body at a point in time — builds the version history
owned_by: content

fields:
  - name: content_id
    type: uuid
    required: true
    description: Foreign key to the parent content item

  - name: body_snapshot
    type: text
    required: true
    description: Full body text at the time of this version

  - name: changed_by
    type: uuid
    required: true
    description: Foreign key to the user who made this change

  - name: change_summary
    type: string
    required: false
    max_length: 500
    description: Optional human-readable description of what changed

  - name: changed_at
    type: date
    required: true
    description: Exact timestamp when this version was captured

relationships:
  - type: belongs_to
    model: Content
    foreign_key: content_id
    description: The content item this version belongs to

  - type: belongs_to
    model: User
    foreign_key: changed_by
    as: editor
    description: The user who created this version

indexes:
  - fields: [content_id, changed_at]
    type: btree
    description: Chronological version history for a content item

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
