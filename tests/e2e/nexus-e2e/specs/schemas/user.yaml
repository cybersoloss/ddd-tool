name: User
inherits: _base
description: Platform user account with authentication credentials, role, and subscription plan
owned_by: users

fields:
  - name: email
    type: string
    required: true
    unique: true
    format: email
    description: User email address — used for login and notifications

  - name: password_hash
    type: string
    required: true
    description: bcrypt hash of the user's password (rounds 12)

  - name: role_id
    type: uuid
    required: true
    description: Foreign key to the user's assigned role

  - name: api_key_hash
    type: string
    required: false
    description: SHA-256 hash of the user's primary API key (for fast lookup)

  - name: plan
    type: enum
    ref: UserPlan
    required: true
    default: free
    description: User subscription tier

  - name: deleted_at
    type: date
    required: false
    description: Soft delete timestamp — null means active account

relationships:
  - type: belongs_to
    model: Role
    foreign_key: role_id
    description: The role controlling this user's permissions

  - type: has_many
    model: ApiKey
    foreign_key: user_id
    description: All API keys issued to this user

  - type: has_many
    model: Notification
    foreign_key: user_id
    description: In-app notifications for this user

  - type: has_one
    model: UserProfile
    foreign_key: user_id
    description: Extended profile information

indexes:
  - fields: [email]
    unique: true
    type: btree
    description: Login lookup and uniqueness enforcement

  - fields: [role_id]
    type: btree
    description: List users by role

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
