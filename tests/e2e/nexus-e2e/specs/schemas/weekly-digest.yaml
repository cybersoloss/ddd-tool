name: WeeklyDigest
inherits: _base
description: Aggregated weekly analytics digest — generated every Monday, stored for historical reporting
owned_by: analytics

fields:
  - name: period_start
    type: date
    required: true
    description: Start of the digest period (Monday 00:00:00 UTC)

  - name: period_end
    type: date
    required: true
    description: End of the digest period (Sunday 23:59:59 UTC)

  - name: stats
    type: json
    required: true
    description: Aggregated statistics for the period (ingested, processed, approved, rejected, published counts; top categories; top sources)

  - name: generated_at
    type: date
    required: true
    description: Timestamp when this digest was computed

indexes:
  - fields: [period_start]
    unique: true
    type: btree
    description: One digest per week, lookup by week start

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
