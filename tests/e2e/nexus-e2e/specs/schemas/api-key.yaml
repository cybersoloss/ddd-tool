name: ApiKey
description: User API access keys
inherits: _base
fields:
  - name: user_id
    type: uuid
    required: true
  - name: key_hash
    type: string
    required: true
    encrypted: true
  - name: name
    type: string
    required: true
    constraints:
      max_length: 100
  - name: last_used_at
    type: datetime
    required: false
  - name: expires_at
    type: datetime
    required: false

relationships:
  - name: user
    type: belongs_to
    target: User
    foreign_key: user_id

indexes:
  - fields: [user_id]
    type: btree
  - fields: [expires_at]
    type: btree

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
