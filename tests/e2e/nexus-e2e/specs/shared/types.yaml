enums:
  ContentCategory:
    values: [news, opinion, research, other]
    description: AI classification category for content items

  ContentStatus:
    values: [draft, review, approved, rejected, published, archived]
    description: Content lifecycle state — drives editorial workflow

  UserPlan:
    values: [free, pro, enterprise]
    description: User subscription and feature tier

  SourceType:
    values: [rss, web, csv, webhook, social, filesystem]
    description: Content acquisition source type

  ChannelType:
    values: [website, twitter, linkedin, newsletter, webhook]
    description: Publishing destination channel type

  PublishStatus:
    values: [pending, success, failed]
    description: Status of a single publication attempt

  ScheduleStatus:
    values: [pending, executed, cancelled]
    description: Status of a scheduled publication job

  RuleType:
    values: [ingestion, routing, publishing]
    description: Category of content routing/filtering rule

  NotificationEventType:
    values:
      - content_approved
      - content_rejected
      - content_published
      - alert_triggered
      - user_registered
      - settings_changed
      - publish_failed
    description: Events that can trigger user notifications

  DigestFrequency:
    values: [realtime, hourly, daily, weekly]
    description: How often notification digests are batched and sent

  AnomalyType:
    values: [spike, drop, flatline, error_rate]
    description: Type of metric anomaly detected by the monitoring system

  ReviewAction:
    values: [approve, reject, escalate, defer]
    description: Editorial reviewer action options in the human gate

  ApiKeyScope:
    values:
      - "read:content"
      - "write:content"
      - "read:analytics"
      - "admin:users"
      - "admin:settings"
    description: Permission scopes assignable to API keys

value_objects:
  Pagination:
    description: Cursor-based pagination parameters
    fields:
      cursor: "string | null"
      limit: number
      direction: "asc | desc"
    default:
      limit: 20
      direction: desc

  DateRange:
    description: Inclusive date interval for filtering
    fields:
      start: date
      end: date

  ContentMetrics:
    description: Aggregated stats for a content item or batch
    fields:
      ingested_count: number
      processed_count: number
      approved_count: number
      rejected_count: number
      published_count: number

  ServiceHealth:
    description: Health status of a single infrastructure service
    fields:
      service_id: string
      status: "healthy | degraded | down"
      latency_ms: number
      checked_at: date

