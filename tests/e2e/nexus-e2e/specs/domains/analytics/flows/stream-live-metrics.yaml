flow:
  id: stream-live-metrics
  name: "Stream Live Metrics"
  type: traditional
  domain: analytics
  description: "WebSocket endpoint that streams live ingestion rate, processing queue depth, and publish throughput to connected dashboard clients."
  auth:
    required: true
    strategy: jwt

trigger:
  id: trigger-wsLM2xN8
  type: trigger
  label: "ws /api/analytics/live"
  spec:
    event: "ws /api/analytics/live"
    connection_config:
      auth_required: true
      auth_strategy: jwt
      heartbeat_ms: 30000
      max_connections_per_client: 2
      reconnect: true
  connections:
    - targetNodeId: cache-rdMetrics5

nodes:
  - id: cache-rdMetrics5
    type: cache
    label: "Read Cached Metrics"
    spec:
      operation: check
      key: "live-metrics:current"
      store: redis
    connections:
      - targetNodeId: websocket_broadcast-push6
        sourceHandle: hit
      - targetNodeId: data_store-compMetrics7
        sourceHandle: miss

  - id: data_store-compMetrics7
    type: data_store
    label: "Compute Live Metrics"
    spec:
      operation: aggregate
      model: AnalyticsEvent
      query:
        where:
          occurred_at:
            gte: "$.oneHourAgo()"
      aggregate_fields:
        - function: count
          field: id
          alias: event_count
      group_by: [event_type]
      returning: true
    connections:
      - targetNodeId: websocket_broadcast-push6
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: websocket_broadcast-push6
    type: websocket_broadcast
    label: "Stream Metrics to Client"
    spec:
      channel: "analytics-live"
      event_name: metrics_update
      payload:
        event_count: "$.result.event_count || $.cached_value.event_count"
        timestamp: "$.now()"
      include_sender: false
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Streaming"
    spec:
      outcome: success
      status: 200
      response_type: websocket
      body:
        message: "Live metrics stream established"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

