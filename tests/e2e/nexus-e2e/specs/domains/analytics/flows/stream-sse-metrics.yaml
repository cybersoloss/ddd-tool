flow:
  id: stream-sse-metrics
  name: "Stream SSE Metrics"
  type: traditional
  domain: analytics
  description: "Server-Sent Events endpoint that pushes periodic metric snapshots every 10 seconds. For clients that cannot maintain WebSocket connections."
  auth:
    required: true
    strategy: jwt

trigger:
  id: trigger-sseMt2xN8
  type: trigger
  label: "sse /api/analytics/stream"
  spec:
    event: "sse /api/analytics/stream"
    rate_limit:
      window_ms: 60000
      max_requests: 10
  connections:
    - targetNodeId: delay-init3

nodes:
  - id: delay-init3
    type: delay
    label: "Initial Delay"
    spec:
      min_ms: 1000
    connections:
      - targetNodeId: data_store-metrics5

  - id: data_store-metrics5
    type: data_store
    label: "Fetch Metric Snapshot"
    spec:
      operation: aggregate
      model: AnalyticsEvent
      query:
        where:
          occurred_at:
            gte: "$.oneHourAgo()"
      aggregate_fields:
        - function: count
          field: id
          alias: total
      group_by: [event_type]
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "SSE Stream"
    spec:
      outcome: success
      status: 200
      response_type: sse
      body: "$.result"
      headers:
        Content-Type: "text/event-stream"
        Cache-Control: "no-cache"
        Connection: "keep-alive"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
