flow:
  id: detect-anomaly
  name: "Detect Anomaly"
  type: traditional
  domain: analytics
  description: "Scheduled job that computes rolling 7-day baseline metrics and compares to last 1-hour actuals. Emits AnomalyDetected events for metrics exceeding threshold."
  auth:
    required: false

trigger:
  id: trigger-detAn2cN8
  type: trigger
  label: "cron 0 * * * *"
  spec:
    event: "cron 0 * * * *"
    job_config:
      queue: anomaly-detection
      concurrency: 1
      timeout: 30000
  connections:
    - targetNodeId: parallel-metrics4

nodes:
  - id: parallel-metrics4
    type: parallel
    label: "Compute Baselines"
    spec:
      branches:
        - id: ingestion
          label: "Ingestion Rate"
        - id: publish
          label: "Publish Rate"
        - id: errors
          label: "Error Rate"
    connections:
      - targetNodeId: data_store-ingBaseline5
        sourceHandle: branch-0
      - targetNodeId: data_store-pubBaseline6
        sourceHandle: branch-1
      - targetNodeId: data_store-errBaseline7
        sourceHandle: branch-2
      - targetNodeId: collection-check8
        sourceHandle: done

  - id: data_store-ingBaseline5
    type: data_store
    label: "Ingestion Baseline"
    spec:
      operation: aggregate
      model: AnalyticsEvent
      query:
        where:
          event_type: ContentIngested
          occurred_at:
            gte: "$.sevenDaysAgo()"
      aggregate_fields:
        - function: count
          field: id
          alias: total
      returning: true
    connections:
      - targetNodeId: parallel-metrics4

  - id: data_store-pubBaseline6
    type: data_store
    label: "Publish Baseline"
    spec:
      operation: aggregate
      model: AnalyticsEvent
      query:
        where:
          event_type: ContentPublished
          occurred_at:
            gte: "$.sevenDaysAgo()"
      aggregate_fields:
        - function: count
          field: id
          alias: total
      returning: true
    connections:
      - targetNodeId: parallel-metrics4

  - id: data_store-errBaseline7
    type: data_store
    label: "Error Baseline"
    spec:
      operation: aggregate
      model: AnalyticsEvent
      query:
        where:
          event_type: PublishFailed
          occurred_at:
            gte: "$.sevenDaysAgo()"
      aggregate_fields:
        - function: count
          field: id
          alias: total
      returning: true
    connections:
      - targetNodeId: parallel-metrics4

  - id: collection-check8
    type: collection
    label: "Filter Anomalous Metrics"
    spec:
      operation: filter
      input: "$.branch_results"
      output: anomalies
      predicate: "$.item.current > $.item.baseline_avg * 2 || $.item.current < $.item.baseline_avg * 0.5"
    connections:
      - targetNodeId: loop-emit9nR6s
        sourceHandle: result
      - targetNodeId: terminal-ok-noAnomaly
        sourceHandle: empty

  - id: loop-emit9nR6s
    type: loop
    label: "Emit Anomalies"
    spec:
      collection: "$.anomalies"
      iterator: anomaly
      body_start: event-emit-yF3g
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: body
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: done

  - id: event-emit-yF3g
    type: event
    label: "Emit AnomalyDetected"
    spec:
      direction: emit
      event_name: AnomalyDetected
      payload:
        anomaly_type: "$.anomaly.metric"
        metric: "$.anomaly.metric"
        current_value: "$.anomaly.current"
        baseline_value: "$.anomaly.baseline_avg"
        severity: "$.anomaly.deviation > 3 ? 'critical' : 'high'"
        detected_at: "$.now()"
    connections:
      - targetNodeId: loop-emit9nR6s

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Anomalies Emitted"
    spec:
      outcome: success
      status: 200
      body:
        anomaly_count: "$.anomalies.length"

  - id: terminal-ok-noAnomaly
    type: terminal
    label: "No Anomalies"
    spec:
      outcome: success
      status: 200
      body:
        anomaly_count: 0

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
