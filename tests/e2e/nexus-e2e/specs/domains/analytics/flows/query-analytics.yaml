flow:
  id: query-analytics
  name: "Query Analytics"
  type: traditional
  domain: analytics
  description: "Flexible analytics query supporting aggregations, filters, date ranges, and group-by on the events table. Used by the analytics dashboard."
  auth:
    required: true
    strategy: jwt

trigger:
  id: trigger-qrAn2xN8
  type: trigger
  label: "GET /api/analytics"
  spec:
    event: "HTTP GET /api/analytics"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Query"
    spec:
      fields:
        - name: event_types
          type: array
          required: false
        - name: date_from
          type: string
          required: false
        - name: date_to
          type: string
          required: false
        - name: granularity
          type: string
          required: false
          default: day
          enum: [hour, day, week, month]
        - name: group_by
          type: string
          required: false
        - name: entity_type
          type: string
          required: false
    connections:
      - targetNodeId: cache-chkAn5
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: cache-chkAn5
    type: cache
    label: "Check Analytics Cache"
    spec:
      operation: check
      key: "analytics:$.event_types.join(','):$.date_from:$.date_to:$.granularity"
      store: redis
      ttl_ms: 60000
    connections:
      - targetNodeId: terminal-cached-oRy9
        sourceHandle: hit
      - targetNodeId: data_store-agg6kQ7
        sourceHandle: miss

  - id: data_store-agg6kQ7
    type: data_store
    label: "Aggregate Events"
    spec:
      operation: aggregate
      model: AnalyticsEvent
      query:
        where:
          event_type:
            in: "$.event_types"
          occurred_at:
            gte: "$.date_from"
            lte: "$.date_to"
          entity_type: "$.entity_type"
      aggregate_fields:
        - function: count
          field: id
          alias: count
      group_by: ["event_type", "$.granularity_bucket"]
      returning: true
    connections:
      - targetNodeId: cache-setAn7
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: cache-setAn7
    type: cache
    label: "Cache Result"
    spec:
      operation: set
      key: "analytics:$.event_types.join(','):$.date_from:$.date_to:$.granularity"
      store: redis
      ttl_ms: 60000
      value: "$.result"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-cached-oRy9
    type: terminal
    label: "Cached"
    spec:
      outcome: success
      status: 200
      body: "$.cached_value"

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Analytics Data"
    spec:
      outcome: success
      status: 200
      body: "$.result"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
