flow:
  id: generate-weekly-digest
  name: "Generate Weekly Digest"
  type: traditional
  domain: analytics
  description: "Cron job that generates a weekly digest with top content, channel performance, and AI analysis trends. Stores in WeeklyDigest and emits WeeklyDigestReady."
  auth:
    required: false

trigger:
  id: trigger-genWd2cN8
  type: trigger
  label: "cron 0 7 * * 1"
  spec:
    event: "cron 0 7 * * 1"
    job_config:
      queue: weekly-digest
      concurrency: 1
      timeout: 120000
  connections:
    - targetNodeId: sub_flow-topContent3

nodes:
  - id: sub_flow-topContent3
    type: sub_flow
    label: "Query Top Content"
    spec:
      flow_ref: analytics/query-analytics
    connections:
      - targetNodeId: transform-digest5

  - id: transform-digest5
    type: transform
    label: "Build Digest Stats"
    spec:
      mode: expression
      field_mappings:
        period_start: "$.lastMonday()"
        period_end: "$.today()"
        stats:
          top_content: "$.result.data.slice(0,10)"
          total_ingested: "$.result.totals.ingested"
          total_published: "$.result.totals.published"
          avg_quality_score: "$.result.totals.avg_quality"
    connections:
      - targetNodeId: data_store-crtDigest6

  - id: data_store-crtDigest6
    type: data_store
    label: "Store Weekly Digest"
    spec:
      operation: create
      model: WeeklyDigest
      data:
        period_start: "$.result.period_start"
        period_end: "$.result.period_end"
        stats: "$.result.stats"
        generated_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-emit-yF3g
    type: event
    label: "Emit WeeklyDigestReady"
    spec:
      direction: emit
      event_name: WeeklyDigestReady
      payload:
        digest_id: "$.result.id"
        period_start: "$.result.period_start"
        period_end: "$.result.period_end"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Digest Created"
    spec:
      outcome: success
      status: 200
      body:
        digest_id: "$.result.id"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
