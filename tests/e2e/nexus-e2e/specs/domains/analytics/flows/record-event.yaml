flow:
  id: record-event
  name: "Record Event"
  type: traditional
  domain: analytics
  description: "Appends an analytics event to the AnalyticsEvent store. Called by other domains via event bus. Accepts any entity type/action pair."
  auth:
    required: false

trigger:
  id: trigger-recE2eN8
  type: trigger
  label: "event:ContentPublished"
  spec:
    event: "event:ContentPublished"
  connections:
    - targetNodeId: data_store-crtEvt5

nodes:
  - id: data_store-crtEvt5
    type: data_store
    label: "Insert Analytics Event"
    spec:
      operation: create
      model: AnalyticsEvent
      data:
        event_type: "$.event_name"
        entity_id: "$.payload.content_id || $.payload.user_id || $.payload.source_id"
        entity_type: "$.payload.entity_type || 'content'"
        actor_id: "$.payload.reviewer_id || $.payload.user_id"
        metadata: "$.payload"
        occurred_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Recorded"
    spec:
      outcome: success
      status: 201
      body:
        event_id: "$.result.id"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
