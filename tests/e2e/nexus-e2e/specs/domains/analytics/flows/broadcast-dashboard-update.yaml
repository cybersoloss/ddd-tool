flow:
  id: broadcast-dashboard-update
  name: "Broadcast Dashboard Update"
  type: traditional
  domain: analytics
  description: "Receives ContentPublished and AnomalyDetected events (via event_group correlation) and broadcasts updated dashboard stats to all connected clients."
  auth:
    required: false

trigger:
  id: trigger-brdDu2eN8
  type: trigger
  label: "event_group:publish-activity"
  spec:
    event: "event_group:publish-activity"
  connections:
    - targetNodeId: sub_flow-stats3

nodes:
  - id: sub_flow-stats3
    type: sub_flow
    label: "Fetch Dashboard Stats"
    spec:
      flow_ref: analytics/query-analytics
    connections:
      - targetNodeId: websocket_broadcast-push5

  - id: websocket_broadcast-push5
    type: websocket_broadcast
    label: "Push Dashboard Update"
    spec:
      channel: "dashboard-stats"
      event_name: stats_update
      payload:
        stats: "$.result"
        trigger_event: "$.event_name"
        updated_at: "$.now()"
      include_sender: false
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Broadcast Sent"
    spec:
      outcome: success
      status: 200
      body:
        message: "Dashboard update broadcast"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
