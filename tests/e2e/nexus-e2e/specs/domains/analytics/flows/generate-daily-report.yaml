flow:
  id: generate-daily-report
  name: "Generate Daily Report"
  type: traditional
  domain: analytics
  description: "Generates a daily analytics report at 2 AM from the day's events"

trigger:
  id: trigger-gD1a2B3c
  type: trigger
  position: { x: 250, y: 0 }
  spec:
    event: "cron 0 2 * * *"
    label: "Daily at 2:00 AM"

nodes:
  - id: data_store-rE4d5E6f
    type: data_store
    position: { x: 250, y: 130 }
    spec:
      operation: read
      model: AnalyticsEvent
      query:
        where:
          occurred_at:
            gte: "$.today_start"
            lt: "$.today_end"

  - id: collection-rD7g8H9i
    type: collection
    position: { x: 250, y: 260 }
    spec:
      operation: reduce
      expression: "accumulate stats"
      output_field: stats

  - id: transform-tR1j2K3l
    type: transform
    position: { x: 250, y: 390 }
    spec:
      mode: expression
      field_mappings:
        summary: "Ingested: $.ingested, Processed: $.processed, Published: $.published"
        date: "$.today"

  - id: data_store-cR4m5N6o
    type: data_store
    position: { x: 250, y: 520 }
    spec:
      operation: create
      model: AnalyticsEvent
      fields:
        - name: event_type
          value: "daily_report"
        - name: summary
          value: "$.summary"
        - name: date
          value: "$.date"
        - name: stats
          value: "$.stats"

  - id: terminal-sD7p8Q9r
    type: terminal
    position: { x: 250, y: 650 }
    spec:
      status: 200
      label: "Daily report generated"

  - id: terminal-eE1s2T3u
    type: terminal
    position: { x: 550, y: 260 }
    spec:
      status: 200
      label: "No events today - empty report"

  - id: terminal-eS4v5W6x
    type: terminal
    position: { x: 550, y: 520 }
    spec:
      status: 500
      label: "Data store error"
      error_code: DATA_STORE_ERROR

connections:
  - source: trigger-gD1a2B3c
    target: data_store-rE4d5E6f
    sourceHandle: ""
  - source: data_store-rE4d5E6f
    target: collection-rD7g8H9i
    sourceHandle: "success"
  - source: data_store-rE4d5E6f
    target: terminal-eS4v5W6x
    sourceHandle: "error"
  - source: collection-rD7g8H9i
    target: transform-tR1j2K3l
    sourceHandle: "result"
  - source: collection-rD7g8H9i
    target: terminal-eE1s2T3u
    sourceHandle: "empty"
  - source: transform-tR1j2K3l
    target: data_store-cR4m5N6o
    sourceHandle: "success"
  - source: data_store-cR4m5N6o
    target: terminal-sD7p8Q9r
    sourceHandle: "success"
  - source: data_store-cR4m5N6o
    target: terminal-eS4v5W6x
    sourceHandle: "error"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
