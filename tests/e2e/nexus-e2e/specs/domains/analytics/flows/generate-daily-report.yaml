flow:
  id: generate-daily-report
  name: "Generate Daily Report"
  type: traditional
  domain: analytics
  description: "Cron job that aggregates yesterday's activity (ingested, approved, published, rejected counts) and emails a summary to admins via SendGrid."
  auth:
    required: false

trigger:
  id: trigger-genDr2cN8
  type: trigger
  label: "cron 0 6 * * *"
  spec:
    event: "cron 0 6 * * *"
    job_config:
      queue: daily-reports
      concurrency: 1
      timeout: 60000
  connections:
    - targetNodeId: parallel-counts4

nodes:
  - id: parallel-counts4
    type: parallel
    label: "Aggregate Yesterday"
    spec:
      branches:
        - id: ingested
          label: "Ingested Count"
        - id: approved
          label: "Approved Count"
        - id: published
          label: "Published Count"
        - id: rejected
          label: "Rejected Count"
    connections:
      - targetNodeId: data_store-cntIng5
        sourceHandle: branch-0
      - targetNodeId: data_store-cntApp6
        sourceHandle: branch-1
      - targetNodeId: data_store-cntPub7
        sourceHandle: branch-2
      - targetNodeId: data_store-cntRej8
        sourceHandle: branch-3
      - targetNodeId: transform-report9
        sourceHandle: done

  - id: data_store-cntIng5
    type: data_store
    label: "Count Ingested"
    spec:
      operation: aggregate
      model: AnalyticsEvent
      query:
        where:
          event_type: ContentIngested
          occurred_at:
            gte: "$.yesterday()"
            lt: "$.today()"
      aggregate_fields:
        - function: count
          field: id
          alias: count
      returning: true
    connections:
      - targetNodeId: parallel-counts4

  - id: data_store-cntApp6
    type: data_store
    label: "Count Approved"
    spec:
      operation: aggregate
      model: AnalyticsEvent
      query:
        where:
          event_type: ContentApproved
          occurred_at:
            gte: "$.yesterday()"
            lt: "$.today()"
      aggregate_fields:
        - function: count
          field: id
          alias: count
      returning: true
    connections:
      - targetNodeId: parallel-counts4

  - id: data_store-cntPub7
    type: data_store
    label: "Count Published"
    spec:
      operation: aggregate
      model: AnalyticsEvent
      query:
        where:
          event_type: ContentPublished
          occurred_at:
            gte: "$.yesterday()"
            lt: "$.today()"
      aggregate_fields:
        - function: count
          field: id
          alias: count
      returning: true
    connections:
      - targetNodeId: parallel-counts4

  - id: data_store-cntRej8
    type: data_store
    label: "Count Rejected"
    spec:
      operation: aggregate
      model: AnalyticsEvent
      query:
        where:
          event_type: ContentRejected
          occurred_at:
            gte: "$.yesterday()"
            lt: "$.today()"
      aggregate_fields:
        - function: count
          field: id
          alias: count
      returning: true
    connections:
      - targetNodeId: parallel-counts4

  - id: transform-report9
    type: transform
    label: "Build Report"
    spec:
      mode: expression
      field_mappings:
        report_date: "$.yesterday()"
        ingested: "$.branch_results.ingested.count"
        approved: "$.branch_results.approved.count"
        published: "$.branch_results.published.count"
        rejected: "$.branch_results.rejected.count"
        approval_rate: "$.branch_results.approved.count / ($.branch_results.ingested.count || 1)"
    connections:
      - targetNodeId: service_call-email0

  - id: service_call-email0
    type: service_call
    label: "Email Report"
    spec:
      method: POST
      integration: sendgrid
      url: "https://api.sendgrid.com/v3/mail/send"
      request_config:
        body:
          template_id: "d-daily-report-template"
          personalizations:
            - to: [{ email: "$.env.ADMIN_EMAIL" }]
              dynamic_template_data: "$.result"
      error_mapping:
        429: RATE_LIMITED
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-emit-yF3g
    type: event
    label: "Emit DailyReportGenerated"
    spec:
      direction: emit
      event_name: DailyReportGenerated
      payload:
        report_date: "$.result.report_date"
        recipient_count: 1
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Report Sent"
    spec:
      outcome: success
      status: 200
      body:
        message: "Daily report sent"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
