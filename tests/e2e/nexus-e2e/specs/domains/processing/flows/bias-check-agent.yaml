flow:
  id: bias-check-agent
  name: "Bias Check Agent"
  type: agent
  domain: processing
  description: "Autonomous agent that detects political, gender, and cultural bias using multi-perspective analysis. Returns bias_score (0-100) and specific bias_flags."
  auth:
    required: false

trigger:
  id: trigger-biasAg2eN8
  type: trigger
  label: "event:ContentIngested"
  spec:
    event: "event:ContentIngested"
  connections:
    - targetNodeId: data_store-rdCt3

nodes:
  - id: data_store-rdCt3
    type: data_store
    label: "Load Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: agent_loop-biasCheck4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: agent_loop-biasCheck4
    type: agent_loop
    label: "Bias Detector Agent"
    spec:
      model: claude-opus-4-6
      max_iterations: 4
      tools:
        - name: analyze_political_bias
          description: "Analyze text for political bias indicators (left/right lean)"
          is_terminal: false
        - name: analyze_gender_bias
          description: "Detect gender-biased language or framing"
          is_terminal: false
        - name: analyze_cultural_bias
          description: "Detect cultural or regional bias in content"
          is_terminal: false
        - name: submit_bias_results
          description: "Submit final bias score and flags"
          is_terminal: true
      context_sources:
        - "$.result.title"
        - "$.result.body.substring(0, 3000)"
    connections:
      - targetNodeId: data_store-upd5nR6s
        sourceHandle: done
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-upd5nR6s
    type: data_store
    label: "Store Bias Results"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      data:
        bias_score: "$.agent_result.bias_score"
        metadata:
          bias_flags: "$.agent_result.bias_flags"
          bias_checked_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Bias Checked"
    spec:
      outcome: success
      status: 200
      body:
        bias_score: "$.agent_result.bias_score"
        bias_flags: "$.agent_result.bias_flags"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
