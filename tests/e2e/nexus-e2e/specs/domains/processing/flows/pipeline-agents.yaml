flow:
  id: pipeline-agents
  name: "Pipeline Agents"
  type: agent
  domain: processing
  description: "Chains classify → fact-check → bias-check → score as a sequential agent pipeline with handoffs. Each agent completes before the next begins, passing forward enriched context."
  auth:
    required: false

trigger:
  id: trigger-pipAg2eN8
  type: trigger
  label: "event:ContentIngested"
  spec:
    event: "event:ContentIngested"
    filter:
      "payload.pipeline": "sequential"
  connections:
    - targetNodeId: data_store-rdCt3

nodes:
  - id: data_store-rdCt3
    type: data_store
    label: "Load Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: handoff-classify4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: handoff-classify4
    type: handoff
    label: "Stage 1: Classify"
    spec:
      mode: consult
      target:
        flow: processing/classify-content
        domain: processing
      context_transfer:
        include_types: [data, state]
        max_context_tokens: 2000
      on_complete: continue
      on_failure: terminal-err-pSz2wV3b
      notify_customer: false
    connections:
      - targetNodeId: handoff-factcheck5

  - id: handoff-factcheck5
    type: handoff
    label: "Stage 2: Fact Check"
    spec:
      mode: consult
      target:
        flow: processing/fact-check-agent
        domain: processing
      context_transfer:
        include_types: [data, state, memory]
        max_context_tokens: 4000
      on_complete: continue
      on_failure: terminal-err-pSz2wV3b
      notify_customer: false
    connections:
      - targetNodeId: handoff-biascheck6

  - id: handoff-biascheck6
    type: handoff
    label: "Stage 3: Bias Check"
    spec:
      mode: consult
      target:
        flow: processing/bias-check-agent
        domain: processing
      context_transfer:
        include_types: [data, state, memory]
        max_context_tokens: 4000
      on_complete: continue
      on_failure: terminal-err-pSz2wV3b
      notify_customer: false
    connections:
      - targetNodeId: sub_flow-score7

  - id: sub_flow-score7
    type: sub_flow
    label: "Stage 4: Score Quality"
    spec:
      flow_ref: processing/score-quality
    connections:
      - targetNodeId: event-emit8

  - id: event-emit8
    type: event
    label: "Emit ContentAnalyzed"
    spec:
      direction: emit
      event_name: ContentAnalyzed
      payload:
        content_id: "$.payload.content_id"
        pipeline: "sequential"
        stages_completed:
          - classify
          - fact-check
          - bias-check
          - score
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Pipeline Complete"
    spec:
      outcome: success
      status: 200
      body:
        message: "Sequential agent pipeline complete"
        content_id: "$.payload.content_id"
        stages: [classify, fact-check, bias-check, score]

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
