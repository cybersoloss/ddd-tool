flow:
  id: resolve-conflict-agent
  name: "Resolve Conflict Agent"
  type: agent
  domain: processing
  description: "Agent that resolves disagreements between AI assessors. Uses an orchestrator to run a mediator LLM that reviews conflicting assessments and produces a final ruling."
  auth:
    required: false

trigger:
  id: trigger-resConf2eN8
  type: trigger
  label: "manual"
  spec:
    event: "manual"
  connections:
    - targetNodeId: orchestrator-mediator3

nodes:
  - id: orchestrator-mediator3
    type: orchestrator
    label: "Conflict Resolution Orchestrator"
    spec:
      strategy: debate
      model: claude-opus-4-6
      agents:
        - flow_ref: processing/fact-check-agent
          role: assessor_a
        - flow_ref: processing/bias-check-agent
          role: assessor_b
    connections:
      - targetNodeId: llm_call-ruling4

  - id: llm_call-ruling4
    type: llm_call
    label: "Final Ruling LLM"
    spec:
      model: claude-opus-4-6
      temperature: 0.1
      max_tokens: 600
      prompt: |
        Two AI assessors have produced conflicting results. Review both assessments and provide a final ruling.

        Assessor A (Fact Checker): $.orchestrator_results.assessor_a
        Assessor B (Bias Detector): $.orchestrator_results.assessor_b

        Provide: final_score, resolution_rationale, confidence_in_ruling (0-1)
      structured_output:
        final_score:
          type: number
        resolution_rationale:
          type: string
        confidence_in_ruling:
          type: number
        sided_with:
          type: string
          enum: [assessor_a, assessor_b, compromise, neither]
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Conflict Resolved"
    spec:
      outcome: success
      status: 200
      body: "$.llm_result"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
