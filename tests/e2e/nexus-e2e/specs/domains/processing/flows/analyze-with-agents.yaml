flow:
  id: analyze-with-agents
  name: "Analyze With Agents"
  type: agent
  domain: processing
  description: "Broadcast orchestration with agent group for collaborative content analysis"

trigger:
  id: trigger-aW1a2B3c
  type: trigger
  position: { x: 100, y: 0 }
  spec:
    event: "event:ContentIngested"
    label: "Content Ingested"

nodes:
  - id: data_store-dR4d5E6f
    type: data_store
    position: { x: 100, y: 130 }
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.content_id"

  - id: orchestrator-oB7g8H9i
    type: orchestrator
    position: { x: 100, y: 260 }
    spec:
      strategy: broadcast
      model: "anthropic/claude-sonnet"
      agents:
        - flow: "processing/fact-check-agent"
        - flow: "processing/bias-check-agent"
        - flow: "processing/score-quality"
      result_merge_strategy: combine

  - id: agent_group-aG1j2K3l
    type: agent_group
    position: { x: 100, y: 390 }
    spec:
      name: "analysis-group"
      members:
        - flow: "processing/fact-check-agent"
        - flow: "processing/bias-check-agent"
      coordination:
        communication: broadcast
        max_active_agents: 3
      shared_memory:
        type: key_value
        store: "analysis-context"

  - id: data_store-dU4m5N6o
    type: data_store
    position: { x: 100, y: 520 }
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.content_id"
      fields:
        - name: analysis_result
          value: "$.result"

  - id: terminal-tS7p8Q9r
    type: terminal
    position: { x: 100, y: 650 }
    spec:
      status: 200
      label: "Agent analysis complete"

  - id: terminal-tE1s2T3u
    type: terminal
    position: { x: 400, y: 260 }
    spec:
      status: 500
      label: "Orchestrator error"
      error_code: ORCHESTRATOR_ERROR

  - id: terminal-tE4v5W6x
    type: terminal
    position: { x: 400, y: 130 }
    spec:
      status: 500
      label: "Data store error"
      error_code: DATA_STORE_ERROR

connections:
  - source: trigger-aW1a2B3c
    target: data_store-dR4d5E6f
    sourceHandle: ""
  - source: data_store-dR4d5E6f
    target: orchestrator-oB7g8H9i
    sourceHandle: "success"
  - source: data_store-dR4d5E6f
    target: terminal-tE4v5W6x
    sourceHandle: "error"
  - source: orchestrator-oB7g8H9i
    target: agent_group-aG1j2K3l
    sourceHandle: "success"
  - source: orchestrator-oB7g8H9i
    target: terminal-tE1s2T3u
    sourceHandle: "error"
  - source: agent_group-aG1j2K3l
    target: data_store-dU4m5N6o
    sourceHandle: "done"
  - source: agent_group-aG1j2K3l
    target: terminal-tE1s2T3u
    sourceHandle: "error"
  - source: data_store-dU4m5N6o
    target: terminal-tS7p8Q9r
    sourceHandle: "success"
  - source: data_store-dU4m5N6o
    target: terminal-tE4v5W6x
    sourceHandle: "error"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
