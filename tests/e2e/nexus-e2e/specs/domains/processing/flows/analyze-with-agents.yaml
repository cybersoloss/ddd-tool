flow:
  id: analyze-with-agents
  name: "Analyze with Agents"
  type: agent
  domain: processing
  description: "Runs fact-check, bias-check, and quality score agents in an agent_group with shared memory and coordination. Used for high-priority content requiring comprehensive analysis."
  auth:
    required: false

trigger:
  id: trigger-anAgts2eN8
  type: trigger
  label: "event:ContentIngested"
  spec:
    event: "event:ContentIngested"
    filter:
      "payload.category": "technology"
  connections:
    - targetNodeId: data_store-rdCt3

nodes:
  - id: data_store-rdCt3
    type: data_store
    label: "Load Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: agent_group-analyze4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: agent_group-analyze4
    type: agent_group
    label: "Analysis Agent Group"
    spec:
      name: "ContentAnalysisGroup"
      description: "Coordinated multi-agent analysis group"
      members:
        - flow: processing/fact-check-agent
          domain: processing
        - flow: processing/bias-check-agent
          domain: processing
      shared_memory:
        type: key_value
        store: analysis-cache
      coordination:
        communication: shared_context
        max_active_agents: 2
        selection_strategy: round_robin
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Analysis Complete"
    spec:
      outcome: success
      status: 200
      body:
        message: "Agent group analysis complete"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
