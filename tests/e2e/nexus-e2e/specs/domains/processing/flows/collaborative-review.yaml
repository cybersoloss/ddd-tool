flow:
  id: collaborative-review
  name: "Collaborative Review"
  type: agent
  domain: processing
  description: "Multi-agent collaborative review where multiple specialist agents cross-check each other's findings and synthesize a consensus analysis."
  auth:
    required: false

trigger:
  id: trigger-colRev2eN8
  type: trigger
  label: "event:ContentAnalyzed"
  spec:
    event: "event:ContentAnalyzed"
    filter:
      "payload.quality_score":
        lt: 60
  connections:
    - targetNodeId: orchestrator-collab3

nodes:
  - id: orchestrator-collab3
    type: orchestrator
    label: "Collaborative Analysis Orchestrator"
    spec:
      strategy: parallel_then_merge
      model: claude-opus-4-6
      agents:
        - flow_ref: processing/fact-check-agent
          role: fact_checker
        - flow_ref: processing/bias-check-agent
          role: bias_detector
        - flow_ref: processing/route-to-specialist
          role: specialist
    connections:
      - targetNodeId: llm_call-synthesize4

  - id: llm_call-synthesize4
    type: llm_call
    label: "Synthesize Agent Findings"
    spec:
      model: claude-opus-4-6
      temperature: 0.2
      max_tokens: 800
      prompt: |
        Three specialized agents have analyzed this content. Synthesize their findings into a coherent analysis:

        Fact Checker: $.orchestrator_results.fact_checker
        Bias Detector: $.orchestrator_results.bias_detector
        Specialist: $.orchestrator_results.specialist

        Provide a unified assessment with an overall confidence score.
      structured_output:
        consensus_score:
          type: number
        confidence:
          type: number
        key_findings:
          type: array
        recommended_action:
          type: string
          enum: [approve, reject, escalate, review_more]
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Collaborative Review Done"
    spec:
      outcome: success
      status: 200
      body: "$.llm_result"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

