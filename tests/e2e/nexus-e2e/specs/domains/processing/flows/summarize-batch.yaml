flow:
  id: summarize-batch
  name: "Summarize Batch"
  type: traditional
  domain: processing
  description: "Weekly cron job that fetches unprocessed content and generates LLM summaries for the weekly digest. Processes in batches of 50."
  auth:
    required: false

trigger:
  id: trigger-sumBat2cN8
  type: trigger
  label: "cron 0 2 * * 1"
  spec:
    event: "cron 0 2 * * 1"
    job_config:
      queue: content-summarization
      concurrency: 5
      timeout: 300000
  connections:
    - targetNodeId: data_store-rdContent3

nodes:
  - id: data_store-rdContent3
    type: data_store
    label: "Load Unsummarized Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          status: approved
          metadata:
            summarized_at: null
          created_at:
            gte: "$.lastMonday()"
        limit: 200
      returning: true
    connections:
      - targetNodeId: collection-chk4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: collection-chk4
    type: collection
    label: "Has Items?"
    spec:
      operation: filter
      input: "$.result"
      output: to_summarize
      predicate: "!$.item.metadata?.summarized_at"
    connections:
      - targetNodeId: batch-summ5
        sourceHandle: result
      - targetNodeId: terminal-ok-empty
        sourceHandle: empty

  - id: batch-summ5
    type: batch
    label: "Summarize Each"
    spec:
      input: "$.to_summarize"
      operation_template:
        type: llm_call
        model: claude-opus-4-6
        temperature: 0.3
        max_tokens: 200
        prompt: "Summarize this article in 2-3 sentences for a weekly digest newsletter: $.item.title - $.item.body.substring(0, 1500)"
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: done
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-emit-yF3g
    type: event
    label: "Emit BatchSummarized"
    spec:
      direction: emit
      event_name: BatchSummarized
      payload:
        digest_id: "$.now()"
        period_start: "$.lastMonday()"
        period_end: "$.now()"
        item_count: "$.to_summarize.length"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Batch Complete"
    spec:
      outcome: success
      status: 200
      body:
        summarized: "$.to_summarize.length"

  - id: terminal-ok-empty
    type: terminal
    label: "Nothing to Summarize"
    spec:
      outcome: success
      status: 200
      body:
        summarized: 0

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
