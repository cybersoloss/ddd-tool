flow:
  id: fact-check-agent
  name: "Fact Check Agent"
  type: agent
  domain: processing
  description: "Autonomous agent that verifies key claims against Google CSE and curated knowledge base. Returns fact_score and flagged_claims."
  auth:
    required: false

trigger:
  id: trigger-fctAg2eN8
  type: trigger
  label: "event:ContentIngested"
  spec:
    event: "event:ContentIngested"
  connections:
    - targetNodeId: data_store-rdCt3

nodes:
  - id: data_store-rdCt3
    type: data_store
    label: "Load Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: agent_loop-factCheck4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: agent_loop-factCheck4
    type: agent_loop
    label: "Fact Checker Agent"
    spec:
      model: claude-opus-4-6
      max_iterations: 5
      tools:
        - name: search_google_cse
          description: "Search Google Custom Search Engine to verify a claim"
          is_terminal: false
        - name: check_knowledge_base
          description: "Query internal knowledge base for known facts"
          is_terminal: false
        - name: submit_fact_check_results
          description: "Submit the completed fact check with score and flagged claims"
          is_terminal: true
      context_sources:
        - "$.result.title"
        - "$.result.body"
      streaming:
        enabled: false
    connections:
      - targetNodeId: data_store-upd5nR6s
        sourceHandle: done
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-upd5nR6s
    type: data_store
    label: "Store Fact Check Results"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      data:
        metadata:
          fact_score: "$.agent_result.fact_score"
          flagged_claims: "$.agent_result.flagged_claims"
          fact_checked_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Fact Checked"
    spec:
      outcome: success
      status: 200
      body:
        fact_score: "$.agent_result.fact_score"
        flagged_claims: "$.agent_result.flagged_claims"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
