flow:
  id: route-to-specialist
  name: "Route To Specialist"
  type: agent
  domain: processing
  description: "Smart routing to domain-specialist analysis agents with LLM fallback"

trigger:
  id: trigger-rS1a2B3c
  type: trigger
  position: { x: 100, y: 0 }
  spec:
    event: "event:ContentIngested"
    label: "Content Ingested"

nodes:
  - id: smart_router-sR4d5E6f
    type: smart_router
    position: { x: 100, y: 130 }
    spec:
      rules:
        - id: news-specialist
          condition: "$.category === 'news'"
          route: news
        - id: opinion-specialist
          condition: "$.category === 'opinion'"
          route: opinion
        - id: research-specialist
          condition: "$.category === 'research'"
          route: research
      llm_routing:
        model: "anthropic/claude-haiku"
        confidence_threshold: 0.7
        prompt: "Which specialist should handle this content?"
      fallback_chain:
        - news-specialist

  - id: handoff-hN7g8H9i
    type: handoff
    position: { x: 100, y: 260 }
    spec:
      mode: consult
      target:
        flow: "processing/score-quality"
      context_transfer:
        include_types:
          - content_data
          - classification
      on_complete: merge
      on_failure: fallback
      route: news

  - id: handoff-hO1j2K3l
    type: handoff
    position: { x: 400, y: 260 }
    spec:
      mode: consult
      target:
        flow: "processing/score-quality"
      context_transfer:
        include_types:
          - content_data
          - classification
      on_complete: merge
      on_failure: fallback
      route: opinion

  - id: handoff-hR4m5N6o
    type: handoff
    position: { x: 700, y: 260 }
    spec:
      mode: consult
      target:
        flow: "processing/score-quality"
      context_transfer:
        include_types:
          - content_data
          - classification
      on_complete: merge
      on_failure: fallback
      route: research

  - id: data_store-dU7p8Q9r
    type: data_store
    position: { x: 100, y: 390 }
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.content_id"
      fields:
        - name: specialist_result
          value: "$.result"

  - id: terminal-tS1s2T3u
    type: terminal
    position: { x: 100, y: 520 }
    spec:
      status: 200
      label: "Specialist routing complete"

  - id: data_store-dU4v5W6x
    type: data_store
    position: { x: 400, y: 390 }
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.content_id"
      fields:
        - name: specialist_result
          value: "$.result"

  - id: terminal-tS7y8Z9a
    type: terminal
    position: { x: 400, y: 520 }
    spec:
      status: 200
      label: "Opinion specialist complete"

  - id: data_store-dU1b2C3d
    type: data_store
    position: { x: 700, y: 390 }
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.content_id"
      fields:
        - name: specialist_result
          value: "$.result"

  - id: terminal-tS4e5F6g
    type: terminal
    position: { x: 700, y: 520 }
    spec:
      status: 200
      label: "Research specialist complete"

  - id: terminal-tE7h8I9j
    type: terminal
    position: { x: 400, y: 130 }
    spec:
      status: 500
      label: "Router error"
      error_code: ROUTER_ERROR

connections:
  - source: trigger-rS1a2B3c
    target: smart_router-sR4d5E6f
    sourceHandle: ""
  - source: smart_router-sR4d5E6f
    target: handoff-hN7g8H9i
