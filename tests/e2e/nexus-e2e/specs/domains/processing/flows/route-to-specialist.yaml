flow:
  id: route-to-specialist
  name: "Route to Specialist"
  type: traditional
  domain: processing
  description: "Smart-routes content to domain-specific processing agents (financial, legal, medical, tech) based on content category and keywords."
  auth:
    required: false

trigger:
  id: trigger-rtSpec2eN8
  type: trigger
  label: "event:ContentAnalyzed"
  spec:
    event: "event:ContentAnalyzed"
  connections:
    - targetNodeId: smart_router-spec3

nodes:
  - id: smart_router-spec3
    type: smart_router
    label: "Route to Specialist"
    spec:
      rules:
        - id: financial
          condition: "$.payload.category === 'finance' || $.payload.category === 'business'"
          route: llm_call-financial4
          priority: 1
        - id: medical
          condition: "$.payload.category === 'health'"
          route: llm_call-medical5
          priority: 2
        - id: technology
          condition: "$.payload.category === 'technology'"
          route: llm_call-tech6
          priority: 3
        - id: general
          condition: "true"
          route: terminal-ok-general
          priority: 10
    connections:
      - targetNodeId: llm_call-financial4
        sourceHandle: financial
      - targetNodeId: llm_call-medical5
        sourceHandle: medical
      - targetNodeId: llm_call-tech6
        sourceHandle: technology
      - targetNodeId: terminal-ok-general
        sourceHandle: general

  - id: llm_call-financial4
    type: llm_call
    label: "Financial Specialist LLM"
    spec:
      model: claude-opus-4-6
      temperature: 0.1
      max_tokens: 500
      prompt: |
        You are a financial content specialist. Analyze this content for:
        - Market sentiment (bullish/bearish/neutral)
        - Referenced companies or tickers
        - Regulatory concerns

        Content: $.payload.content_id
      structured_output:
        market_sentiment:
          type: string
        tickers:
          type: array
        regulatory_concerns:
          type: boolean
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: llm_call-medical5
    type: llm_call
    label: "Medical Specialist LLM"
    spec:
      model: claude-opus-4-6
      temperature: 0.1
      max_tokens: 500
      prompt: |
        You are a medical content specialist. Review this health content for:
        - Medical accuracy concerns
        - Requires expert review flag
        - Health misinformation risk

        Content ID: $.payload.content_id
      structured_output:
        accuracy_concerns:
          type: boolean
        requires_expert_review:
          type: boolean
        misinformation_risk:
          type: string
          enum: [none, low, medium, high]
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: llm_call-tech6
    type: llm_call
    label: "Tech Specialist LLM"
    spec:
      model: claude-opus-4-6
      temperature: 0.2
      max_tokens: 500
      prompt: |
        Analyze this tech content for: referenced technologies, technical accuracy, and relevance to current trends.
      structured_output:
        technologies:
          type: array
        technical_accuracy:
          type: string
          enum: [high, medium, low, unknown]
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-general
    type: terminal
    label: "No Specialist Needed"
    spec:
      outcome: success
      status: 200
      body:
        specialist: none

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Specialist Analysis Done"
    spec:
      outcome: success
      status: 200
      body: "$.llm_result"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
