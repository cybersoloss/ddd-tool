flow:
  id: orchestrate-analysis
  name: "Orchestrate Analysis"
  type: agent
  domain: processing
  description: "Main AI analysis entry point. Fans out in parallel to classify, fact-check, bias-check, and score-quality sub-flows. Waits for all results, then emits ContentAnalyzed."
  auth:
    required: false

trigger:
  id: trigger-orchA2eN8
  type: trigger
  label: "event:ContentIngested"
  spec:
    event: "event:ContentIngested"
  connections:
    - targetNodeId: data_store-rdCt3

nodes:
  - id: data_store-rdCt3
    type: data_store
    label: "Load Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-nf8tV9w
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-nf8tV9w
    type: decision
    label: "Content Found?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: parallel-analysis4
        sourceHandle: "true"
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: "false"

  - id: parallel-analysis4
    type: parallel
    label: "Run All Analyzers"
    spec:
      failure_policy: best_effort
      branches:
        - id: classify
          label: "Classify"
        - id: fact_check
          label: "Fact Check"
        - id: bias_check
          label: "Bias Check"
        - id: score
          label: "Score Quality"
    connections:
      - targetNodeId: sub_flow-classify5
        sourceHandle: branch-0
      - targetNodeId: sub_flow-factCheck6
        sourceHandle: branch-1
      - targetNodeId: sub_flow-biasCheck7
        sourceHandle: branch-2
      - targetNodeId: sub_flow-score8
        sourceHandle: branch-3
      - targetNodeId: data_store-upd9nR6s
        sourceHandle: done

  - id: sub_flow-classify5
    type: sub_flow
    label: "Classify Content"
    spec:
      flow_ref: processing/classify-content
    connections:
      - targetNodeId: parallel-analysis4

  - id: sub_flow-factCheck6
    type: sub_flow
    label: "Fact Check"
    spec:
      flow_ref: processing/fact-check-agent
    connections:
      - targetNodeId: parallel-analysis4

  - id: sub_flow-biasCheck7
    type: sub_flow
    label: "Bias Check"
    spec:
      flow_ref: processing/bias-check-agent
    connections:
      - targetNodeId: parallel-analysis4

  - id: sub_flow-score8
    type: sub_flow
    label: "Score Quality"
    spec:
      flow_ref: processing/score-quality
    connections:
      - targetNodeId: parallel-analysis4

  - id: data_store-upd9nR6s
    type: data_store
    label: "Reload Final Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-emit-yF3g
    type: event
    label: "Emit ContentAnalyzed"
    spec:
      direction: emit
      event_name: ContentAnalyzed
      payload:
        content_id: "$.payload.content_id"
        quality_score: "$.result.quality_score"
        bias_score: "$.result.bias_score"
        category: "$.result.category"
        fact_score: "$.result.metadata.fact_score"
        flagged_claims: "$.result.metadata.flagged_claims"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Analysis Complete"
    spec:
      outcome: success
      status: 200
      body:
        content_id: "$.payload.content_id"
        quality_score: "$.result.quality_score"

  - id: terminal-notfound-cD4e
    type: terminal
    label: "Not Found"
    spec:
      outcome: error
      status: 404
      body:
        error: "CONTENT_NOT_FOUND"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
