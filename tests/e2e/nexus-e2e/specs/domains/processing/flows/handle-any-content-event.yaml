flow:
  id: handle-any-content-event
  name: "Handle Any Content Event"
  type: traditional
  domain: processing
  description: "Generic event handler that normalizes ContentIngested and ContentUpdated events into standard analysis requests and enqueues them for orchestrate-analysis."
  auth:
    required: false

trigger:
  id: trigger-anyC2eN8
  type: trigger
  label: "event:ContentIngested"
  spec:
    event: "event:ContentIngested"
  connections:
    - targetNodeId: decision-reprocess3

nodes:
  - id: decision-reprocess3
    type: decision
    label: "Reprocess Mode?"
    spec:
      condition: "$.payload.reprocess === true"
    connections:
      - targetNodeId: event-enq-high5
        sourceHandle: "true"
      - targetNodeId: event-enq-normal6
        sourceHandle: "false"

  - id: event-enq-high5
    type: event
    label: "Enqueue High Priority"
    spec:
      direction: emit
      event_name: ContentIngested
      target_queue: content-analysis
      async: true
      priority: 1
      payload:
        content_id: "$.payload.content_id"
        source_type: "$.payload.source_type"
        reprocess: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: event-enq-normal6
    type: event
    label: "Enqueue Normal Priority"
    spec:
      direction: emit
      event_name: ContentIngested
      target_queue: content-analysis
      async: true
      priority: 5
      payload:
        content_id: "$.payload.content_id"
        source_type: "$.payload.source_type"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Queued"
    spec:
      outcome: success
      status: 200
      body:
        message: "Content queued for analysis"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
