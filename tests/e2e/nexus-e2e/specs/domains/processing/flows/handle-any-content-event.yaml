flow:
  id: handle-any-content-event
  name: "Handle Any Content Event"
  type: traditional
  domain: processing
  description: "Unified handler for content lifecycle event group using correlation key"

trigger:
  id: trigger-hA1a2B3c
  type: trigger
  position: { x: 100, y: 0 }
  spec:
    event: "event_group:content_lifecycle"
    label: "Content Lifecycle Event"
    correlation_key: "content_id"

nodes:
  - id: data_store-dR4d5E6f
    type: data_store
    position: { x: 100, y: 130 }
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.content_id"

  - id: decision-dC7g8H9i
    type: decision
    position: { x: 100, y: 260 }
    spec:
      condition: "$.content !== null"

  - id: process-pR1j2K3l
    type: process
    position: { x: 100, y: 390 }
    spec:
      category: business_logic
      description: "Route to appropriate handler based on event type"

  - id: data_store-dU4m5N6o
    type: data_store
    position: { x: 100, y: 520 }
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.content_id"
      fields:
        - name: status
          value: "processing"

  - id: event-eC7p8Q9r
    type: event
    position: { x: 100, y: 650 }
    spec:
      direction: emit
      event_name: ContentClassified
      payload:
        content_id: "$.content_id"
        reprocessing: true

  - id: terminal-tS1s2T3u
    type: terminal
    position: { x: 100, y: 780 }
    spec:
      status: 200
      label: "Content event handled"

  - id: terminal-tE4v5W6x
    type: terminal
    position: { x: 400, y: 260 }
    spec:
      status: 404
      label: "Content not found"
      error_code: CONTENT_NOT_FOUND

  - id: terminal-tE7y8Z9a
    type: terminal
    position: { x: 400, y: 130 }
    spec:
      status: 500
      label: "Data store error"
      error_code: DATA_STORE_ERROR

connections:
  - source: trigger-hA1a2B3c
    target: data_store-dR4d5E6f
    sourceHandle: ""
  - source: data_store-dR4d5E6f
    target: decision-dC7g8H9i
    sourceHandle: "success"
  - source: data_store-dR4d5E6f
    target: terminal-tE7y8Z9a
    sourceHandle: "error"
  - source: decision-dC7g8H9i
    target: process-pR1j2K3l
    sourceHandle: "true"
  - source: decision-dC7g8H9i
    target: terminal-tE4v5W6x
    sourceHandle: "false"
  - source: process-pR1j2K3l
    target: data_store-dU4m5N6o
    sourceHandle: "success"
  - source: data_store-dU4m5N6o
    target: event-eC7p8Q9r
    sourceHandle: "success"
  - source: data_store-dU4m5N6o
    target: terminal-tE7y8Z9a
    sourceHandle: "error"
  - source: event-eC7p8Q9r
    target: terminal-tS1s2T3u
    sourceHandle: "success"

