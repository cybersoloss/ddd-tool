flow:
  id: score-quality
  name: "Score Quality"
  type: traditional
  domain: processing
  description: "Multi-dimensional content quality scoring with guardrails"
  contract:
    inputs:
      - content_id
    outputs:
      - quality_score
      - confidence

trigger:
  id: trigger-sQ1a2B3c
  type: trigger
  position: { x: 100, y: 0 }
  spec:
    event: "event:ContentClassified"
    label: "Content Classified"

nodes:
  - id: guardrail-gI4d5E6f
    type: guardrail
    position: { x: 100, y: 130 }
    spec:
      position: input
      checks:
        - type: required_fields
          action: block
          fields:
            - content_id

  - id: data_store-dR7g8H9i
    type: data_store
    position: { x: 100, y: 260 }
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.content_id"

  - id: llm_call-lC1j2K3l
    type: llm_call
    position: { x: 100, y: 390 }
    spec:
      model: "anthropic/claude-sonnet"
      prompt: "Score this content quality from 0 to 100"
      structured_output:
        properties:
          quality_score:
            type: number
          confidence:
            type: number
          factors:
            type: array

  - id: guardrail-gO4m5N6o
    type: guardrail
    position: { x: 100, y: 520 }
    spec:
      position: output
      checks:
        - type: business_rule
          action: warn
          rule: "$.quality_score < 10 || $.quality_score > 100"

  - id: data_store-dU7p8Q9r
    type: data_store
    position: { x: 100, y: 650 }
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.content_id"
      fields:
        - name: quality_score
          value: "$.quality_score"

  - id: terminal-tS1s2T3u
    type: terminal
    position: { x: 100, y: 780 }
    spec:
      status: 200
      label: "Quality scored"

  - id: terminal-tE4v5W6x
    type: terminal
    position: { x: 400, y: 130 }
    spec:
      status: 422
      label: "Guardrail blocked"
      error_code: REQUIRED_FIELDS_MISSING

  - id: terminal-tE7y8Z9a
    type: terminal
    position: { x: 400, y: 390 }
    spec:
      status: 500
      label: "LLM call error"
      error_code: LLM_CALL_ERROR

connections:
  - source: trigger-sQ1a2B3c
    target: guardrail-gI4d5E6f
    sourceHandle: ""
  - source: guardrail-gI4d5E6f
    target: data_store-dR7g8H9i
    sourceHandle: "pass"
  - source: guardrail-gI4d5E6f
    target: terminal-tE4v5W6x
    sourceHandle: "block"
  - source: data_store-dR7g8H9i
    target: llm_call-lC1j2K3l
    sourceHandle: "success"
  - source: data_store-dR7g8H9i
    target: terminal-tE7y8Z9a
    sourceHandle: "error"
  - source: llm_call-lC1j2K3l
    target: guardrail-gO4m5N6o
    sourceHandle: "success"
  - source: llm_call-lC1j2K3l
    target: terminal-tE7y8Z9a
    sourceHandle: "error"
  - source: guardrail-gO4m5N6o
    target: data_store-dU7p8Q9r
    sourceHandle: "pass"
  - source: data_store-dU7p8Q9r
    target: terminal-tS1s2T3u
    sourceHandle: "success"
  - source: data_store-dU7p8Q9r
    target: terminal-tE7y8Z9a
    sourceHandle: "error"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
