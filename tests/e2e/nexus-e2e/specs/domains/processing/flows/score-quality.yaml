flow:
  id: score-quality
  name: "Score Quality"
  type: traditional
  domain: processing
  description: "Computes a composite quality_score (0-100) from readability, factual density, bias score, and completeness. Updates Content record and emits ContentScored."
  auth:
    required: false

trigger:
  id: trigger-scrQ2eN8
  type: trigger
  label: "event:ContentIngested"
  spec:
    event: "event:ContentIngested"
  connections:
    - targetNodeId: data_store-rdCt3

nodes:
  - id: data_store-rdCt3
    type: data_store
    label: "Load Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: llm_call-score4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: llm_call-score4
    type: llm_call
    label: "Score Quality"
    spec:
      model: claude-opus-4-6
      temperature: 0.1
      max_tokens: 300
      prompt: |
        Score the quality of this content on a scale 0-100.
        Consider: readability (25pts), factual density (25pts), neutrality/bias (25pts), completeness (25pts).

        Title: $.result.title
        Body: $.result.body.substring(0, 2000)
        Known bias_score: $.result.metadata.bias_score || 0
        Known fact_score: $.result.metadata.fact_score || 0

        Return JSON: { "quality_score": 82, "readability": 90, "factual": 80, "neutrality": 75, "completeness": 85 }
      structured_output:
        quality_score:
          type: number
        readability:
          type: number
        factual:
          type: number
        neutrality:
          type: number
        completeness:
          type: number
    connections:
      - targetNodeId: data_store-upd5nR6s
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-upd5nR6s
    type: data_store
    label: "Update Quality Score"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      data:
        quality_score: "$.llm_result.quality_score"
        metadata:
          readability_score: "$.llm_result.readability"
          scored_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-emit-yF3g
    type: event
    label: "Emit ContentScored"
    spec:
      direction: emit
      event_name: ContentScored
      payload:
        content_id: "$.payload.content_id"
        quality_score: "$.llm_result.quality_score"
        auto_approve_eligible: "$.llm_result.quality_score >= 75"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Scored"
    spec:
      outcome: success
      status: 200
      body:
        quality_score: "$.llm_result.quality_score"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
