flow:
  id: ai-consensus-review
  name: "AI Consensus Review"
  type: agent
  domain: processing
  description: "Runs multiple LLM models (GPT-4, Claude) on the same content and reaches consensus via resolve-conflict-agent. Demonstrates multi-model consensus building with conflict resolution."
  auth:
    required: false

trigger:
  id: trigger-aiCon2eN8
  type: trigger
  label: "event:ContentIngested"
  spec:
    event: "event:ContentIngested"
    filter:
      "payload.priority": "high"
  connections:
    - targetNodeId: data_store-rdCt3b

nodes:
  - id: data_store-rdCt3b
    type: data_store
    label: "Load Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: orchestrator-multi4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: orchestrator-multi4
    type: orchestrator
    label: "Multi-Model Consensus Orchestrator"
    spec:
      strategy: consensus
      model: claude-opus-4-6
      agents:
        - flow_ref: processing/fact-check-agent
          role: claude_assessor
        - flow_ref: processing/bias-check-agent
          role: gpt4_assessor
    connections:
      - targetNodeId: decision-conflict5

  - id: decision-conflict5
    type: decision
    label: "Assessors Disagree?"
    spec:
      condition: "$.orchestrator_results.claude_assessor.quality_flag !== $.orchestrator_results.gpt4_assessor.quality_flag"
    connections:
      - targetNodeId: sub_flow-resolve6
        sourceHandle: "true"
      - targetNodeId: transform-merge7
        sourceHandle: "false"

  - id: sub_flow-resolve6
    type: sub_flow
    label: "Resolve Conflict via Arbitrator"
    spec:
      flow_ref: processing/resolve-conflict-agent
    connections:
      - targetNodeId: data_store-upd8

  - id: transform-merge7
    type: transform
    label: "Merge Agreement Result"
    spec:
      mode: expression
      field_mappings:
        final_score: "$.orchestrator_results.claude_assessor.score"
        consensus_method: "agreement"
        confidence: 0.9
        sided_with: "both"
    connections:
      - targetNodeId: data_store-upd8

  - id: data_store-upd8
    type: data_store
    label: "Update Content with Consensus"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      data:
        metadata:
          consensus_score: "$.final_score"
          consensus_method: "$.consensus_method"
          consensus_confidence: "$.confidence"
          sided_with: "$.sided_with"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Consensus Complete"
    spec:
      outcome: success
      status: 200
      body:
        message: "Multi-model consensus analysis complete"
        content_id: "$.payload.content_id"
        consensus_method: "$.consensus_method"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
