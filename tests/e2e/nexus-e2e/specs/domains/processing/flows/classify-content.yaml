flow:
  id: classify-content
  name: "Classify Content"
  type: traditional
  domain: processing
  description: "Uses LLM to assign category, topic tags, and language to a content item. Updates the Content record with classification results."
  auth:
    required: false

trigger:
  id: trigger-clsC2eN8
  type: trigger
  label: "event:ContentIngested"
  spec:
    event: "event:ContentIngested"
  connections:
    - targetNodeId: data_store-rdCt3

nodes:
  - id: data_store-rdCt3
    type: data_store
    label: "Load Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: llm_call-classify4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: llm_call-classify4
    type: llm_call
    label: "Classify with LLM"
    spec:
      model: claude-opus-4-6
      temperature: 0.2
      max_tokens: 500
      prompt: |
        Classify the following content item into one of these categories: technology, politics, business, science, health, sports, entertainment, world, environment, finance.
        Also extract 3-5 topic tags and detect the language.

        Title: $.result.title
        Body (first 1000 chars): $.result.body.substring(0, 1000)

        Respond in JSON format: { "category": "...", "tags": ["..."], "language": "en" }
      structured_output:
        category:
          type: string
          enum: [technology, politics, business, science, health, sports, entertainment, world, environment, finance]
        tags:
          type: array
          items:
            type: string
        language:
          type: string
    connections:
      - targetNodeId: data_store-upd5nR6s
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-upd5nR6s
    type: data_store
    label: "Update Classification"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      data:
        category: "$.llm_result.category"
        metadata:
          tags: "$.llm_result.tags"
          language: "$.llm_result.language"
          classified_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Classified"
    spec:
      outcome: success
      status: 200
      body:
        category: "$.llm_result.category"
        tags: "$.llm_result.tags"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "PROCESSING_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
