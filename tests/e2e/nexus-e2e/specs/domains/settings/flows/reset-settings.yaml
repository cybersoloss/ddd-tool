flow:
  id: reset-settings
  name: "Reset Settings"
  type: traditional
  domain: settings
  description: "Resets all platform settings to seeded defaults. Requires admin role and explicit confirmation token. Invalidates cache and emits SettingsUpdated."
  auth:
    required: true
    roles: [admin]
    strategy: jwt

trigger:
  id: trigger-rStxF2nM
  type: trigger
  label: "POST /api/settings/reset"
  spec:
    event: "HTTP POST /api/settings/reset"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Confirmation"
    spec:
      fields:
        - name: confirm
          type: boolean
          required: true
          description: "Must be true to execute reset"
    connections:
      - targetNodeId: decision-cNf5mQ6s
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: decision-cNf5mQ6s
    type: decision
    label: "Confirmed?"
    spec:
      condition: "$.confirm === true"
    connections:
      - targetNodeId: data_store-del8tV9w
        sourceHandle: "true"
      - targetNodeId: terminal-noconf-xA1b
        sourceHandle: "false"

  - id: data_store-del8tV9w
    type: data_store
    label: "Delete All Settings"
    spec:
      operation: delete_many
      model: Setting
      query:
        where: {}
    connections:
      - targetNodeId: data_store-seed9wX2y
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-seed9wX2y
    type: data_store
    label: "Re-seed Default Settings"
    spec:
      operation: create_many
      model: Setting
      data: "$.default_settings"
    connections:
      - targetNodeId: cache-inv-yF3gH4iJ
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: cache-inv-yF3gH4iJ
    type: cache
    label: "Invalidate Cache"
    spec:
      operation: invalidate
      key: "settings:all"
      store: redis
    connections:
      - targetNodeId: event-emit-kL5mN6oP

  - id: event-emit-kL5mN6oP
    type: event
    label: "Emit SettingsUpdated"
    spec:
      direction: emit
      event_name: SettingsUpdated
      payload:
        changed_keys: ["all"]
        updated_by: "$.auth.user_id"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Reset Complete"
    spec:
      outcome: success
      status: 200
      body:
        message: "Settings reset to defaults"

  - id: terminal-noconf-xA1b
    type: terminal
    label: "Not Confirmed"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"
        message: "confirm must be true"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid Input"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "DB Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
