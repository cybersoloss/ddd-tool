flow:
  id: manage-rules
  name: "Manage Rules"
  type: traditional
  domain: settings
  description: "CRUD for routing/filtering/publishing rules with tree hierarchy. Routes by action param: create, update, toggle, delete (cascades to children)."
  auth:
    required: true
    roles: [admin]
    strategy: jwt

trigger:
  id: trigger-mRul2xN8
  type: trigger
  label: "POST /api/rules/:action"
  spec:
    event: "HTTP POST /api/rules/:action"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Input"
    spec:
      fields:
        - name: action
          type: string
          required: true
          enum: [create, update, toggle, delete, list]
        - name: id
          type: string
          required: false
          description: "Rule ID (required for update/toggle/delete)"
        - name: type
          type: string
          required: false
          enum: [ingestion, routing, publishing]
        - name: name
          type: string
          required: false
        - name: conditions
          type: array
          required: false
        - name: action_value
          type: string
          required: false
          enum: [allow, block, tag, route, enrich]
        - name: priority
          type: number
          required: false
        - name: enabled
          type: boolean
          required: false
        - name: parent_id
          type: string
          required: false
    connections:
      - targetNodeId: smart_router-rAct5kQ7
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: smart_router-rAct5kQ7
    type: smart_router
    label: "Route by Action"
    spec:
      rules:
        - id: list
          condition: "$.action === 'list'"
          route: data_store-list9wX2y
          priority: 1
        - id: create
          condition: "$.action === 'create'"
          route: data_store-crt8tV9w
          priority: 2
        - id: update
          condition: "$.action === 'update'"
          route: data_store-upd3nR6s
          priority: 3
        - id: toggle
          condition: "$.action === 'toggle'"
          route: data_store-tog6mP4q
          priority: 4
        - id: delete
          condition: "$.action === 'delete'"
          route: data_store-del7kO3p
          priority: 5
      fallback_chain: [terminal-inv-aB7cD8eF]
    connections:
      - targetNodeId: data_store-list9wX2y
        sourceHandle: list
      - targetNodeId: data_store-crt8tV9w
        sourceHandle: create
      - targetNodeId: data_store-upd3nR6s
        sourceHandle: update
      - targetNodeId: data_store-tog6mP4q
        sourceHandle: toggle
      - targetNodeId: data_store-del7kO3p
        sourceHandle: delete

  - id: data_store-list9wX2y
    type: data_store
    label: "List Rules"
    spec:
      operation: read
      model: Rule
      query:
        where:
          type: "$.type"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-crt8tV9w
    type: data_store
    label: "Create Rule"
    spec:
      operation: create
      model: Rule
      data:
        type: "$.type"
        name: "$.name"
        condition: "$.conditions"
        action: "$.action_value"
        priority: "$.priority"
        enabled: "$.enabled"
        parent_id: "$.parent_id"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-upd3nR6s
    type: data_store
    label: "Update Rule"
    spec:
      operation: update
      model: Rule
      query:
        where:
          id: "$.id"
      data:
        name: "$.name"
        condition: "$.conditions"
        action: "$.action_value"
        priority: "$.priority"
        enabled: "$.enabled"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: error

  - id: data_store-tog6mP4q
    type: data_store
    label: "Toggle Rule"
    spec:
      operation: update
      model: Rule
      query:
        where:
          id: "$.id"
      data:
        enabled: "$.enabled"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: error

  - id: data_store-del7kO3p
    type: data_store
    label: "Delete Rule + Children"
    spec:
      operation: delete_many
      model: Rule
      query:
        where:
          OR:
            - id: "$.id"
            - parent_id: "$.id"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Success"
    spec:
      outcome: success
      status: 200
      body: "$.result"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-notfound-cD4e
    type: terminal
    label: "Not Found"
    spec:
      outcome: error
      status: 404
      body:
        error: "RULE_NOT_FOUND"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "DB Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
