flow:
  id: manage-rules
  name: "Manage Rules"
  type: traditional
  domain: settings
  description: "Admin-only CRUD operations for system rules"
  auth:
    required: true
    strategy: jwt
    roles:
      - admin

trigger:
  id: trigger-mR1a2B3c
  type: trigger
  position: { x: 250, y: 0 }
  spec:
    event: "http POST /api/v1/settings/rules"
    label: "Rule management endpoint"

nodes:
  - id: input-vR4d5E6f
    type: input
    position: { x: 250, y: 130 }
    spec:
      validate:
        operation:
          required: true
          type: string
        rule:
          required: false
          type: object

  - id: decision-oP7g8H9i
    type: decision
    position: { x: 250, y: 260 }
    spec:
      condition: "$.operation"
      description: "Route to create, read, update, or delete operation"
      branches:
        - value: create
        - value: read
        - value: update
        - value: delete

  - id: data_store-cR1j2K3l
    type: data_store
    position: { x: 0, y: 390 }
    spec:
      operation: create
      model: Rule
      fields:
        - name: name
          value: "$.rule.name"
        - name: condition
          value: "$.rule.condition"
        - name: action
          value: "$.rule.action"

  - id: terminal-sC4m5N6o
    type: terminal
    position: { x: 0, y: 520 }
    spec:
      status: 201
      label: "Rule created"

  - id: data_store-rR7p8Q9r
    type: data_store
    position: { x: 200, y: 390 }
    spec:
      operation: read
      model: Rule
      query:
        where:
          id: "$.rule_id"

  - id: terminal-sR1s2T3u
    type: terminal
    position: { x: 200, y: 520 }
    spec:
      status: 200
      label: "Rule retrieved"

  - id: data_store-uR4v5W6x
    type: data_store
    position: { x: 400, y: 390 }
    spec:
      operation: update
      model: Rule
      query:
        where:
          id: "$.rule_id"
      fields:
        - name: condition
          value: "$.rule.condition"
        - name: action
          value: "$.rule.action"

  - id: terminal-sU7y8Z9a
    type: terminal
    position: { x: 400, y: 520 }
    spec:
      status: 200
      label: "Rule updated"

  - id: data_store-dR1b2C3d
    type: data_store
    position: { x: 600, y: 390 }
    spec:
      operation: delete
      model: Rule
      query:
        where:
          id: "$.rule_id"

  - id: terminal-sD4e5F6g
    type: terminal
    position: { x: 600, y: 520 }
    spec:
      status: 200
      label: "Rule deleted"

  - id: terminal-eV7h8I9j
    type: terminal
    position: { x: 550, y: 130 }
    spec:
      status: 422
      label: "Invalid rule syntax"
      error_code: VALIDATION_ERROR

  - id: terminal-eD1k2L3m
    type: terminal
    position: { x: 550, y: 260 }
    spec:
      status: 500
      label: "Rule operation error"
      error_code: RULE_OPERATION_ERROR

connections:
  - source: trigger-mR1a2B3c
    target: input-vR4d5E6f
    sourceHandle: ""
  - source: input-vR4d5E6f
    target: decision-oP7g8H9i
    sourceHandle: "valid"
  - source: input-vR4d5E6f
    target: terminal-eV7h8I9j
    sourceHandle: "invalid"
  - source: decision-oP7g8H9i
    target: data_store-cR1j2K3l
    sourceHandle: "create"
  - source: decision-oP7g8H9i
    target: data_store-rR7p8Q9r
