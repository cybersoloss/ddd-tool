flow:
  id: update-settings
  name: "Update Settings"
  type: traditional
  domain: settings
  description: "Admin-only endpoint to update a setting with cache invalidation and event emission"
  auth:
    required: true
    strategy: jwt
    roles:
      - admin

trigger:
  id: trigger-uS1a2B3c
  type: trigger
  position: { x: 250, y: 0 }
  spec:
    event: "http PATCH /api/v1/settings"
    label: "Update settings endpoint"

nodes:
  - id: input-vS4d5E6f
    type: input
    position: { x: 250, y: 130 }
    spec:
      validate:
        key:
          required: true
          type: string
        value:
          required: true
          type: any

  - id: data_store-rC7g8H9i
    type: data_store
    position: { x: 250, y: 260 }
    spec:
      operation: read
      model: Setting
      query:
        where:
          key: "$.key"

  - id: data_store-uS1j2K3l
    type: data_store
    position: { x: 250, y: 390 }
    spec:
      operation: update
      model: Setting
      query:
        where:
          key: "$.key"
      fields:
        - name: value
          value: "$.value"
        - name: updated_at
          value: "$.now"

  - id: cache-iS4m5N6o
    type: cache
    position: { x: 250, y: 520 }
    spec:
      operation: invalidate
      key: "settings:all"

  - id: event-sC7p8Q9r
    type: event
    position: { x: 250, y: 650 }
    spec:
      direction: emit
      event_name: SettingsChanged
      payload:
        key: "$.key"
        old_value: "$.current_setting.value"
        new_value: "$.value"

  - id: terminal-sS1s2T3u
    type: terminal
    position: { x: 250, y: 780 }
    spec:
      status: 200
      label: "Setting updated successfully"

  - id: terminal-eV4v5W6x
    type: terminal
    position: { x: 550, y: 130 }
    spec:
      status: 422
      label: "Invalid settings input"
      error_code: VALIDATION_ERROR

  - id: terminal-eD7y8Z9a
    type: terminal
    position: { x: 550, y: 390 }
    spec:
      status: 500
      label: "Data store error"
      error_code: SETTINGS_UPDATE_ERROR

connections:
  - source: trigger-uS1a2B3c
    target: input-vS4d5E6f
    sourceHandle: ""
  - source: input-vS4d5E6f
    target: data_store-rC7g8H9i
    sourceHandle: "valid"
  - source: input-vS4d5E6f
    target: terminal-eV4v5W6x
    sourceHandle: "invalid"
  - source: data_store-rC7g8H9i
    target: data_store-uS1j2K3l
    sourceHandle: "success"
  - source: data_store-rC7g8H9i
    target: terminal-eD7y8Z9a
    sourceHandle: "error"
  - source: data_store-uS1j2K3l
    target: cache-iS4m5N6o
    sourceHandle: "success"
  - source: data_store-uS1j2K3l
    target: terminal-eD7y8Z9a
    sourceHandle: "error"
  - source: cache-iS4m5N6o
    target: event-sC7p8Q9r
    sourceHandle: "success"
  - source: event-sC7p8Q9r
    target: terminal-sS1s2T3u
    sourceHandle: "success"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
