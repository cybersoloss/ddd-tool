flow:
  id: update-settings
  name: "Update Settings"
  type: traditional
  domain: settings
  description: "Updates one or more platform settings. Validates input, upserts each key, invalidates cache, then emits SettingsUpdated event."
  auth:
    required: true
    roles: [admin]
    strategy: jwt

trigger:
  id: trigger-uStxW2mN
  type: trigger
  label: "PATCH /api/settings"
  spec:
    event: "HTTP PATCH /api/settings"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Input"
    spec:
      fields:
        - name: settings
          type: object
          required: true
          description: "Key-value map of settings to update"
    connections:
      - targetNodeId: loop-kQy5nR6s
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: loop-kQy5nR6s
    type: loop
    label: "Upsert Each Setting"
    spec:
      collection: "$.settings"
      iterator: setting_entry
      accumulate: updated_keys
      body_start: data_store-uPs8tV9w
    connections:
      - targetNodeId: data_store-uPs8tV9w
        sourceHandle: body
      - targetNodeId: cache-inv-xA1bC2dE
        sourceHandle: done

  - id: data_store-uPs8tV9w
    type: data_store
    label: "Upsert Setting"
    spec:
      operation: upsert
      model: Setting
      upsert_key: key
      data:
        key: "$.setting_entry.key"
        value: "$.setting_entry.value"
        updated_by: "$.auth.user_id"
    connections:
      - targetNodeId: loop-kQy5nR6s
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: cache-inv-xA1bC2dE
    type: cache
    label: "Invalidate Cache"
    spec:
      operation: invalidate
      key: "settings:all"
      store: redis
    connections:
      - targetNodeId: event-emit-yF3gH4iJ

  - id: event-emit-yF3gH4iJ
    type: event
    label: "Emit SettingsUpdated"
    spec:
      direction: emit
      event_name: SettingsUpdated
      payload:
        changed_keys: "$.updated_keys"
        updated_by: "$.auth.user_id"
    connections:
      - targetNodeId: terminal-ok-kL5mN6oP

  - id: terminal-ok-kL5mN6oP
    type: terminal
    label: "Success"
    spec:
      outcome: success
      status: 200
      body:
        message: "Settings updated"
        updated_keys: "$.updated_keys"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid Input"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "DB Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
