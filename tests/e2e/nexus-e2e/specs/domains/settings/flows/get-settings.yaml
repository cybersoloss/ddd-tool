flow:
  id: get-settings
  name: "Get Settings"
  type: traditional
  domain: settings
  description: "Returns all platform settings as a typed key-value map. Checks Redis cache first; on miss, reads from DB and caches result."
  auth:
    required: true
    strategy: jwt

trigger:
  id: trigger-gStxR2kN
  type: trigger
  label: "GET /api/settings"
  spec:
    event: "HTTP GET /api/settings"
  connections:
    - targetNodeId: cache-hMp3nT4q
      sourceHandle: default

nodes:
  - id: cache-hMp3nT4q
    type: cache
    label: "Check Settings Cache"
    spec:
      operation: check
      key: "settings:all"
      store: redis
      ttl_ms: 300000
    connections:
      - targetNodeId: terminal-cached-oRy9
        sourceHandle: hit
      - targetNodeId: data_store-jKw5vL6r
        sourceHandle: miss

  - id: data_store-jKw5vL6r
    type: data_store
    label: "Read All Settings"
    spec:
      operation: read
      model: Setting
      query:
        where: {}
      returning: true
    connections:
      - targetNodeId: cache-setNPx7mQ8s
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: cache-setNPx7mQ8s
    type: cache
    label: "Cache Settings"
    spec:
      operation: set
      key: "settings:all"
      store: redis
      ttl_ms: 300000
      value: "$.result"
    connections:
      - targetNodeId: terminal-ok-oRy9tU1v

  - id: terminal-cached-oRy9
    type: terminal
    label: "Return Cached"
    spec:
      outcome: success
      status: 200
      body: "$.cached_value"

  - id: terminal-ok-oRy9tU1v
    type: terminal
    label: "Return Settings"
    spec:
      outcome: success
      status: 200
      body: "$.result"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
