flow:
  id: get-settings
  name: "Get Settings"
  type: traditional
  domain: settings
  description: "Retrieves system settings with Redis caching"
  auth:
    required: true
    strategy: jwt

trigger:
  id: trigger-gS1a2B3c
  type: trigger
  position: { x: 250, y: 0 }
  spec:
    event: "http GET /api/v1/settings"
    label: "Get settings endpoint"

nodes:
  - id: cache-cS4d5E6f
    type: cache
    position: { x: 250, y: 130 }
    spec:
      operation: get
      key: "settings:all"
      store: redis
      ttl_ms: 600000

  - id: terminal-hS7g8H9i
    type: terminal
    position: { x: 550, y: 130 }
    spec:
      status: 200
      label: "Cache hit - return cached settings"

  - id: data_store-rS1j2K3l
    type: data_store
    position: { x: 250, y: 260 }
    spec:
      operation: read
      model: Setting

  - id: cache-sS4m5N6o
    type: cache
    position: { x: 250, y: 390 }
    spec:
      operation: set
      key: "settings:all"
      store: redis
      ttl_ms: 600000

  - id: terminal-sS7p8Q9r
    type: terminal
    position: { x: 250, y: 520 }
    spec:
      status: 200
      label: "Settings retrieved"

  - id: terminal-eS1s2T3u
    type: terminal
    position: { x: 550, y: 260 }
    spec:
      status: 500
      label: "Data store error"
      error_code: SETTINGS_READ_ERROR

connections:
  - source: trigger-gS1a2B3c
    target: cache-cS4d5E6f
    sourceHandle: ""
  - source: cache-cS4d5E6f
    target: terminal-hS7g8H9i
    sourceHandle: "hit"
  - source: cache-cS4d5E6f
    target: data_store-rS1j2K3l
    sourceHandle: "miss"
  - source: data_store-rS1j2K3l
    target: cache-sS4m5N6o
    sourceHandle: "success"
  - source: data_store-rS1j2K3l
    target: terminal-eS1s2T3u
    sourceHandle: "error"
  - source: cache-sS4m5N6o
    target: terminal-sS7p8Q9r
    sourceHandle: "success"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
