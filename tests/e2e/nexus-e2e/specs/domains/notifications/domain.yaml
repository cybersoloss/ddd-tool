name: "Notifications"
description: "Delivers in-app, email, and Slack notifications. Routes notifications by user preference and event type. Supports real-time WebSocket push, batch digest, and templated messaging via SendGrid."
role: process
auth:
  required: true
  strategy: jwt

owns_schemas: ["Notification"]

depends_on:
  - domain: users
    reason: Reads User notification preferences and contact info
    flows_affected: [route-notification, send-templated-notification, send-batch-digest]

flows:
  - id: route-notification
    name: "Route Notification"
    description: "Receives any notification event and routes to the correct delivery channel(s) based on user preferences."
    type: traditional
    tags: [internal]
    criticality: high

  - id: send-realtime-alert
    name: "Send Realtime Alert"
    description: "Pushes an urgent notification to a user via WebSocket. Falls back to email if user is offline."
    type: traditional
    tags: [internal]
    criticality: high

  - id: send-templated-notification
    name: "Send Templated Notification"
    description: "Sends an email notification using a SendGrid dynamic template. Handles unsubscribe and bounce tracking."
    type: traditional
    tags: [internal]
    criticality: normal

  - id: send-batch-digest
    name: "Send Batch Digest"
    description: "Cron job that aggregates pending notifications per user and sends daily/weekly digest emails."
    type: traditional
    tags: [cron, internal]
    criticality: normal

  - id: get-notification-preferences
    name: "Get Notification Preferences"
    description: "Returns a user's current notification settings and recent notification history."
    type: traditional
    tags: [public-api]
    criticality: low

groups:
  - id: delivery
    name: "Delivery"
    flows: [route-notification, send-realtime-alert, send-templated-notification]
  - id: batch
    name: "Batch & Preferences"
    flows: [send-batch-digest, get-notification-preferences]

publishes_events:
  - event: NotificationSent
    schema: Notification
    from_flow: route-notification
    description: "Fired after a notification is delivered — for audit and tracking"
    payload:
      notification_id: string
      user_id: string
      channel: string
      event_type: string

consumes_events:
  - event: UserRegistered
    from_domain: users
    description: "Sends welcome email to newly registered users"
    handled_by: send-templated-notification

  - event: ContentApproved
    from_domain: editorial
    description: "Notifies content author when their submission is approved"
    handled_by: route-notification

  - event: ContentRejected
    from_domain: editorial
    description: "Notifies content author with rejection reason"
    handled_by: route-notification

  - event: ReviewAssigned
    from_domain: editorial
    description: "Notifies reviewer of new assignment"
    handled_by: send-realtime-alert

  - event: AnomalyDetected
    from_domain: analytics
    description: "Sends urgent anomaly alert to admins"
    handled_by: send-realtime-alert

  - event: PublishFailed
    from_domain: publishing
    description: "Notifies editors when a publish attempt fails"
    handled_by: route-notification

  - event: DailyReportGenerated
    from_domain: analytics
    description: "Delivers daily report email to admins"
    handled_by: send-templated-notification

  - event: WeeklyDigestReady
    from_domain: analytics
    description: "Sends weekly digest to subscribed users"
    handled_by: send-batch-digest

  - event: AlertTriggered
    from_domain: monitoring
    description: "Sends critical system alert notifications"
    handled_by: send-realtime-alert

layout:
  flows:
    route-notification: { x: 400, y: 100 }
    send-realtime-alert: { x: 100, y: 300 }
    send-templated-notification: { x: 400, y: 300 }
    send-batch-digest: { x: 700, y: 300 }
    get-notification-preferences: { x: 400, y: 500 }
  portals: {}

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
