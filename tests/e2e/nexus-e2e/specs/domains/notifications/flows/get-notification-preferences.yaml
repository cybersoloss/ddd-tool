flow:
  id: get-notification-preferences
  name: "Get Notification Preferences"
  type: traditional
  domain: notifications
  description: "Returns a user's current notification settings and recent notification history (last 20 items)."
  auth:
    required: true
    strategy: jwt

trigger:
  id: trigger-gNPr2xN8
  type: trigger
  label: "GET /api/notifications/preferences"
  spec:
    event: "HTTP GET /api/notifications/preferences"
  connections:
    - targetNodeId: parallel-fetch4kQ7p

nodes:
  - id: parallel-fetch4kQ7p
    type: parallel
    label: "Fetch Prefs + History"
    spec:
      failure_policy: best_effort
      branches:
        - id: prefs
          label: "Load Preferences"
        - id: history
          label: "Load History"
    connections:
      - targetNodeId: data_store-rdPrefs5
        sourceHandle: branch-0
      - targetNodeId: data_store-rdHist6
        sourceHandle: branch-1
      - targetNodeId: transform-merge7
        sourceHandle: done

  - id: data_store-rdPrefs5
    type: data_store
    label: "Fetch Settings"
    spec:
      operation: read
      model: Setting
      query:
        where:
          key:
            in: [email_enabled, slack_enabled, slack_webhook_url, notify_event_types, digest_frequency]
      returning: true
    connections:
      - targetNodeId: parallel-fetch4kQ7p

  - id: data_store-rdHist6
    type: data_store
    label: "Fetch Notifications"
    spec:
      operation: read
      model: Notification
      query:
        where:
          user_id: "$.auth.user_id"
        limit: 20
        order_by:
          created_at: desc
      returning: true
    connections:
      - targetNodeId: parallel-fetch4kQ7p

  - id: transform-merge7
    type: transform
    label: "Merge Response"
    spec:
      mode: expression
      field_mappings:
        preferences: "$.branch_results.prefs"
        notifications: "$.branch_results.history"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Return Prefs"
    spec:
      outcome: success
      status: 200
      body: "$.result"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
