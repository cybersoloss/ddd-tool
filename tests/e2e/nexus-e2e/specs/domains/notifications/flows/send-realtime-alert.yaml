flow:
  id: send-realtime-alert
  name: "Send Realtime Alert"
  type: traditional
  domain: notifications
  description: "Pushes an urgent in-app notification to a user via WebSocket. Falls back to email via SendGrid if user is offline."
  auth:
    required: false

trigger:
  id: trigger-sRal2eN8
  type: trigger
  label: "event:AlertTriggered"
  spec:
    event: "event:AlertTriggered"
  connections:
    - targetNodeId: websocket_broadcast-push4

nodes:
  - id: websocket_broadcast-push4
    type: websocket_broadcast
    label: "Push to User"
    spec:
      channel: "user-$.payload.user_id"
      event_name: notification
      payload:
        type: "$.payload.alert_type || $.event_name"
        message: "$.payload.message"
        severity: "$.payload.severity"
        timestamp: "$.now()"
      include_sender: false
    connections:
      - targetNodeId: decision-online5

  - id: decision-online5
    type: decision
    label: "User Online?"
    spec:
      condition: "$.broadcast_result.delivered > 0"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: "true"
      - targetNodeId: service_call-email6
        sourceHandle: "false"

  - id: service_call-email6
    type: service_call
    label: "Fallback Email"
    spec:
      method: POST
      integration: sendgrid
      url: "https://api.sendgrid.com/v3/mail/send"
      request_config:
        body:
          template_id: "d-alert-template"
          personalizations:
            - to: [{ email: "$.payload.email" }]
              dynamic_template_data: "$.payload"
      error_mapping:
        429: RATE_LIMITED
      fallback:
        value: { sent: false }
        log: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Alert Sent"
    spec:
      outcome: success
      status: 200
      body:
        message: "Alert sent"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
