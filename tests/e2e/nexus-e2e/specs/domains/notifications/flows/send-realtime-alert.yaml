flow:
  id: send-realtime-alert
  name: "Send Realtime Alert"
  type: traditional
  domain: notifications
  description: "Multi-channel alert delivery via email and Slack in parallel with best-effort policy"

trigger:
  id: trigger-sA1a2B3c
  type: trigger
  position: { x: 250, y: 0 }
  spec:
    event: "event:AlertTriggered"
    label: "Alert triggered"

nodes:
  - id: parallel-mC4d5E6f
    type: parallel
    position: { x: 250, y: 130 }
    spec:
      failure_policy: best_effort
      merge_strategy: collect_success
      branches:
        - id: branch-0
          output_key: email
        - id: branch-1
          output_key: slack

  - id: service_call-sE7g8H9i
    type: service_call
    position: { x: 100, y: 260 }
    spec:
      service: SendGrid
      method: send
      integration: sendgrid
      description: "Send alert email via SendGrid"
      params:
        template: alert
        to: "$.recipient_email"
        data: "$.alert"

  - id: service_call-sS1j2K3l
    type: service_call
    position: { x: 400, y: 260 }
    spec:
      service: Slack
      method: webhook
      description: "Send alert to Slack via webhook"
      params:
        channel: "$.alert_channel"
        message: "$.alert_message"

  - id: data_store-cN4m5N6o
    type: data_store
    position: { x: 250, y: 390 }
    spec:
      operation: create
      model: Notification
      fields:
        - name: type
          value: "realtime_alert"
        - name: channels
          value: "$.delivered_channels"
        - name: alert_data
          value: "$.alert"
        - name: sent_at
          value: "$.now"

  - id: terminal-sA7p8Q9r
    type: terminal
    position: { x: 250, y: 520 }
    spec:
      status: 200
      label: "Alert sent successfully"

  - id: terminal-eN1s2T3u
    type: terminal
    position: { x: 550, y: 390 }
    spec:
      status: 500
      label: "Notification store error"
      error_code: NOTIFICATION_STORE_ERROR

connections:
  - source: trigger-sA1a2B3c
    target: parallel-mC4d5E6f
    sourceHandle: ""
  - source: parallel-mC4d5E6f
    target: service_call-sE7g8H9i
    sourceHandle: "branch-0"
  - source: parallel-mC4d5E6f
    target: service_call-sS1j2K3l
    sourceHandle: "branch-1"
  - source: service_call-sE7g8H9i
    target: parallel-mC4d5E6f
    sourceHandle: "complete"
  - source: service_call-sS1j2K3l
    target: parallel-mC4d5E6f
    sourceHandle: "complete"
  - source: parallel-mC4d5E6f
    target: data_store-cN4m5N6o
    sourceHandle: "merged"
  - source: data_store-cN4m5N6o
    target: terminal-sA7p8Q9r
    sourceHandle: "success"
  - source: data_store-cN4m5N6o
    target: terminal-eN1s2T3u
    sourceHandle: "error"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
