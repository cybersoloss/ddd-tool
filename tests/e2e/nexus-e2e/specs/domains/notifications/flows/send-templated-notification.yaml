flow:
  id: send-templated-notification
  name: "Send Templated Notification"
  type: traditional
  domain: notifications
  description: "Sends an email or Slack notification using a SendGrid dynamic template. Handles unsubscribe checks and bounce tracking."
  auth:
    required: false

trigger:
  id: trigger-sTpl2eN8
  type: trigger
  label: "event:UserRegistered"
  spec:
    event: "event:UserRegistered"
  connections:
    - targetNodeId: data_store-rdUser5

nodes:
  - id: data_store-rdUser5
    type: data_store
    label: "Load User + Prefs"
    spec:
      operation: read
      model: User
      query:
        where:
          id: "$.payload.user_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-nf8tV9w
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-nf8tV9w
    type: decision
    label: "User Found?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: guardrail-unsubCheck6
        sourceHandle: "true"
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: "false"

  - id: guardrail-unsubCheck6
    type: guardrail
    label: "Check Unsubscribed"
    spec:
      checks:
        - type: business_rule
          rule: "$.result.metadata.email_unsubscribed !== true"
          message: "User has unsubscribed from emails"
    connections:
      - targetNodeId: service_call-sg7
        sourceHandle: pass
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: block

  - id: service_call-sg7
    type: service_call
    label: "Send via SendGrid"
    spec:
      method: POST
      integration: sendgrid
      url: "https://api.sendgrid.com/v3/mail/send"
      request_config:
        body:
          template_id: "$.template_id || 'd-default-template'"
          personalizations:
            - to: [{ email: "$.result.email" }]
              dynamic_template_data: "$.payload"
      error_mapping:
        429: RATE_LIMITED
        400: VALIDATION_ERROR
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Sent"
    spec:
      outcome: success
      status: 200
      body:
        message: "Notification sent"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 502
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
