flow:
  id: send-batch-digest
  name: "Send Batch Digest"
  type: traditional
  domain: notifications
  description: "Cron job that aggregates unread notifications per user and sends batched email digests based on each user's digest_frequency preference."
  auth:
    required: false

trigger:
  id: trigger-sBat2cN8
  type: trigger
  label: "cron 0 8 * * *"
  spec:
    event: "cron 0 8 * * *"
    job_config:
      queue: notification-digest
      concurrency: 5
      timeout: 120000
      retry:
        attempts: 2
        backoff: exponential
  connections:
    - targetNodeId: data_store-rdUsers5

nodes:
  - id: data_store-rdUsers5
    type: data_store
    label: "Fetch Users with Pending Notifs"
    spec:
      operation: aggregate
      model: Notification
      query:
        where:
          read: false
          created_at:
            gte: "$.yesterday()"
      aggregate_fields:
        - function: count
          field: id
          alias: pending_count
      group_by: [user_id]
      returning: true
    connections:
      - targetNodeId: collection-filt6kQ7
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: collection-filt6kQ7
    type: collection
    label: "Filter Daily/Weekly Users"
    spec:
      operation: filter
      input: "$.result"
      output: digest_users
      predicate: "$.item.pending_count > 0"
    connections:
      - targetNodeId: batch-send7nR6s
        sourceHandle: result
      - targetNodeId: terminal-ok-empty
        sourceHandle: empty

  - id: batch-send7nR6s
    type: batch
    label: "Send Digest per User"
    spec:
      input: "$.digest_users"
      sub_flow_ref: notifications/send-templated-notification
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: done
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Digests Sent"
    spec:
      outcome: success
      status: 200
      body:
        message: "Batch digest sent"

  - id: terminal-ok-empty
    type: terminal
    label: "No Pending"
    spec:
      outcome: success
      status: 200
      body:
        message: "No pending notifications"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
