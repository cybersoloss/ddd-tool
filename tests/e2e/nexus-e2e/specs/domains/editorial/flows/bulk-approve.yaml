flow:
  id: bulk-approve
  name: "Bulk Approve"
  type: traditional
  domain: editorial
  description: "Approves multiple content items at once. Items must all be in 'review' status and meet minimum quality threshold. Uses update_many for efficiency."
  auth:
    required: true
    roles: [admin, editor]
    strategy: jwt

trigger:
  id: trigger-bulkA2xN8
  type: trigger
  label: "POST /api/editorial/bulk-approve"
  spec:
    event: "HTTP POST /api/editorial/bulk-approve"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Input"
    spec:
      fields:
        - name: content_ids
          type: array
          required: true
          min_items: 1
          max_items: 100
        - name: quality_threshold
          type: number
          required: false
          default: 75
    connections:
      - targetNodeId: data_store-upd3nR6s
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-upd3nR6s
    type: data_store
    label: "Bulk Approve Eligible Items"
    spec:
      operation: update_many
      model: Content
      query:
        where:
          id:
            in: "$.content_ids"
          status: review
          quality_score:
            gte: "$.quality_threshold"
      data:
        status: approved
        metadata:
          reviewer_id: "$.auth.user_id"
          bulk_approved: true
          reviewed_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-emit-yF3g
    type: event
    label: "Emit BulkApproveInitiated"
    spec:
      direction: emit
      event_name: BulkApproveInitiated
      payload:
        content_ids: "$.content_ids"
        initiator_id: "$.auth.user_id"
        threshold: "$.quality_threshold"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Bulk Approved"
    spec:
      outcome: success
      status: 200
      body:
        approved_count: "$.result.count"
        skipped_count: "$.content_ids.length - $.result.count"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
