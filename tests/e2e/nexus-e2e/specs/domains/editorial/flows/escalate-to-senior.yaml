flow:
  id: escalate-to-senior
  name: "Escalate to Senior"
  type: traditional
  domain: editorial
  description: "Escalates a flagged content item to a senior editor, optionally with a context note. Updates assignment metadata and sends a realtime notification."
  auth:
    required: true
    roles: [admin, editor, reviewer]
    strategy: jwt

trigger:
  id: trigger-escSr2xN8
  type: trigger
  label: "POST /api/editorial/:id/escalate"
  spec:
    event: "HTTP POST /api/editorial/:id/escalate"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate"
    spec:
      fields:
        - name: id
          type: string
          required: true
          format: uuid
        - name: senior_editor_id
          type: string
          required: true
          format: uuid
        - name: note
          type: string
          required: false
          max_length: 1000
    connections:
      - targetNodeId: data_store-upd3nR6s
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-upd3nR6s
    type: data_store
    label: "Update Escalation"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.id"
          status: review
      data:
        metadata:
          reviewer_id: "$.senior_editor_id"
          escalated_by: "$.auth.user_id"
          escalated_at: "$.now()"
          escalation_note: "$.note"
      returning: true
    connections:
      - targetNodeId: decision-nf8tV9w
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-nf8tV9w
    type: decision
    label: "Content Found?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: sub_flow-notify3
        sourceHandle: "true"
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: "false"

  - id: sub_flow-notify3
    type: sub_flow
    label: "Notify Senior Editor"
    spec:
      flow_ref: notifications/send-realtime-alert
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Escalated"
    spec:
      outcome: success
      status: 200
      body:
        content_id: "$.id"
        escalated_to: "$.senior_editor_id"

  - id: terminal-notfound-cD4e
    type: terminal
    label: "Not Found"
    spec:
      outcome: error
      status: 404
      body:
        error: "CONTENT_NOT_FOUND"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
