flow:
  id: assign-reviewer
  name: "Assign Reviewer"
  type: traditional
  domain: editorial
  description: "Assigns or reassigns a content item to a specific reviewer. Validates reviewer exists and has the correct role. Emits ReviewAssigned event."
  auth:
    required: true
    roles: [admin, editor]
    strategy: jwt

trigger:
  id: trigger-assR2xN8
  type: trigger
  label: "POST /api/editorial/:id/assign"
  spec:
    event: "HTTP POST /api/editorial/:id/assign"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate"
    spec:
      fields:
        - name: id
          type: string
          required: true
          format: uuid
          description: "Content ID"
        - name: reviewer_id
          type: string
          required: true
          format: uuid
    connections:
      - targetNodeId: parallel-check4
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: parallel-check4
    type: parallel
    label: "Validate Content + Reviewer"
    spec:
      branches:
        - id: content
          label: "Check Content"
        - id: reviewer
          label: "Check Reviewer"
    connections:
      - targetNodeId: data_store-rdCt5kQ7
        sourceHandle: branch-0
      - targetNodeId: data_store-rdUser6
        sourceHandle: branch-1
      - targetNodeId: decision-bothFound7
        sourceHandle: done

  - id: data_store-rdCt5kQ7
    type: data_store
    label: "Fetch Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.id"
          status: review
      safety: strict
      returning: true
    connections:
      - targetNodeId: parallel-check4

  - id: data_store-rdUser6
    type: data_store
    label: "Fetch Reviewer"
    spec:
      operation: read
      model: User
      query:
        where:
          id: "$.reviewer_id"
          deleted_at: null
      safety: strict
      returning: true
    connections:
      - targetNodeId: parallel-check4

  - id: decision-bothFound7
    type: decision
    label: "Both Valid?"
    spec:
      condition: "$.branch_results.content !== null && $.branch_results.reviewer !== null"
    connections:
      - targetNodeId: data_store-upd3nR6s
        sourceHandle: "true"
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: "false"

  - id: data_store-upd3nR6s
    type: data_store
    label: "Update Reviewer Assignment"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.id"
      data:
        metadata:
          reviewer_id: "$.reviewer_id"
          assigned_by: "$.auth.user_id"
          assigned_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-emit-yF3g
    type: event
    label: "Emit ReviewAssigned"
    spec:
      direction: emit
      event_name: ReviewAssigned
      payload:
        content_id: "$.id"
        reviewer_id: "$.reviewer_id"
        assigned_by: "$.auth.user_id"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Assigned"
    spec:
      outcome: success
      status: 200
      body:
        content_id: "$.id"
        reviewer_id: "$.reviewer_id"

  - id: terminal-notfound-cD4e
    type: terminal
    label: "Not Found"
    spec:
      outcome: error
      status: 404
      body:
        error: "NOT_FOUND"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
