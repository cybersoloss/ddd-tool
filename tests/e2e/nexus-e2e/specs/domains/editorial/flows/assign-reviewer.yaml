flow:
  id: assign-reviewer
  name: Assign Reviewer
  description: Assigns a reviewer to content based on lowest workload
  type: traditional
  domain: editorial
  version: "1.0.0"
  trigger:
    type: http
    method: POST
    path: /api/v1/editorial/assign
  auth:
    required: true
    strategy: jwt
    roles:
      - admin
      - editor

nodes:
  - id: trigger-z5a6b7c8
    type: trigger
    name: HTTP POST Assign Reviewer
    config:
      method: POST
      path: /api/v1/editorial/assign

  - id: input-d9e0f1g2
    type: input
    name: Validate Assignment Input
    config:
      fields:
        - name: content_id
          type: string
          required: true

  - id: data_store-h3i4j5k6
    type: data_store
    name: Read Reviewers with Workload
    config:
      operation: read
      model: Reviewer
      query:
        active: true
      include:
        - relation: "assigned_content"
          as: "workload_stats"

  - id: decision-l7m8n9o0
    type: decision
    name: Find Lowest Workload
    config:
      condition: "$.reviewers.sort((a, b) => a.workload_stats.length - b.workload_stats.length)[0]"
      label: find lowest workload

  - id: data_store-p1q2r3s4
    type: data_store
    name: Update Content Reviewer
    config:
      operation: update
      model: Content
      query:
        id: "$.content_id"
      set:
        reviewer_id: "$.selected_reviewer.id"

  - id: terminal-t5u6v7w8
    type: terminal
    name: Assignment Success
    config:
      status: 200
      response_type: json

  - id: terminal-x9y0z1a2
    type: terminal
    name: Validation Error
    config:
      status: 422
      response_type: error

  - id: terminal-b3c4d5e6
    type: terminal
    name: Data Store Error
    config:
      status: 500
      response_type: error

connections:
  - from: trigger-z5a6b7c8
    to: input-d9e0f1g2

  - from: input-d9e0f1g2
    to: data_store-h3i4j5k6

  - from: input-d9e0f1g2
    to: terminal-x9y0z1a2
    handle: invalid

  - from: data_store-h3i4j5k6
    to: decision-l7m8n9o0

  - from: data_store-h3i4j5k6
    to: terminal-b3c4d5e6
    handle: error

  - from: decision-l7m8n9o0
    to: data_store-p1q2r3s4

  - from: data_store-p1q2r3s4
    to: terminal-t5u6v7w8

  - from: data_store-p1q2r3s4
    to: terminal-b3c4d5e6
    handle: error

metadata:
  created_at: "2026-03-14T00:00:00Z"
  updated_at: "2026-03-14T00:00:00Z"
