flow:
  id: quick-approve
  name: "Quick Approve"
  type: traditional
  domain: editorial
  description: "One-click approval for high-quality content (quality_score >= threshold). Triggered by Cmd+Shift+A keyboard shortcut. Skips the full review form."
  auth:
    required: true
    roles: [admin, editor, reviewer]
    strategy: jwt
  keyboard_shortcut: "Cmd+Shift+A"

trigger:
  id: trigger-qApp2xN8
  type: trigger
  label: "POST /api/editorial/:id/quick-approve"
  spec:
    event: "HTTP POST /api/editorial/:id/quick-approve"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate ID"
    spec:
      fields:
        - name: id
          type: string
          required: true
          format: uuid
    connections:
      - targetNodeId: data_store-rdCt5kQ7
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdCt5kQ7
    type: data_store
    label: "Fetch Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.id"
          status: review
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-nf8tV9w
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-nf8tV9w
    type: decision
    label: "Found?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: sub_flow-threshold3
        sourceHandle: "true"
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: "false"

  - id: sub_flow-threshold3
    type: sub_flow
    label: "Load Quality Threshold"
    spec:
      flow_ref: settings/get-settings
    connections:
      - targetNodeId: decision-qualityOk5

  - id: decision-qualityOk5
    type: decision
    label: "Meets Threshold?"
    spec:
      condition: "$.result.quality_score >= ($.settings.quality_threshold || 75)"
    connections:
      - targetNodeId: data_store-approve6
        sourceHandle: "true"
      - targetNodeId: terminal-below-xA1b
        sourceHandle: "false"

  - id: data_store-approve6
    type: data_store
    label: "Set Approved"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.id"
      data:
        status: approved
        metadata:
          reviewer_id: "$.auth.user_id"
          quick_approved: true
          reviewed_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-emit-yF3g
    type: event
    label: "Emit ContentApproved"
    spec:
      direction: emit
      event_name: ContentApproved
      payload:
        content_id: "$.id"
        reviewer_id: "$.auth.user_id"
        approved_at: "$.now()"
        quality_score: "$.result.quality_score"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Approved"
    spec:
      outcome: success
      status: 200
      body:
        message: "Content approved"
        content_id: "$.id"

  - id: terminal-below-xA1b
    type: terminal
    label: "Below Threshold"
    spec:
      outcome: error
      status: 422
      body:
        error: "VALIDATION_ERROR"
        message: "Quality score below auto-approve threshold"

  - id: terminal-notfound-cD4e
    type: terminal
    label: "Not Found"
    spec:
      outcome: error
      status: 404
      body:
        error: "CONTENT_NOT_FOUND"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
