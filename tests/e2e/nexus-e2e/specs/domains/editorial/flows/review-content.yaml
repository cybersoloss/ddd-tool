flow:
  id: review-content
  name: "Review Content"
  type: traditional
  domain: editorial
  description: "Reviewer submits an approval, rejection, escalation, or defer decision. Updates content status and fires the appropriate event."
  auth:
    required: true
    roles: [admin, editor, reviewer]
    strategy: jwt

trigger:
  id: trigger-revC2xN8
  type: trigger
  label: "POST /api/editorial/review/:id"
  spec:
    event: "HTTP POST /api/editorial/review/:id"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Review"
    spec:
      fields:
        - name: id
          type: string
          required: true
          format: uuid
        - name: action
          type: string
          required: true
          enum: [approve, reject, escalate, defer]
        - name: reason
          type: string
          required: false
          description: "Required for reject action"
        - name: escalate_to
          type: string
          required: false
          description: "User ID for escalation target"
    connections:
      - targetNodeId: data_store-rdCt5kQ7
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdCt5kQ7
    type: data_store
    label: "Fetch Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.id"
          status: review
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-nf8tV9w
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-nf8tV9w
    type: decision
    label: "Found?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: smart_router-action7
        sourceHandle: "true"
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: "false"

  - id: smart_router-action7
    type: smart_router
    label: "Route by Action"
    spec:
      rules:
        - id: approve
          condition: "$.action === 'approve'"
          route: data_store-approve8
          priority: 1
        - id: reject
          condition: "$.action === 'reject'"
          route: data_store-reject9
          priority: 2
        - id: escalate
          condition: "$.action === 'escalate'"
          route: data_store-escalate0
          priority: 3
        - id: defer
          condition: "$.action === 'defer'"
          route: data_store-defer1
          priority: 4
      fallback_chain: [terminal-inv-aB7cD8eF]
    connections:
      - targetNodeId: data_store-approve8
        sourceHandle: approve
      - targetNodeId: data_store-reject9
        sourceHandle: reject
      - targetNodeId: data_store-escalate0
        sourceHandle: escalate
      - targetNodeId: data_store-defer1
        sourceHandle: defer

  - id: data_store-approve8
    type: data_store
    label: "Set Approved"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.id"
      data:
        status: approved
        metadata:
          reviewer_id: "$.auth.user_id"
          reviewed_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: event-approved-emit
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-reject9
    type: data_store
    label: "Set Rejected + Log"
    spec:
      operation: create
      model: ContentRejection
      data:
        content_id: "$.id"
        reason: "$.reason"
        rejected_by: "$.auth.user_id"
        rejected_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: data_store-rejStatus
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-rejStatus
    type: data_store
    label: "Set Status Rejected"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.id"
      data:
        status: review
        metadata:
          reviewer_id: "$.auth.user_id"
          rejection_id: "$.result.id"
      returning: true
    connections:
      - targetNodeId: event-rejected-emit
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-escalate0
    type: data_store
    label: "Escalate Assignment"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.id"
      data:
        metadata:
          reviewer_id: "$.escalate_to"
          escalated_by: "$.auth.user_id"
          escalated_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-defer1
    type: data_store
    label: "Defer Review"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.id"
      data:
        metadata:
          deferred_by: "$.auth.user_id"
          deferred_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-approved-emit
    type: event
    label: "Emit ContentApproved"
    spec:
      direction: emit
      event_name: ContentApproved
      payload:
        content_id: "$.id"
        reviewer_id: "$.auth.user_id"
        approved_at: "$.now()"
        quality_score: "$.result.quality_score"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: event-rejected-emit
    type: event
    label: "Emit ContentRejected"
    spec:
      direction: emit
      event_name: ContentRejected
      payload:
        content_id: "$.id"
        reviewer_id: "$.auth.user_id"
        reason: "$.reason"
        rejected_at: "$.now()"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Reviewed"
    spec:
      outcome: success
      status: 200
      body:
        action: "$.action"
        content_id: "$.id"

  - id: terminal-notfound-cD4e
    type: terminal
    label: "Not Found or Wrong Status"
    spec:
      outcome: error
      status: 404
      body:
        error: "CONTENT_NOT_FOUND"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
