flow:
  id: get-review-stats
  name: Get Review Stats
  description: Returns aggregated review statistics with Redis caching
  type: traditional
  domain: editorial
  version: "1.0.0"
  trigger:
    type: http
    method: GET
    path: /api/v1/editorial/stats
  auth:
    required: true
    strategy: jwt

nodes:
  - id: trigger-z9a0b1c2
    type: trigger
    name: HTTP GET Review Stats
    config:
      method: GET
      path: /api/v1/editorial/stats

  - id: cache-d3e4f5g6
    type: cache
    name: Check Stats Cache
    config:
      operation: check
      key: "review-stats"
      store: redis

  - id: data_store-h7i8j9k0
    type: data_store
    name: Aggregate Content Stats
    config:
      operation: aggregate
      model: Content
      aggregate_fields:
        - function: count
          field: id
          alias: total
      group_by:
        - status

  - id: cache-l1m2n3o4
    type: cache
    name: Set Stats Cache
    config:
      operation: set
      key: "review-stats"
      store: redis
      ttl_ms: 300000

  - id: terminal-p5q6r7s8
    type: terminal
    name: Cache Hit Response
    config:
      status: 200
      response_type: json

  - id: terminal-t9u0v1w2
    type: terminal
    name: Stats Response
    config:
      status: 200
      response_type: json

  - id: terminal-x3y4z5a6
    type: terminal
    name: Data Store Error
    config:
      status: 500
      response_type: error

connections:
  - from: trigger-z9a0b1c2
    to: cache-d3e4f5g6

  - from: cache-d3e4f5g6
    to: terminal-p5q6r7s8
    handle: hit

  - from: cache-d3e4f5g6
    to: data_store-h7i8j9k0
    handle: miss

  - from: data_store-h7i8j9k0
    to: cache-l1m2n3o4

  - from: data_store-h7i8j9k0
    to: terminal-x3y4z5a6
    handle: error

  - from: cache-l1m2n3o4
    to: terminal-t9u0v1w2

metadata:
  created_at: "2026-03-14T00:00:00Z"
  updated_at: "2026-03-14T00:00:00Z"
