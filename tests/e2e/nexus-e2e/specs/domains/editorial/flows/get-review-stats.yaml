flow:
  id: get-review-stats
  name: "Get Review Stats"
  type: traditional
  domain: editorial
  description: "Returns reviewer performance stats: items reviewed, avg review time, approval rate, and rejection rate over a configurable time window."
  auth:
    required: true
    roles: [admin, editor]
    strategy: jwt

trigger:
  id: trigger-grvSt2xN8
  type: trigger
  label: "GET /api/editorial/stats"
  spec:
    event: "HTTP GET /api/editorial/stats"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Params"
    spec:
      fields:
        - name: reviewer_id
          type: string
          required: false
        - name: date_from
          type: string
          required: false
        - name: date_to
          type: string
          required: false
    connections:
      - targetNodeId: parallel-stats4
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: parallel-stats4
    type: parallel
    label: "Compute Stats"
    spec:
      branches:
        - id: approved
          label: "Count Approved"
        - id: rejected
          label: "Count Rejected"
    connections:
      - targetNodeId: data_store-cntApp5
        sourceHandle: branch-0
      - targetNodeId: data_store-cntRej6
        sourceHandle: branch-1
      - targetNodeId: transform-agg7
        sourceHandle: done

  - id: data_store-cntApp5
    type: data_store
    label: "Count Approvals"
    spec:
      operation: aggregate
      model: Content
      query:
        where:
          metadata:
            reviewer_id: "$.reviewer_id"
          status: approved
          updated_at:
            gte: "$.date_from"
            lte: "$.date_to"
      aggregate_fields:
        - function: count
          field: id
          alias: count
      returning: true
    connections:
      - targetNodeId: parallel-stats4

  - id: data_store-cntRej6
    type: data_store
    label: "Count Rejections"
    spec:
      operation: aggregate
      model: ContentRejection
      query:
        where:
          rejected_by: "$.reviewer_id"
          rejected_at:
            gte: "$.date_from"
            lte: "$.date_to"
      aggregate_fields:
        - function: count
          field: id
          alias: count
      returning: true
    connections:
      - targetNodeId: parallel-stats4

  - id: transform-agg7
    type: transform
    label: "Build Stats Response"
    spec:
      mode: expression
      field_mappings:
        approved: "$.branch_results.approved.count"
        rejected: "$.branch_results.rejected.count"
        total: "$.branch_results.approved.count + $.branch_results.rejected.count"
        approval_rate: "$.branch_results.approved.count / ($.branch_results.approved.count + $.branch_results.rejected.count || 1)"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Stats"
    spec:
      outcome: success
      status: 200
      body: "$.result"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
