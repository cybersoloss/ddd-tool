flow:
  id: list-editorial-queue
  name: "List Editorial Queue"
  type: traditional
  domain: editorial
  description: "Returns paginated editorial queue filtered by status, reviewer, and priority. Content status must be 'review'. Supports cursor pagination."
  auth:
    required: true
    roles: [admin, editor, reviewer]
    strategy: jwt

trigger:
  id: trigger-lstQ2xN8
  type: trigger
  label: "GET /api/editorial/queue"
  spec:
    event: "HTTP GET /api/editorial/queue"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Filters"
    spec:
      fields:
        - name: reviewer_id
          type: string
          required: false
        - name: priority
          type: string
          required: false
          enum: [high, medium, low]
        - name: date_from
          type: string
          required: false
        - name: date_to
          type: string
          required: false
        - name: unassigned_only
          type: boolean
          required: false
          default: false
        - name: cursor
          type: string
          required: false
        - name: limit
          type: number
          required: false
          default: 25
    connections:
      - targetNodeId: data_store-rdQueue5
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdQueue5
    type: data_store
    label: "Query Editorial Queue"
    spec:
      operation: read
      model: Content
      query:
        where:
          status: review
          metadata:
            reviewer_id: "$.reviewer_id"
            priority: "$.priority"
            assigned: "$.unassigned_only ? null : undefined"
          created_at:
            gte: "$.date_from"
            lte: "$.date_to"
        cursor: "$.cursor"
        limit: "$.limit"
        order_by:
          quality_score: desc
      include:
        source: true
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Queue Items"
    spec:
      outcome: success
      status: 200
      body: "$.result"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
