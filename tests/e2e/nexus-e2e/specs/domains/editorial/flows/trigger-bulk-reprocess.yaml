flow:
  id: trigger-bulk-reprocess
  name: "Trigger Bulk Reprocess"
  type: traditional
  domain: editorial
  description: "Admin action to re-run AI analysis on a batch of content items. Enqueues each item into the processing BullMQ queue. Used after model updates or re-calibration."
  auth:
    required: true
    roles: [admin]
    strategy: jwt

trigger:
  id: trigger-blkRp2xN8
  type: trigger
  label: "POST /api/editorial/reprocess"
  spec:
    event: "HTTP POST /api/editorial/reprocess"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate"
    spec:
      fields:
        - name: content_ids
          type: array
          required: false
          description: "If empty, reprocesses all draft/review content"
        - name: category
          type: string
          required: false
        - name: status_filter
          type: array
          required: false
          default: [draft, review]
    connections:
      - targetNodeId: data_store-rdCt5kQ7
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdCt5kQ7
    type: data_store
    label: "Fetch Target Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id:
            in: "$.content_ids"
          status:
            in: "$.status_filter"
          category: "$.category"
          deleted_at: null
        limit: 500
      returning: true
    connections:
      - targetNodeId: collection-ids6kQ7
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: collection-ids6kQ7
    type: collection
    label: "Extract IDs"
    spec:
      operation: reduce
      input: "$.result"
      output: content_id_list
      reducer: "$.acc.concat($.item.id)"
      initial: "[]"
    connections:
      - targetNodeId: loop-enq7nR6s
        sourceHandle: result
      - targetNodeId: terminal-ok-empty
        sourceHandle: empty

  - id: loop-enq7nR6s
    type: loop
    label: "Enqueue for Reprocess"
    spec:
      collection: "$.content_id_list"
      iterator: content_id
      body_start: event-enq8tV9w
    connections:
      - targetNodeId: event-enq8tV9w
        sourceHandle: body
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: done

  - id: event-enq8tV9w
    type: event
    label: "Enqueue to Processing Queue"
    spec:
      direction: emit
      event_name: ContentIngested
      target_queue: content-analysis
      async: true
      payload:
        content_id: "$.content_id"
        reprocess: true
        triggered_by: "$.auth.user_id"
    connections:
      - targetNodeId: loop-enq7nR6s

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Queued"
    spec:
      outcome: success
      status: 200
      body:
        message: "Bulk reprocess queued"
        count: "$.content_id_list.length"

  - id: terminal-ok-empty
    type: terminal
    label: "No Items"
    spec:
      outcome: success
      status: 200
      body:
        message: "No matching content found"
        count: 0

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
