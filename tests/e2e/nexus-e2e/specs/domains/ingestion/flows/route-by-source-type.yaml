flow:
  id: route-by-source-type
  name: "Route by Source Type"
  type: traditional
  domain: ingestion
  description: "Smart-routes a normalized content item to the correct ingestion handler based on source_type. Then stores the content and emits ContentIngested."
  auth:
    required: false

trigger:
  id: trigger-rtSrc2eN8
  type: trigger
  label: "event:SourceAdded"
  spec:
    event: "event:SourceAdded"
  connections:
    - targetNodeId: crypto-hash3nR6s

nodes:
  - id: crypto-hash3nR6s
    type: crypto
    label: "Hash Content Body"
    spec:
      operation: hash
      algorithm: sha256
      input: "$.payload.body || $.payload.text || $.payload.content"
      output: content_hash
    connections:
      - targetNodeId: data_store-chkDup5
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-chkDup5
    type: data_store
    label: "Dedup Check"
    spec:
      operation: read
      model: Content
      query:
        where:
          metadata:
            path: "$.content_hash"
            equals: "$.content_hash"
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-dup6
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-dup6
    type: decision
    label: "Duplicate?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: terminal-dup-xA1b
        sourceHandle: "true"
      - targetNodeId: data_store-crtContent7
        sourceHandle: "false"

  - id: data_store-crtContent7
    type: data_store
    label: "Store Ingested Content"
    spec:
      operation: create
      model: Content
      data:
        title: "$.payload.title"
        body: "$.payload.body || $.payload.text || $.payload.content"
        category: "$.payload.category || 'uncategorized'"
        status: draft
        source_type: "$.payload.type"
        source_id: "$.payload.source_id"
        metadata:
          content_hash: "$.content_hash"
          source_url: "$.payload.url"
      returning: true
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-emit-yF3g
    type: event
    label: "Emit ContentIngested"
    spec:
      direction: emit
      event_name: ContentIngested
      payload:
        content_id: "$.result.id"
        source_type: "$.payload.type"
        source_id: "$.payload.source_id"
        category: "$.result.category"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Ingested"
    spec:
      outcome: success
      status: 201
      body:
        content_id: "$.result.id"

  - id: terminal-dup-xA1b
    type: terminal
    label: "Duplicate — Skipped"
    spec:
      outcome: success
      status: 200
      body:
        message: "Duplicate content skipped"
        existing_id: "$.result.id"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INGESTION_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
