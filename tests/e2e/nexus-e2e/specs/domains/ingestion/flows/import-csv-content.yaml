flow:
  id: import-csv-content
  name: "Import CSV Content"
  type: traditional
  domain: ingestion
  description: "Accepts a CSV file upload, parses rows into content items, validates required fields, and bulk-inserts via batch route-by-source-type calls."
  auth:
    required: true
    roles: [admin, editor]
    strategy: jwt

trigger:
  id: trigger-csvImp2xN8
  type: trigger
  label: "POST /api/ingest/csv"
  spec:
    event: "HTTP POST /api/ingest/csv"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Upload"
    spec:
      fields:
        - name: file
          type: file
          required: true
          allowed_types: [text/csv, application/csv]
          max_size_mb: 50
        - name: category
          type: string
          required: false
        - name: source_id
          type: string
          required: false
    connections:
      - targetNodeId: parse-csv3
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: parse-csv3
    type: parse
    label: "Parse CSV"
    spec:
      format: csv
      input: "$.file.buffer"
      output: csv_rows
      options:
        header: true
        delimiter: ","
        required_columns: [title, body]
    connections:
      - targetNodeId: guardrail-size4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: guardrail-size4
    type: guardrail
    label: "Row Count Check"
    spec:
      checks:
        - type: business_rule
          rule: "$.csv_rows.length <= 10000"
          message: "CSV exceeds maximum 10,000 rows"
    connections:
      - targetNodeId: batch-route5
        sourceHandle: pass
      - targetNodeId: terminal-toolarge-xA1b
        sourceHandle: block

  - id: batch-route5
    type: batch
    label: "Route Each Row"
    spec:
      input: "$.csv_rows"
      sub_flow_ref: ingestion/route-by-source-type
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: done
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Import Complete"
    spec:
      outcome: success
      status: 200
      body:
        imported: "$.csv_rows.length"
        message: "CSV import complete"

  - id: terminal-toolarge-xA1b
    type: terminal
    label: "Too Large"
    spec:
      outcome: error
      status: 422
      body:
        error: "VALIDATION_ERROR"
        message: "CSV exceeds 10,000 row limit"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INGESTION_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
