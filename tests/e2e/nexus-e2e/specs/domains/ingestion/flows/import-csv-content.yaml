flow:
  id: import-csv-content
  name: "Import CSV Content"
  type: traditional
  domain: ingestion
  description: "Accepts a CSV file upload via HTTP, validates the file, parses CSV rows, batch-inserts content records, and returns an import count."
  auth:
    required: true
    strategy: api_key

trigger:
  id: trigger-cI1a2B3c
  type: trigger
  position: { x: 100, y: 0 }
  spec:
    event: "HTTP POST /api/v1/content/import"
    label: "CSV file upload"

nodes:
  - id: input-iV4d5E6f
    type: input
    position: { x: 100, y: 130 }
    spec:
      validate:
        file:
          required: true
          type: file

  - id: parse-pC7g8H9i
    type: parse
    position: { x: 100, y: 260 }
    spec:
      format: csv

  - id: batch-bO1j2K3l
    type: batch
    position: { x: 100, y: 390 }
    spec:
      operation_template: "insert content"
      concurrency: 5

  - id: data_store-dM4m5N6o
    type: data_store
    position: { x: 100, y: 520 }
    spec:
      operation: create_many
      model: Content

  - id: terminal-tS7p8Q9r
    type: terminal
    position: { x: 100, y: 650 }
    spec:
      status: 201
      label: "Import complete"
      body:
        imported: "$.count"

  - id: terminal-tE1s2T3u
    type: terminal
    position: { x: 400, y: 130 }
    spec:
      status: 422
      label: "Validation failed"
      error_code: VALIDATION_ERROR

  - id: terminal-tE4v5W6x
    type: terminal
    position: { x: 400, y: 390 }
    spec:
      status: 500
      label: "Batch insert failed"
      error_code: INTERNAL_ERROR

connections:
  - source: trigger-cI1a2B3c
    target: input-iV4d5E6f
    sourceHandle: ""
  - source: input-iV4d5E6f
    target: parse-pC7g8H9i
    sourceHandle: "valid"
  - source: input-iV4d5E6f
    target: terminal-tE1s2T3u
    sourceHandle: "invalid"
  - source: parse-pC7g8H9i
    target: batch-bO1j2K3l
    sourceHandle: "success"
  - source: batch-bO1j2K3l
    target: data_store-dM4m5N6o
    sourceHandle: "success"
  - source: batch-bO1j2K3l
    target: terminal-tE4v5W6x
    sourceHandle: "error"
  - source: data_store-dM4m5N6o
    target: terminal-tS7p8Q9r
    sourceHandle: "success"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
