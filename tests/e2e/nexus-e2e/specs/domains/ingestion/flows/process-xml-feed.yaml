flow:
  id: process-xml-feed
  name: "Process XML Feed"
  type: traditional
  domain: ingestion
  description: "Processes XML feeds triggered by SourceUpdated events, deduplicates entries by GUID, generates content hashes for upsert operations, and emits ContentIngested events."

trigger:
  id: trigger-xF1a2B3c
  type: trigger
  position: { x: 100, y: 0 }
  spec:
    event: "event:SourceUpdated"
    label: "Source updated (XML type)"
    filter:
      source_type: xml

nodes:
  - id: data_store-dR4d5E6f
    type: data_store
    position: { x: 100, y: 130 }
    spec:
      operation: read
      model: ContentSource
      query:
        where:
          id: "$.source_id"

  - id: service_call-sG7g8H9i
    type: service_call
    position: { x: 100, y: 260 }
    spec:
      method: GET
      url: "$.source.url"

  - id: parse-pX1j2K3l
    type: parse
    position: { x: 100, y: 390 }
    spec:
      format: xml

  - id: collection-cD4m5N6o
    type: collection
    position: { x: 100, y: 520 }
    spec:
      operation: deduplicate
      field: "guid"

  - id: crypto-cH7p8Q9r
    type: crypto
    position: { x: 100, y: 650 }
    spec:
      operation: hash
      algorithm: sha256
      input: "$.source_id + $.source_type"
      output_field: content_hash

  - id: data_store-dU1s2T3u
    type: data_store
    position: { x: 100, y: 780 }
    spec:
      operation: upsert
      model: Content
      upsert_key: content_hash

  - id: event-eI4v5W6x
    type: event
    position: { x: 100, y: 910 }
    spec:
      direction: emit
      event_name: ContentIngested

  - id: terminal-tS7y8Z9a
    type: terminal
    position: { x: 100, y: 1040 }
    spec:
      status: 200
      label: "XML feed processed"

  - id: terminal-tE1b2C3d
    type: terminal
    position: { x: 400, y: 260 }
    spec:
      status: 500
      label: "Service call error"
      error_code: FETCH_ERROR

  - id: terminal-tE4e5F6g
    type: terminal
    position: { x: 400, y: 780 }
    spec:
      status: 500
      label: "Data store error"
      error_code: DATA_STORE_ERROR

  - id: terminal-tE7h8I9j
    type: terminal
    position: { x: 400, y: 390 }
    spec:
      status: 500
      label: "Parse error"
      error_code: PARSE_ERROR

  - id: terminal-tE1k2L3m
    type: terminal
    position: { x: 400, y: 650 }
    spec:
      status: 500
      label: "Crypto error"
      error_code: CRYPTO_ERROR

connections:
  - source: trigger-xF1a2B3c
    target: data_store-dR4d5E6f
    sourceHandle: ""
  - source: data_store-dR4d5E6f
    target: service_call-sG7g8H9i
    sourceHandle: "success"
  - source: service_call-sG7g8H9i
    target: parse-pX1j2K3l
    sourceHandle: "success"
  - source: service_call-sG7g8H9i
    target: terminal-tE1b2C3d
    sourceHandle: "error"
  - source: parse-pX1j2K3l
    target: collection-cD4m5N6o
    sourceHandle: "success"
  - source: parse-pX1j2K3l
    target: terminal-tE7h8I9j
    sourceHandle: "error"
  - source: collection-cD4m5N6o
    target: crypto-cH7p8Q9r
    sourceHandle: "success"
  - source: crypto-cH7p8Q9r
    target: data_store-dU1s2T3u
    sourceHandle: "success"
  - source: crypto-cH7p8Q9r
    target: terminal-tE1k2L3m
    sourceHandle: "error"
  - source: data_store-dU1s2T3u
    target: event-eI4v5W6x
    sourceHandle: "success"
  - source: data_store-dU1s2T3u
    target: terminal-tE4e5F6g
    sourceHandle: "error"
  - source: event-eI4v5W6x
    target: terminal-tS7y8Z9a
    sourceHandle: "success"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
