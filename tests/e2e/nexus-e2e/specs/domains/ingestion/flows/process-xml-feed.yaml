flow:
  id: process-xml-feed
  name: "Process XML Feed"
  type: traditional
  domain: ingestion
  description: "Parses a raw XML/Atom feed payload, extracts articles, and hands off each item to route-by-source-type. Called by fetch-rss-feeds for individual feed responses."
  auth:
    required: false

trigger:
  id: trigger-xmlFd2eN8
  type: trigger
  label: "manual"
  spec:
    event: "manual"
  connections:
    - targetNodeId: parse-xml3

nodes:
  - id: parse-xml3
    type: parse
    label: "Parse XML/Atom"
    spec:
      format: xml
      input: "$.raw_xml"
      output: articles
    connections:
      - targetNodeId: collection-filt5
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: collection-filt5
    type: collection
    label: "Filter Valid Articles"
    spec:
      operation: filter
      input: "$.articles"
      output: valid_articles
      predicate: "$.item.title && ($.item.description || $.item.content)"
    connections:
      - targetNodeId: batch-route6
        sourceHandle: result
      - targetNodeId: terminal-ok-empty
        sourceHandle: empty

  - id: batch-route6
    type: batch
    label: "Route Each Article"
    spec:
      input: "$.valid_articles"
      sub_flow_ref: ingestion/route-by-source-type
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: done
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Processed"
    spec:
      outcome: success
      status: 200
      body:
        count: "$.valid_articles.length"

  - id: terminal-ok-empty
    type: terminal
    label: "No Valid Articles"
    spec:
      outcome: success
      status: 200
      body:
        count: 0

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Parse Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INGESTION_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
