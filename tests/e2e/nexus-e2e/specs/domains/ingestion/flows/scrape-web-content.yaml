flow:
  id: scrape-web-content
  name: "Scrape Web Content"
  type: traditional
  domain: ingestion
  description: "Uses stealth HTTP to fetch and parse a web page, extracting title, body, and metadata using CSS selectors. Applies stealth_http cross-cutting pattern."
  auth:
    required: false

trigger:
  id: trigger-scrW2eN8
  type: trigger
  label: "manual"
  spec:
    event: "manual"
  connections:
    - targetNodeId: delay-throttle3

nodes:
  - id: delay-throttle3
    type: delay
    label: "Rate Throttle"
    spec:
      min_ms: 2000
    connections:
      - targetNodeId: service_call-fetch4

  - id: service_call-fetch4
    type: service_call
    label: "Fetch Page (Stealth)"
    spec:
      method: GET
      url: "$.url"
      request_config:
        headers:
          User-Agent: "$.random_user_agent()"
          Accept: "text/html,application/xhtml+xml"
          Accept-Language: "en-US,en;q=0.9"
          Referer: "https://www.google.com"
        timeout: 20000
      error_mapping:
        403: FORBIDDEN
        429: RATE_LIMITED
    connections:
      - targetNodeId: parse-html5
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: parse-html5
    type: parse
    label: "Extract Content"
    spec:
      format: html
      input: "$.response_body"
      output: page_content
      selectors:
        title: "h1, meta[property='og:title']"
        body: "article, main, .content, p"
        published_at: "time, meta[property='article:published_time']"
    connections:
      - targetNodeId: sub_flow-route6
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: sub_flow-route6
    type: sub_flow
    label: "Route Content"
    spec:
      flow_ref: ingestion/route-by-source-type
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Scraped"
    spec:
      outcome: success
      status: 200
      body:
        url: "$.url"
        title: "$.page_content.title"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Scrape Error"
    spec:
      outcome: error
      status: 502
      body:
        error: "INGESTION_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
