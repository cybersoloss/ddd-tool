flow:
  id: manual-content-entry
  name: "Manual Content Entry"
  type: traditional
  domain: ingestion
  description: "API endpoint for editors to manually submit content. Validates, optionally adds a source, and routes directly to create-content then route-by-source-type."
  auth:
    required: true
    roles: [admin, editor]
    strategy: jwt

trigger:
  id: trigger-manE2xN8
  type: trigger
  label: "POST /api/ingest/manual"
  spec:
    event: "HTTP POST /api/ingest/manual"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Input"
    spec:
      fields:
        - name: title
          type: string
          required: true
          min_length: 3
          max_length: 500
        - name: body
          type: string
          required: true
          min_length: 50
        - name: category
          type: string
          required: true
        - name: source_url
          type: string
          required: false
          format: url
        - name: tags
          type: array
          required: false
    connections:
      - targetNodeId: sub_flow-create3
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: sub_flow-create3
    type: sub_flow
    label: "Create Content"
    spec:
      flow_ref: content/create-content
    connections:
      - targetNodeId: event-emit-srcAdded4

  - id: event-emit-srcAdded4
    type: event
    label: "Emit SourceAdded"
    spec:
      direction: emit
      event_name: SourceAdded
      payload:
        source_id: manual
        type: manual
        name: "Manual Entry"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Submitted"
    spec:
      outcome: success
      status: 201
      body:
        message: "Content submitted for review"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
