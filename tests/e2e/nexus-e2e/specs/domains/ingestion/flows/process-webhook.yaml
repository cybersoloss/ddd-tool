flow:
  id: process-webhook
  name: "Process Webhook"
  type: traditional
  domain: ingestion
  description: "Receives HMAC-signed webhook payloads from external publishers. Validates signature, normalizes payload, and routes to route-by-source-type."
  auth:
    required: false

trigger:
  id: trigger-wbhk2xN8
  type: trigger
  label: "webhook /api/webhooks/ingest"
  spec:
    event: "webhook /api/webhooks/ingest"
    signature:
      algorithm: sha256
      key_source:
        env: WEBHOOK_SECRET
      header: X-Nexus-Signature
    rate_limit:
      window_ms: 60000
      max_requests: 100
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Payload"
    spec:
      fields:
        - name: source_id
          type: string
          required: true
        - name: title
          type: string
          required: true
        - name: content
          type: string
          required: true
        - name: url
          type: string
          required: false
          format: url
        - name: category
          type: string
          required: false
    connections:
      - targetNodeId: guardrail-content3
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: guardrail-content3
    type: guardrail
    label: "Content Safety Check"
    spec:
      checks:
        - type: content_policy
          rules: ["no_spam", "no_malicious_urls"]
        - type: required_fields
          fields: [title, content]
    connections:
      - targetNodeId: sub_flow-route5
        sourceHandle: pass
      - targetNodeId: terminal-blocked-xA1b
        sourceHandle: block

  - id: sub_flow-route5
    type: sub_flow
    label: "Route Content"
    spec:
      flow_ref: ingestion/route-by-source-type
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Webhook Processed"
    spec:
      outcome: success
      status: 200
      body:
        message: "Webhook processed"

  - id: terminal-blocked-xA1b
    type: terminal
    label: "Content Blocked"
    spec:
      outcome: error
      status: 422
      body:
        error: "INGESTION_FAILED"
        message: "Content failed safety check"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
