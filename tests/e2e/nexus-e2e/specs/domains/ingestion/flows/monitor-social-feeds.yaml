flow:
  id: monitor-social-feeds
  name: "Monitor Social Feeds"
  type: traditional
  domain: ingestion
  description: "Polls the Twitter v2 filtered stream and search API for keyword-matched content using OAuth 1.0a + stealth HTTP. Runs every 15 minutes."
  auth:
    required: false

trigger:
  id: trigger-socFd2cN8
  type: trigger
  label: "cron */15 * * * *"
  spec:
    event: "cron */15 * * * *"
    job_config:
      queue: social-monitor
      concurrency: 3
      timeout: 60000
  connections:
    - targetNodeId: data_store-rdSocSrc3

nodes:
  - id: data_store-rdSocSrc3
    type: data_store
    label: "Load Social Sources"
    spec:
      operation: read
      model: ContentSource
      query:
        where:
          type: social
          enabled: true
      returning: true
    connections:
      - targetNodeId: collection-chk4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: collection-chk4
    type: collection
    label: "Has Social Sources?"
    spec:
      operation: filter
      input: "$.result"
      output: social_sources
      predicate: "$.item.enabled === true"
    connections:
      - targetNodeId: loop-poll5nR6s
        sourceHandle: result
      - targetNodeId: terminal-ok-empty
        sourceHandle: empty

  - id: loop-poll5nR6s
    type: loop
    label: "Poll Each Source"
    spec:
      collection: "$.social_sources"
      iterator: source
      body_start: service_call-twitter6
    connections:
      - targetNodeId: service_call-twitter6
        sourceHandle: body
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: done

  - id: service_call-twitter6
    type: service_call
    label: "Search Twitter"
    spec:
      method: GET
      integration: twitter
      url: "https://api.twitter.com/2/tweets/search/recent"
      request_config:
        params:
          query: "$.source.config.keywords.join(' OR ')"
          max_results: 100
          tweet_fields: "created_at,author_id,public_metrics"
        timeout: 10000
      oauth1a_config:
        api_key_field: TWITTER_API_KEY
        api_key_secret_field: TWITTER_API_SECRET
        access_token_field: TWITTER_ACCESS_TOKEN
        access_token_secret_field: TWITTER_ACCESS_TOKEN_SECRET
      error_mapping:
        429: RATE_LIMITED
      fallback:
        value: { data: [] }
        log: true
    connections:
      - targetNodeId: batch-route7
        sourceHandle: success
      - targetNodeId: loop-poll5nR6s
        sourceHandle: error

  - id: batch-route7
    type: batch
    label: "Route Each Tweet"
    spec:
      input: "$.response.data"
      sub_flow_ref: ingestion/route-by-source-type
    connections:
      - targetNodeId: loop-poll5nR6s
        sourceHandle: done
      - targetNodeId: loop-poll5nR6s
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Monitoring Complete"
    spec:
      outcome: success
      status: 200
      body:
        message: "Social feeds monitored"

  - id: terminal-ok-empty
    type: terminal
    label: "No Social Sources"
    spec:
      outcome: success
      status: 200
      body:
        message: "No active social sources"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INGESTION_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
