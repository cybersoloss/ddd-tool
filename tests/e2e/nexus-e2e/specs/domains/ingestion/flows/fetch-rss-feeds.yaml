flow:
  id: fetch-rss-feeds
  name: "Fetch RSS Feeds"
  type: traditional
  domain: ingestion
  description: "Cron job that polls all active RSS/Atom sources. Fetches new items, parses XML, deduplicates by URL hash, and routes each item to route-by-source-type."
  auth:
    required: false

trigger:
  id: trigger-rss2cN8
  type: trigger
  label: "cron 0 */4 * * *"
  spec:
    event: "cron 0 */4 * * *"
    job_config:
      queue: rss-ingestion
      concurrency: 10
      timeout: 120000
      retry:
        attempts: 2
        backoff: exponential
  connections:
    - targetNodeId: data_store-rdSources3

nodes:
  - id: data_store-rdSources3
    type: data_store
    label: "Load Active RSS Sources"
    spec:
      operation: read
      model: ContentSource
      query:
        where:
          type:
            in: [rss, atom]
          enabled: true
      returning: true
    connections:
      - targetNodeId: collection-check4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: collection-check4
    type: collection
    label: "Has Active Sources?"
    spec:
      operation: filter
      input: "$.result"
      output: active_sources
      predicate: "$.item.enabled === true"
    connections:
      - targetNodeId: loop-fetch5nR6s
        sourceHandle: result
      - targetNodeId: terminal-ok-empty
        sourceHandle: empty

  - id: loop-fetch5nR6s
    type: loop
    label: "Fetch Each Source"
    spec:
      collection: "$.active_sources"
      iterator: source
      body_start: service_call-fetch6
    connections:
      - targetNodeId: service_call-fetch6
        sourceHandle: body
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: done

  - id: service_call-fetch6
    type: service_call
    label: "Fetch RSS Feed"
    spec:
      method: GET
      url: "$.source.url"
      request_config:
        headers:
          User-Agent: "Mozilla/5.0 (compatible; NewsBot/1.0)"
        timeout: 15000
      error_mapping:
        429: RATE_LIMITED
        404: SOURCE_NOT_FOUND
      fallback:
        value: { items: [] }
        log: true
    connections:
      - targetNodeId: parse-xml7
        sourceHandle: success
      - targetNodeId: loop-fetch5nR6s
        sourceHandle: error

  - id: parse-xml7
    type: parse
    label: "Parse RSS XML"
    spec:
      format: rss
      input: "$.response_body"
      output: feed_items
    connections:
      - targetNodeId: batch-route8
        sourceHandle: success
      - targetNodeId: loop-fetch5nR6s
        sourceHandle: error

  - id: batch-route8
    type: batch
    label: "Route Each Item"
    spec:
      input: "$.feed_items"
      sub_flow_ref: ingestion/route-by-source-type
    connections:
      - targetNodeId: data_store-updSync9
        sourceHandle: done
      - targetNodeId: loop-fetch5nR6s
        sourceHandle: error

  - id: data_store-updSync9
    type: data_store
    label: "Update Last Synced"
    spec:
      operation: update
      model: ContentSource
      query:
        where:
          id: "$.source.id"
      data:
        last_synced_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: loop-fetch5nR6s
        sourceHandle: success
      - targetNodeId: loop-fetch5nR6s
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "RSS Sync Complete"
    spec:
      outcome: success
      status: 200
      body:
        message: "RSS feeds fetched"

  - id: terminal-ok-empty
    type: terminal
    label: "No Active Sources"
    spec:
      outcome: success
      status: 200
      body:
        message: "No active RSS sources"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INGESTION_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
