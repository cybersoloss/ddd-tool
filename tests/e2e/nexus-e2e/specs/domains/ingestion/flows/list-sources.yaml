flow:
  id: list-sources
  name: "List Sources"
  type: traditional
  domain: ingestion
  description: "Returns paginated list of all content sources with status, type, and last-sync metadata. Used by the Sources UI page."
  auth:
    required: true
    strategy: jwt

trigger:
  id: trigger-lstSrc2xN8
  type: trigger
  label: "GET /api/sources"
  spec:
    event: "HTTP GET /api/sources"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Params"
    spec:
      fields:
        - name: type
          type: string
          required: false
          enum: [rss, webhook, social, csv, filesystem, manual]
        - name: enabled
          type: boolean
          required: false
        - name: cursor
          type: string
          required: false
        - name: limit
          type: number
          required: false
          default: 20
    connections:
      - targetNodeId: data_store-rdSrc5
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdSrc5
    type: data_store
    label: "Query Sources"
    spec:
      operation: read
      model: ContentSource
      query:
        where:
          type: "$.type"
          enabled: "$.enabled"
        cursor: "$.cursor"
        limit: "$.limit"
        order_by:
          priority: asc
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Sources"
    spec:
      outcome: success
      status: 200
      body: "$.result"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
