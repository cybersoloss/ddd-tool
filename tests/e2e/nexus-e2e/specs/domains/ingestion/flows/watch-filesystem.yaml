flow:
  id: watch-filesystem
  name: "Watch Filesystem"
  type: traditional
  domain: ingestion
  description: "Triggered by IPC filesystem events (inotify/FSEvents). Monitors a configured directory for new or modified markdown/text files and ingests changes."
  auth:
    required: false

trigger:
  id: trigger-fsWat2eN8
  type: trigger
  label: "ipc:spec-files-changed"
  spec:
    event: "ipc:spec-files-changed"
    debounce_ms: 500
  connections:
    - targetNodeId: ipc_call-readFile3

nodes:
  - id: ipc_call-readFile3
    type: ipc_call
    label: "Read Changed File"
    spec:
      command: read_file
      args:
        path: "$.event.file_path"
        encoding: utf8
      return_type: string
      timeout_ms: 5000
    connections:
      - targetNodeId: decision-ext4
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-ext4
    type: decision
    label: "Supported Extension?"
    spec:
      condition: "$.event.file_path.match(/\\.(md|txt|html)$/)"
    connections:
      - targetNodeId: parse-md5
        sourceHandle: "true"
      - targetNodeId: terminal-ok-skip
        sourceHandle: "false"

  - id: parse-md5
    type: parse
    label: "Parse Markdown/Text"
    spec:
      format: markdown
      input: "$.result"
      output: parsed_content
    connections:
      - targetNodeId: sub_flow-route6
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: sub_flow-route6
    type: sub_flow
    label: "Route Content"
    spec:
      flow_ref: ingestion/route-by-source-type
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "File Ingested"
    spec:
      outcome: success
      status: 200
      body:
        file: "$.event.file_path"

  - id: terminal-ok-skip
    type: terminal
    label: "Skipped"
    spec:
      outcome: success
      status: 200
      body:
        message: "Unsupported file type, skipped"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INGESTION_FAILED"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
