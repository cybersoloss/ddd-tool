name: Ingestion
description: "Acquires content from all external source types"
role: process

auth:
  required: true
  strategy: jwt

depends_on:
  - domain: settings
    reason: "Reads source configuration and API credentials"
    flows_affected:
      - fetch-rss-feeds
      - scrape-web-content
      - monitor-social-feeds

owns_schemas:
  - ContentSource

flows:
  - id: fetch-rss-feeds
    name: "Fetch RSS Feeds"
    description: "Scheduled RSS feed fetching with deduplication"
    type: traditional
    tags:
      - cron
    criticality: high
    throughput: "~200 items/day"

  - id: scrape-web-content
    name: "Scrape Web Content"
    description: "Stealth web scraping with retry"
    type: traditional
    tags:
      - cron

  - id: import-csv-content
    name: "Import CSV Content"
    description: "Bulk CSV content import via API"
    type: traditional
    tags:
      - public-api

  - id: process-webhook
    name: "Process Webhook"
    description: "Handle incoming webhook payloads with HMAC verification"
    type: traditional
    tags:
      - public-api

  - id: process-xml-feed
    name: "Process XML Feed"
    description: "Parse XML feeds triggered by source update events"
    type: traditional
    tags:
      - internal

  - id: monitor-social-feeds
    name: "Monitor Social Feeds"
    description: "Twitter monitoring with OAuth 1.0a and circuit breaker"
    type: traditional
    tags:
      - cron
    criticality: high

  - id: manual-content-entry
    name: "Manual Content Entry"
    description: "Manual content creation via form"
    type: traditional
    tags:
      - public-api

  - id: watch-filesystem
    name: "Watch Filesystem"
    description: "IPC-triggered filesystem content watcher"
    type: traditional
    tags:
      - internal

  - id: route-by-source-type
    name: "Route By Source Type"
    description: "Event-driven routing to appropriate ingestion handler"
    type: traditional
    tags:
      - internal

publishes_events:
  - event: ContentIngested
    schema: Content
    from_flow: fetch-rss-feeds
    description: "New content ingested from any source"
    payload:
      content_id: uuid
      source_type: string
      raw_url: string
      ingested_at: datetime

  - event: SourceUpdated
    from_flow: monitor-social-feeds
    description: "Content source configuration or status changed"
    payload:
      source_id: uuid
      source_type: string
      update_type: string

consumes_events:
  - event: SourceUpdated
    handled_by_flow: process-xml-feed
    description: "Process XML feeds when source is updated"
    payload:
      source_id: uuid
      source_type: string
      update_type: string

layout:
  flows:
    fetch-rss-feeds: { x: 100, y: 100 }
    scrape-web-content: { x: 100, y: 300 }
    import-csv-content: { x: 100, y: 500 }
    process-webhook: { x: 100, y: 700 }
    process-xml-feed: { x: 100, y: 900 }
    monitor-social-feeds: { x: 100, y: 1100 }
    manual-content-entry: { x: 100, y: 1300 }
    watch-filesystem: { x: 100, y: 1500 }
    route-by-source-type: { x: 100, y: 1700 }
  portals: {}
