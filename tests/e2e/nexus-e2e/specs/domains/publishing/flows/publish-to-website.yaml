flow:
  id: publish-to-website
  name: "Publish to Website"
  type: traditional
  domain: publishing
  description: "Pushes content to the website CMS via REST API with circuit breaker, retry, and publish record status update."
  auth:
    required: false

trigger:
  id: trigger-pubW2eN8
  type: trigger
  label: "event:ContentApproved (website channel)"
  spec:
    event: "event:ContentApproved"
  connections:
    - targetNodeId: data_store-rdCt5kQ7

nodes:
  - id: data_store-rdCt5kQ7
    type: data_store
    label: "Load Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: service_call-cms5
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: service_call-cms5
    type: service_call
    label: "POST to CMS"
    spec:
      method: POST
      url: "$.env.CMS_BASE_URL + '/api/articles'"
      request_config:
        headers:
          Authorization: "Bearer $.env.CMS_API_KEY"
        timeout: 30000
        body:
          title: "$.result.title"
          body: "$.result.body"
          category: "$.result.category"
          metadata: "$.result.metadata"
      error_mapping:
        429: RATE_LIMITED
        502: PUBLISH_FAILED
        503: CIRCUIT_OPEN
      circuit_break_config:
        failure_threshold: 5
        recovery_timeout_ms: 60000
        half_open_max_calls: 2
    connections:
      - targetNodeId: data_store-updPub7
        sourceHandle: success
      - targetNodeId: data_store-failPub8
        sourceHandle: error
    behavior: circuit_break

  - id: data_store-updPub7
    type: data_store
    label: "Mark Published"
    spec:
      operation: update
      model: PublishRecord
      query:
        where:
          content_id: "$.payload.content_id"
          channel_id: website
      data:
        status: success
        published_at: "$.now()"
        publish_url: "$.service_result.url"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-failPub8
    type: data_store
    label: "Mark Failed"
    spec:
      operation: update
      model: PublishRecord
      query:
        where:
          content_id: "$.payload.content_id"
          channel_id: website
      data:
        status: failed
        error: "$.error.message"
        attempts: "$.result.attempts + 1"
      returning: true
    connections:
      - targetNodeId: event-fail-emit9
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-fail-emit9
    type: event
    label: "Emit PublishFailed"
    spec:
      direction: emit
      event_name: PublishFailed
      payload:
        content_id: "$.payload.content_id"
        channel_id: website
        error: "$.error.message"
        attempts: "$.result.attempts"
    connections:
      - targetNodeId: terminal-fail-xA1b

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Published to Website"
    spec:
      outcome: success
      status: 200
      body:
        channel: website
        publish_url: "$.service_result.url"

  - id: terminal-fail-xA1b
    type: terminal
    label: "Publish Failed"
    spec:
      outcome: error
      status: 502
      body:
        error: "PUBLISH_FAILED"
        channel: website

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
