flow:
  id: list-queue
  name: "List Queue"
  type: traditional
  domain: publishing
  description: "Returns paginated list of pending, scheduled, and recently published items with channel status for the publishing dashboard."
  auth:
    required: true
    roles: [admin, editor]
    strategy: jwt

trigger:
  id: trigger-lstQ2xN8
  type: trigger
  label: "GET /api/publishing/queue"
  spec:
    event: "HTTP GET /api/publishing/queue"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Params"
    spec:
      fields:
        - name: status
          type: array
          required: false
          default: [pending, scheduled]
        - name: channel_id
          type: string
          required: false
        - name: cursor
          type: string
          required: false
        - name: limit
          type: number
          required: false
          default: 25
    connections:
      - targetNodeId: data_store-rdPub5
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdPub5
    type: data_store
    label: "Query Publish Records"
    spec:
      operation: read
      model: PublishRecord
      query:
        where:
          status:
            in: "$.status"
          channel_id: "$.channel_id"
        cursor: "$.cursor"
        limit: "$.limit"
        order_by:
          created_at: desc
      include:
        content: true
        channel: true
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Queue List"
    spec:
      outcome: success
      status: 200
      body: "$.result"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
