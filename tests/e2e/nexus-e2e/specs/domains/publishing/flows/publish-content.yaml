flow:
  id: publish-content
  name: "Publish Content"
  type: traditional
  domain: publishing
  description: "Main publish orchestrator. Loads approved content, creates PublishRecord, then fans out to channel-specific publishers in parallel."
  auth:
    required: true
    roles: [admin, editor]
    strategy: jwt

trigger:
  id: trigger-pubC2xN8
  type: trigger
  label: "POST /api/publishing/publish"
  spec:
    event: "HTTP POST /api/publishing/publish"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Input"
    spec:
      fields:
        - name: content_id
          type: string
          required: true
          format: uuid
        - name: channel_ids
          type: array
          required: true
          min_items: 1
    connections:
      - targetNodeId: data_store-rdCt5kQ7
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdCt5kQ7
    type: data_store
    label: "Fetch Approved Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.content_id"
          status: approved
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-nf8tV9w
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-nf8tV9w
    type: decision
    label: "Found & Approved?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: data_store-crtPubRec6
        sourceHandle: "true"
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: "false"

  - id: data_store-crtPubRec6
    type: data_store
    label: "Create Publish Records"
    spec:
      operation: create_many
      model: PublishRecord
      data:
        items: "$.channel_ids.map(id => ({ content_id: $.content_id, channel_id: id, status: 'pending' }))"
      returning: true
    connections:
      - targetNodeId: parallel-channels7
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: parallel-channels7
    type: parallel
    label: "Publish to Channels"
    spec:
      failure_policy: best_effort
      branches:
        - id: website
          label: "Website"
          condition: "$.channel_ids.includes('website')"
        - id: newsletter
          label: "Newsletter"
          condition: "$.channel_ids.includes('newsletter')"
        - id: social
          label: "Social"
          condition: "$.channel_ids.includes('twitter')"
    connections:
      - targetNodeId: sub_flow-web8
        sourceHandle: branch-0
      - targetNodeId: sub_flow-news9
        sourceHandle: branch-1
      - targetNodeId: sub_flow-soc0
        sourceHandle: branch-2
      - targetNodeId: event-emit-yF3g
        sourceHandle: done

  - id: sub_flow-web8
    type: sub_flow
    label: "Publish to Website"
    spec:
      flow_ref: publishing/publish-to-website
    connections:
      - targetNodeId: parallel-channels7

  - id: sub_flow-news9
    type: sub_flow
    label: "Publish to Newsletter"
    spec:
      flow_ref: publishing/publish-to-newsletter
    connections:
      - targetNodeId: parallel-channels7

  - id: sub_flow-soc0
    type: sub_flow
    label: "Publish to Social"
    spec:
      flow_ref: publishing/publish-to-social
    connections:
      - targetNodeId: parallel-channels7

  - id: event-emit-yF3g
    type: event
    label: "Emit ContentPublished"
    spec:
      direction: emit
      event_name: ContentPublished
      payload:
        content_id: "$.content_id"
        channel_ids: "$.channel_ids"
        publish_record_id: "$.result.id"
        published_at: "$.now()"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Published"
    spec:
      outcome: success
      status: 200
      body:
        content_id: "$.content_id"
        channels: "$.channel_ids"

  - id: terminal-notfound-cD4e
    type: terminal
    label: "Not Found or Not Approved"
    spec:
      outcome: error
      status: 404
      body:
        error: "CONTENT_NOT_FOUND"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
