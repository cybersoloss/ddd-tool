flow:
  id: publish-content
  name: Publish Content
  description: Routes approved content to appropriate publishing channels via smart router
  type: traditional
  domain: publishing
  version: "1.0.0"
  criticality: critical
  trigger:
    type: event
    event: ContentApproved
  auth: null

nodes:
  - id: trigger-a1b2c3d4
    type: trigger
    name: Content Approved Event
    config:
      event: ContentApproved

  - id: data_store-e5f6g7h8
    type: data_store
    name: Read Content
    config:
      operation: read
      model: Content
      query:
        id: "$.content_id"

  - id: data_store-i9j0k1l2
    type: data_store
    name: Read Enabled Channels
    config:
      operation: read
      model: Channel
      query:
        enabled: true

  - id: smart_router-m3n4o5p6
    type: smart_router
    name: Route to Channels
    config:
      rules:
        - id: website
          condition: "$.channels.includes('website')"
          route: website-pub
        - id: social
          condition: "$.channels.includes('twitter') || $.channels.includes('linkedin')"
          route: social-pub
        - id: newsletter
          condition: "$.channels.includes('newsletter')"
          route: newsletter-pub
      fallback_chain:
        - website

  - id: sub_flow-q7r8s9t0
    type: sub_flow
    name: Publish to Website
    config:
      flow_ref: "publishing/publish-to-website"

  - id: sub_flow-u1v2w3x4
    type: sub_flow
    name: Publish to Social
    config:
      flow_ref: "publishing/publish-to-social"

  - id: sub_flow-y5z6a7b8
    type: sub_flow
    name: Publish to Newsletter
    config:
      flow_ref: "publishing/publish-to-newsletter"

  - id: event-c9d0e1f2
    type: event
    name: Emit ContentPublished
    config:
      event_name: ContentPublished
      payload:
        content_id: "$.content_id"
        channels: "$.routed_channels"

  - id: terminal-g3h4i5j6
    type: terminal
    name: Publish Success
    config:
      status: 200
      response_type: success

connections:
  - from: trigger-a1b2c3d4
    to: data_store-e5f6g7h8

  - from: data_store-e5f6g7h8
    to: data_store-i9j0k1l2

  - from: data_store-i9j0k1l2
    to: smart_router-m3n4o5p6

  - from: smart_router-m3n4o5p6
    to: sub_flow-q7r8s9t0
    handle: website-pub

  - from: smart_router-m3n4o5p6
    to: sub_flow-u1v2w3x4
    handle: social-pub

  - from: smart_router-m3n4o5p6
    to: sub_flow-y5z6a7b8
    handle: newsletter-pub

  - from: sub_flow-q7r8s9t0
    to: event-c9d0e1f2
    handle: done

  - from: sub_flow-u1v2w3x4
    to: event-c9d0e1f2
    handle: done

  - from: sub_flow-y5z6a7b8
    to: event-c9d0e1f2
    handle: done

  - from: event-c9d0e1f2
    to: terminal-g3h4i5j6

metadata:
  created_at: "2026-03-14T00:00:00Z"
  updated_at: "2026-03-14T00:00:00Z"
