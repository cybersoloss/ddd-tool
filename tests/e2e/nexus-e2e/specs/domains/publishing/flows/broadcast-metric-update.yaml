flow:
  id: broadcast-metric-update
  name: Broadcast Metric Update
  description: Broadcasts content published metrics to connected clients via WebSocket
  type: traditional
  domain: publishing
  version: "1.0.0"
  trigger:
    type: event
    event: ContentPublished
  auth: null

nodes:
  - id: trigger-s1t2u3v4
    type: trigger
    name: Content Published Event
    config:
      event: ContentPublished

  - id: websocket_broadcast-w5x6y7z8
    type: websocket_broadcast
    name: Broadcast to Publishing Channel
    config:
      channel: "publishing"
      event_name: "content_published"
      payload: "$.event_data"
      include_sender: false

  - id: terminal-a9b0c1d2
    type: terminal
    name: Broadcast Success
    config:
      status: 200
      response_type: success

connections:
  - from: trigger-s1t2u3v4
    to: websocket_broadcast-w5x6y7z8

  - from: websocket_broadcast-w5x6y7z8
    to: terminal-a9b0c1d2
    handle: done

metadata:
  created_at: "2026-03-14T00:00:00Z"
  updated_at: "2026-03-14T00:00:00Z"
