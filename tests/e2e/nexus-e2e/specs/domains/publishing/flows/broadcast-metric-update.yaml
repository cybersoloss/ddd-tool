flow:
  id: broadcast-metric-update
  name: "Broadcast Metric Update"
  type: traditional
  domain: publishing
  description: "Triggered by ContentPublished events. Fetches updated channel performance metrics and broadcasts to all connected dashboard WebSocket clients."
  auth:
    required: false

trigger:
  id: trigger-brdM2eN8
  type: trigger
  label: "event:ContentPublished"
  spec:
    event: "event:ContentPublished"
  connections:
    - targetNodeId: data_store-rdMetrics5

nodes:
  - id: data_store-rdMetrics5
    type: data_store
    label: "Fetch Channel Metrics"
    spec:
      operation: aggregate
      model: PublishRecord
      query:
        where:
          channel_id: "$.payload.channel_ids[0]"
          status: success
          published_at:
            gte: "$.today()"
      aggregate_fields:
        - function: count
          field: id
          alias: publish_count
      group_by: [channel_id]
      returning: true
    connections:
      - targetNodeId: websocket_broadcast-push6
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: websocket_broadcast-push6
    type: websocket_broadcast
    label: "Broadcast to Dashboard"
    spec:
      channel: "dashboard-metrics"
      event_name: metric_update
      payload:
        channel_id: "$.payload.channel_ids[0]"
        publish_count: "$.result.publish_count"
        content_id: "$.payload.content_id"
        published_at: "$.payload.published_at"
      include_sender: false
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Broadcast Sent"
    spec:
      outcome: success
      status: 200
      body:
        message: "Metric update broadcast"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
