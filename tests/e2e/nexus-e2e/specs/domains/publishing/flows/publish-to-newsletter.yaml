flow:
  id: publish-to-newsletter
  name: Publish to Newsletter
  description: Sends content to newsletter subscribers grouped by tier with batch processing
  type: traditional
  domain: publishing
  version: "1.0.0"
  contract:
    inputs:
      - content_id
      - tier
    outputs:
      - sent_count
  trigger:
    type: sub_flow
  auth: null

nodes:
  - id: trigger-a5b6c7d8
    type: trigger
    name: Sub Flow Trigger
    config:
      type: sub_flow

  - id: data_store-e9f0g1h2
    type: data_store
    name: Read Subscribers
    config:
      operation: read
      model: Subscriber
      query:
        active: true

  - id: collection-i3j4k5l6
    type: collection
    name: Group by Subscription Tier
    config:
      operation: group_by
      field: "$.subscription_tier"

  - id: batch-m7n8o9p0
    type: batch
    name: Batch Send Emails
    config:
      concurrency: 10
      operation_template: "send email"

  - id: service_call-q1r2s3t4
    type: service_call
    name: Send via SendGrid
    config:
      method: POST
      integration: sendgrid
      url: "https://api.sendgrid.com/v3/mail/send"
      body:
        to: "$.batch_item.email"
        subject: "$.content.title"
        content: "$.content.newsletter_body"

  - id: data_store-u5v6w7x8
    type: data_store
    name: Create Publish Record
    config:
      operation: create
      model: PublishRecord
      data:
        content_id: "$.content_id"
        channel: newsletter
        sent_count: "$.batch_results.success_count"

  - id: terminal-y9z0a1b2
    type: terminal
    name: Newsletter Success
    config:
      status: 200
      response_type: success

  - id: terminal-c3d4e5f6
    type: terminal
    name: Service Call Error
    config:
      status: 500
      response_type: error

  - id: terminal-g7h8i9j0
    type: terminal
    name: Empty Subscribers
    config:
      status: 200
      response_type: success

connections:
  - from: trigger-a5b6c7d8
    to: data_store-e9f0g1h2

  - from: data_store-e9f0g1h2
    to: collection-i3j4k5l6

  - from: data_store-e9f0g1h2
    to: terminal-c3d4e5f6
    handle: error

  - from: collection-i3j4k5l6
    to: batch-m7n8o9p0

  - from: collection-i3j4k5l6
    to: terminal-g7h8i9j0
    handle: empty

  - from: batch-m7n8o9p0
    to: service_call-q1r2s3t4

  - from: service_call-q1r2s3t4
    to: data_store-u5v6w7x8

  - from: service_call-q1r2s3t4
    to: terminal-c3d4e5f6
    handle: error

  - from: data_store-u5v6w7x8
    to: terminal-y9z0a1b2

  - from: data_store-u5v6w7x8
    to: terminal-c3d4e5f6
    handle: error

metadata:
  created_at: "2026-03-14T00:00:00Z"
  updated_at: "2026-03-14T00:00:00Z"
