flow:
  id: publish-to-newsletter
  name: "Publish to Newsletter"
  type: traditional
  domain: publishing
  description: "Creates and sends a SendGrid newsletter campaign for approved content. Manages subscriber lists and updates publish record."
  auth:
    required: false

trigger:
  id: trigger-pubN2eN8
  type: trigger
  label: "event:ContentApproved (newsletter channel)"
  spec:
    event: "event:ContentApproved"
  connections:
    - targetNodeId: data_store-rdCt5kQ7

nodes:
  - id: data_store-rdCt5kQ7
    type: data_store
    label: "Load Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: service_call-sgCampaign5
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: service_call-sgCampaign5
    type: service_call
    label: "Create SendGrid Campaign"
    spec:
      method: POST
      integration: sendgrid
      url: "https://api.sendgrid.com/v3/marketing/campaigns"
      request_config:
        body:
          name: "$.result.title"
          subject: "$.result.title"
          send_to:
            list_ids: ["$.env.SENDGRID_LIST_ID"]
          content:
            - type: text/html
              value: "$.result.body"
      error_mapping:
        429: RATE_LIMITED
        400: VALIDATION_ERROR
    connections:
      - targetNodeId: service_call-sgSend6
        sourceHandle: success
      - targetNodeId: data_store-failPub8
        sourceHandle: error

  - id: service_call-sgSend6
    type: service_call
    label: "Send Campaign"
    spec:
      method: POST
      integration: sendgrid
      url: "https://api.sendgrid.com/v3/marketing/campaigns/$.campaign_id/schedules/now"
      error_mapping:
        429: RATE_LIMITED
    connections:
      - targetNodeId: data_store-updPub7
        sourceHandle: success
      - targetNodeId: data_store-failPub8
        sourceHandle: error

  - id: data_store-updPub7
    type: data_store
    label: "Mark Published"
    spec:
      operation: update
      model: PublishRecord
      query:
        where:
          content_id: "$.payload.content_id"
          channel_id: newsletter
      data:
        status: success
        published_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-failPub8
    type: data_store
    label: "Mark Failed"
    spec:
      operation: update
      model: PublishRecord
      query:
        where:
          content_id: "$.payload.content_id"
          channel_id: newsletter
      data:
        status: failed
        error: "$.error.message"
        attempts: "$.result.attempts + 1"
      returning: true
    connections:
      - targetNodeId: terminal-fail-xA1b
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Newsletter Sent"
    spec:
      outcome: success
      status: 200
      body:
        channel: newsletter

  - id: terminal-fail-xA1b
    type: terminal
    label: "Newsletter Failed"
    spec:
      outcome: error
      status: 502
      body:
        error: "PUBLISH_FAILED"
        channel: newsletter

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
