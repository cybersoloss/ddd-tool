flow:
  id: publish-to-social
  name: "Publish to Social"
  type: traditional
  domain: publishing
  description: "Posts content to Twitter/X using OAuth 1.0a with stealth HTTP. Handles long-form content by threading tweets. Updates publish record."
  auth:
    required: false

trigger:
  id: trigger-pubSo2eN8
  type: trigger
  label: "event:ContentApproved (twitter channel)"
  spec:
    event: "event:ContentApproved"
  connections:
    - targetNodeId: data_store-rdCt5kQ7

nodes:
  - id: data_store-rdCt5kQ7
    type: data_store
    label: "Load Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.payload.content_id"
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-threadNeeded3
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-threadNeeded3
    type: decision
    label: "Long Form? (>280 chars)"
    spec:
      condition: "$.result.body.length > 280"
    connections:
      - targetNodeId: process-threadify4
        sourceHandle: "true"
      - targetNodeId: service_call-tweet5
        sourceHandle: "false"

  - id: process-threadify4
    type: process
    label: "Split into Thread"
    spec:
      category: transform
      description: "Splits content body into 280-char tweet chunks, prepending (1/N) labels"
      inputs: [body]
      outputs: [tweet_chunks]
    connections:
      - targetNodeId: service_call-thread5

  - id: service_call-tweet5
    type: service_call
    label: "Post Tweet"
    spec:
      method: POST
      integration: twitter
      url: "https://api.twitter.com/2/tweets"
      request_config:
        body:
          text: "$.result.title + ' ' + $.result.body.substring(0, 240) + '... ' + $.result.metadata.source_url"
      oauth1a_config:
        api_key_field: TWITTER_API_KEY
        api_key_secret_field: TWITTER_API_SECRET
        access_token_field: TWITTER_ACCESS_TOKEN
        access_token_secret_field: TWITTER_ACCESS_TOKEN_SECRET
      error_mapping:
        429: RATE_LIMITED
        403: FORBIDDEN
    connections:
      - targetNodeId: data_store-updPub7
        sourceHandle: success
      - targetNodeId: data_store-failPub8
        sourceHandle: error

  - id: service_call-thread5
    type: service_call
    label: "Post Thread"
    spec:
      method: POST
      integration: twitter
      url: "https://api.twitter.com/2/tweets"
      request_config:
        body:
          text: "$.tweet_chunks[0]"
      oauth1a_config:
        api_key_field: TWITTER_API_KEY
        api_key_secret_field: TWITTER_API_SECRET
        access_token_field: TWITTER_ACCESS_TOKEN
        access_token_secret_field: TWITTER_ACCESS_TOKEN_SECRET
      error_mapping:
        429: RATE_LIMITED
    connections:
      - targetNodeId: data_store-updPub7
        sourceHandle: success
      - targetNodeId: data_store-failPub8
        sourceHandle: error

  - id: data_store-updPub7
    type: data_store
    label: "Mark Published"
    spec:
      operation: update
      model: PublishRecord
      query:
        where:
          content_id: "$.payload.content_id"
          channel_id: twitter
      data:
        status: success
        published_at: "$.now()"
        publish_url: "$.service_result.data.id"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-failPub8
    type: data_store
    label: "Mark Failed"
    spec:
      operation: update
      model: PublishRecord
      query:
        where:
          content_id: "$.payload.content_id"
          channel_id: twitter
      data:
        status: failed
        error: "$.error.message"
        attempts: "$.result.attempts + 1"
      returning: true
    connections:
      - targetNodeId: terminal-fail-xA1b
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Posted to Twitter"
    spec:
      outcome: success
      status: 200
      body:
        channel: twitter

  - id: terminal-fail-xA1b
    type: terminal
    label: "Twitter Post Failed"
    spec:
      outcome: error
      status: 502
      body:
        error: "PUBLISH_FAILED"
        channel: twitter

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
