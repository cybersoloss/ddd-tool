flow:
  id: publish-to-social
  name: Publish to Social
  description: Publishes content to Twitter and LinkedIn in parallel with retry behavior
  type: traditional
  domain: publishing
  version: "1.0.0"
  trigger:
    type: event
    event: ContentApproved
  auth: null

nodes:
  - id: trigger-m5n6o7p8
    type: trigger
    name: Content Approved Event
    config:
      event: ContentApproved

  - id: data_store-q9r0s1t2
    type: data_store
    name: Read Content
    config:
      operation: read
      model: Content
      query:
        id: "$.content_id"

  - id: parallel-u3v4w5x6
    type: parallel
    name: Publish to Social Platforms
    config:
      failure_policy: all_required
      merge_strategy: keyed_by_output_key

  - id: service_call-y7z8a9b0
    type: service_call
    name: Post to Twitter
    config:
      method: POST
      integration: twitter_api
      url: "https://api.twitter.com/2/tweets"
      body:
        text: "$.social_content.twitter"
      output_key: twitter

  - id: service_call-c1d2e3f4
    type: service_call
    name: Post to LinkedIn
    config:
      method: POST
      integration: linkedin_api
      url: "https://api.linkedin.com/v2/posts"
      body:
        text: "$.social_content.linkedin"
      output_key: linkedin

  - id: data_store-g5h6i7j8
    type: data_store
    name: Create Publish Record
    config:
      operation: create
      model: PublishRecord
      data:
        content_id: "$.content_id"
        channel: social
        platforms: "$.parallel_results"

  - id: terminal-k9l0m1n2
    type: terminal
    name: Social Publish Success
    config:
      status: 200
      response_type: success

  - id: event-o3p4q5r6
    type: event
    name: Emit PublishFailed
    config:
      event_name: PublishFailed
      payload:
        content_id: "$.content_id"
        channel: social

  - id: terminal-s7t8u9v0
    type: terminal
    name: Social Publish Error
    config:
      status: 500
      response_type: error

  - id: terminal-w1x2y3z4
    type: terminal
    name: Data Store Error
    config:
      status: 500
      response_type: error

connections:
  - from: trigger-m5n6o7p8
    to: data_store-q9r0s1t2

  - from: data_store-q9r0s1t2
    to: parallel-u3v4w5x6

  - from: data_store-q9r0s1t2
    to: terminal-w1x2y3z4
    handle: error

  - from: parallel-u3v4w5x6
    to: service_call-y7z8a9b0
    handle: branch-0

  - from: parallel-u3v4w5x6
    to: service_call-c1d2e3f4
    handle: branch-1

  - from: service_call-y7z8a9b0
    to: parallel-u3v4w5x6
    handle: done
    behavior: retry

  - from: service_call-c1d2e3f4
    to: parallel-u3v4w5x6
    handle: done
    behavior: retry

  - from: parallel-u3v4w5x6
    to: data_store-g5h6i7j8
    handle: done

  - from: data_store-g5h6i7j8
    to: terminal-k9l0m1n2

  - from: data_store-g5h6i7j8
    to: terminal-w1x2y3z4
    handle: error

  - from: service_call-y7z8a9b0
    to: event-o3p4q5r6
    handle: error

  - from: service_call-c1d2e3f4
    to: event-o3p4q5r6
    handle: error

  - from: event-o3p4q5r6
    to: terminal-s7t8u9v0

metadata:
  created_at: "2026-03-14T00:00:00Z"
  updated_at: "2026-03-14T00:00:00Z"
