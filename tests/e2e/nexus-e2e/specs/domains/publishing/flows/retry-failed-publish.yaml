flow:
  id: retry-failed-publish
  name: "Retry Failed Publish"
  type: traditional
  domain: publishing
  description: "Cron job that finds failed publish records with attempts < 3 and re-enqueues them with exponential backoff delay."
  auth:
    required: false

trigger:
  id: trigger-retP2cN8
  type: trigger
  label: "cron */30 * * * *"
  spec:
    event: "cron */30 * * * *"
    job_config:
      queue: retry-publish
      concurrency: 1
      timeout: 60000
      retry:
        attempts: 1
  connections:
    - targetNodeId: data_store-rdFailed5

nodes:
  - id: data_store-rdFailed5
    type: data_store
    label: "Find Failed Records"
    spec:
      operation: read
      model: PublishRecord
      query:
        where:
          status: failed
          attempts:
            lt: 3
      returning: true
    connections:
      - targetNodeId: collection-filt6kQ7
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: collection-filt6kQ7
    type: collection
    label: "Check Has Items"
    spec:
      operation: filter
      input: "$.result"
      output: retry_records
      predicate: "$.item.attempts < 3"
    connections:
      - targetNodeId: loop-retry7nR6s
        sourceHandle: result
      - targetNodeId: terminal-ok-empty
        sourceHandle: empty

  - id: loop-retry7nR6s
    type: loop
    label: "Retry Each"
    spec:
      collection: "$.retry_records"
      iterator: record
      body_start: event-enq8tV9w
    connections:
      - targetNodeId: event-enq8tV9w
        sourceHandle: body
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: done

  - id: event-enq8tV9w
    type: event
    label: "Re-enqueue Publish"
    spec:
      direction: emit
      event_name: ContentApproved
      target_queue: publish-retry
      async: true
      delay_ms: "$.record.attempts * 60000"
      payload:
        content_id: "$.record.content_id"
        channel_ids: ["$.record.channel_id"]
        retry_attempt: "$.record.attempts + 1"
    connections:
      - targetNodeId: loop-retry7nR6s

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Retries Queued"
    spec:
      outcome: success
      status: 200
      body:
        retried: "$.retry_records.length"

  - id: terminal-ok-empty
    type: terminal
    label: "No Failed Records"
    spec:
      outcome: success
      status: 200
      body:
        message: "No failed records to retry"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

