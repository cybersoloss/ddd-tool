flow:
  id: schedule-publication
  name: "Schedule Publication"
  type: traditional
  domain: publishing
  description: "Creates a delayed publication job using BullMQ. Validates the scheduled time is in the future, creates a Schedule record, and enqueues the job."
  auth:
    required: true
    roles: [admin, editor]
    strategy: jwt

trigger:
  id: trigger-schP2xN8
  type: trigger
  label: "POST /api/publishing/schedule"
  spec:
    event: "HTTP POST /api/publishing/schedule"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Input"
    spec:
      fields:
        - name: content_id
          type: string
          required: true
          format: uuid
        - name: publish_at
          type: string
          required: true
          format: datetime
        - name: channel_ids
          type: array
          required: true
          min_items: 1
    connections:
      - targetNodeId: decision-future3
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: decision-future3
    type: decision
    label: "Future Date?"
    spec:
      condition: "new Date($.publish_at) > new Date()"
    connections:
      - targetNodeId: data_store-crtSched5
        sourceHandle: "true"
      - targetNodeId: terminal-past-xA1b
        sourceHandle: "false"

  - id: data_store-crtSched5
    type: data_store
    label: "Create Schedule Record"
    spec:
      operation: create
      model: Schedule
      data:
        content_id: "$.content_id"
        publish_at: "$.publish_at"
        channel_id: "$.channel_ids[0]"
        created_by: "$.auth.user_id"
        status: pending
      returning: true
    connections:
      - targetNodeId: event-enq6
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-enq6
    type: event
    label: "Enqueue Delayed Job"
    spec:
      direction: emit
      event_name: ContentApproved
      target_queue: publish-scheduled
      async: true
      delay_ms: "$.ms_until_publish_at"
      payload:
        content_id: "$.content_id"
        channel_ids: "$.channel_ids"
        schedule_id: "$.result.id"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Scheduled"
    spec:
      outcome: success
      status: 201
      body:
        schedule_id: "$.result.id"
        publish_at: "$.publish_at"

  - id: terminal-past-xA1b
    type: terminal
    label: "Date in Past"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"
        message: "publish_at must be in the future"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
