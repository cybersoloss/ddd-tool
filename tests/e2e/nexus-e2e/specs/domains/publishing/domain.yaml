name: "Publishing"
description: "Distributes approved content to configured channels — website CMS, newsletter (SendGrid), social media (Twitter). Supports scheduled publication, retry logic, and real-time metric broadcasting via WebSocket."
role: process
auth:
  required: true
  strategy: jwt
  roles: [admin, editor]

owns_schemas: ["PublishRecord", "Schedule", "Channel"]

depends_on:
  - domain: content
    reason: Reads approved Content records for distribution
    flows_affected: [publish-content, publish-to-website, publish-to-newsletter, publish-to-social, schedule-publication]
  - domain: analytics
    reason: Reads channel metrics for status bar and broadcast updates
    flows_affected: [broadcast-metric-update]

flows:
  - id: publish-content
    name: "Publish Content"
    description: "Main publish orchestrator. Routes approved content to one or more channel-specific publishers in parallel."
    type: traditional
    tags: [public-api]
    criticality: critical

  - id: publish-to-website
    name: "Publish to Website"
    description: "Pushes content to the website CMS via REST API. Handles auth, retry, and circuit breaker."
    type: traditional
    tags: [internal]
    criticality: critical

  - id: publish-to-newsletter
    name: "Publish to Newsletter"
    description: "Sends content as a newsletter campaign via SendGrid. Manages subscriber lists and campaign tracking."
    type: traditional
    tags: [internal]
    criticality: high

  - id: publish-to-social
    name: "Publish to Social"
    description: "Posts content to Twitter using OAuth 1.0a + stealth HTTP. Handles thread creation for long-form content."
    type: traditional
    tags: [internal]
    criticality: normal

  - id: schedule-publication
    name: "Schedule Publication"
    description: "Creates a scheduled publication job for a future date. Uses BullMQ delayed jobs."
    type: traditional
    tags: [public-api]
    criticality: normal

  - id: retry-failed-publish
    name: "Retry Failed Publish"
    description: "Cron job that retries publish_records with status=failed and attempts < 3. Uses exponential backoff."
    type: traditional
    tags: [cron, internal]
    criticality: high

  - id: broadcast-metric-update
    name: "Broadcast Metric Update"
    description: "Triggered by analytics events. Broadcasts updated channel performance metrics to connected dashboard clients via WebSocket."
    type: traditional
    tags: [internal]
    criticality: normal

  - id: list-queue
    name: "List Queue"
    description: "Returns paginated list of pending, scheduled, and recently published items for the publishing UI."
    type: traditional
    tags: [public-api]
    criticality: normal

groups:
  - id: channel-publishers
    name: "Channel Publishers"
    flows: [publish-to-website, publish-to-newsletter, publish-to-social]
  - id: orchestration
    name: "Orchestration"
    flows: [publish-content, schedule-publication, retry-failed-publish]
  - id: realtime
    name: "Realtime"
    flows: [broadcast-metric-update, list-queue]

publishes_events:
  - event: ContentPublished
    schema: PublishRecord
    from_flow: publish-content
    description: "Fired after successful publication — triggers analytics recording and notifications"
    payload:
      content_id: string
      channel_ids: array
      publish_record_id: string
      published_at: string

  - event: PublishFailed
    schema: PublishRecord
    from_flow: publish-to-website
    description: "Fired when publication fails after max retries — triggers notification to editors"
    payload:
      content_id: string
      channel_id: string
      error: string
      attempts: number

  - event: MetricBroadcast
    schema: PublishRecord
    from_flow: broadcast-metric-update
    description: "WebSocket fanout event for real-time dashboard updates"
    payload:
      channel_id: string
      metric_type: string
      value: number

consumes_events:
  - event: ContentApproved
    from_domain: editorial
    description: "Triggers publish flow for approved content (if auto-publish is enabled)"
    handled_by: publish-content

  - event: BulkApproveInitiated
    from_domain: editorial
    description: "May trigger scheduled batch publishing for bulk-approved content"
    handled_by: schedule-publication

layout:
  flows:
    publish-content: { x: 400, y: 100 }
    publish-to-website: { x: 100, y: 300 }
    publish-to-newsletter: { x: 400, y: 300 }
    publish-to-social: { x: 700, y: 300 }
    schedule-publication: { x: 100, y: 500 }
    retry-failed-publish: { x: 400, y: 500 }
    broadcast-metric-update: { x: 700, y: 500 }
    list-queue: { x: 400, y: 700 }
  portals: {}

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
