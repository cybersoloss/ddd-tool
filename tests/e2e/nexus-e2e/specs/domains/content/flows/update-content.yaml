flow:
  id: update-content
  name: "Update Content"
  type: traditional
  domain: content
  description: "Updates a content item. Creates a new ContentVersion snapshot on body changes. Re-hashes body. Emits ContentUpdated which triggers re-analysis if body changed."
  auth:
    required: true
    roles: [admin, editor]
    strategy: jwt

trigger:
  id: trigger-upCt2xN8
  type: trigger
  label: "PATCH /api/content/:id"
  spec:
    event: "HTTP PATCH /api/content/:id"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Input"
    spec:
      fields:
        - name: id
          type: string
          required: true
          format: uuid
        - name: title
          type: string
          required: false
        - name: body
          type: string
          required: false
        - name: category
          type: string
          required: false
        - name: status
          type: string
          required: false
          enum: [draft, review, approved, published, archived]
        - name: change_summary
          type: string
          required: false
    connections:
      - targetNodeId: data_store-rdCt5kQ7
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdCt5kQ7
    type: data_store
    label: "Load Existing Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.id"
          deleted_at: null
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-nf8tV9w
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-nf8tV9w
    type: decision
    label: "Found?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: decision-bodyChanged3
        sourceHandle: "true"
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: "false"

  - id: decision-bodyChanged3
    type: decision
    label: "Body Changed?"
    spec:
      condition: "$.body !== undefined && $.body !== $.result.body"
    connections:
      - targetNodeId: crypto-hsh3nR6s
        sourceHandle: "true"
      - targetNodeId: data_store-upd3nR6s
        sourceHandle: "false"

  - id: crypto-hsh3nR6s
    type: crypto
    label: "Hash New Body"
    spec:
      operation: hash
      algorithm: sha256
      input: "$.body"
      output: new_hash
    connections:
      - targetNodeId: transaction-upd8tV9w
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: transaction-upd8tV9w
    type: transaction
    label: "Update + Version"
    spec:
      steps:
        - action:
            type: data_store
            operation: update
            model: Content
            query:
              where:
                id: "$.id"
            data:
              title: "$.title"
              body: "$.body"
              category: "$.category"
              status: "$.status"
              metadata:
                content_hash: "$.new_hash"
            returning: true
          rollback:
            type: data_store
            operation: update
            model: Content
            query:
              where:
                id: "$.id"
            data:
              body: "$.result.body"
              metadata: "$.result.metadata"
        - action:
            type: data_store
            operation: create
            model: ContentVersion
            data:
              content_id: "$.id"
              body_snapshot: "$.body"
              changed_by: "$.auth.user_id"
              change_summary: "$.change_summary"
            returning: true
          rollback:
            type: data_store
            operation: delete
            model: ContentVersion
            query:
              where:
                content_id: "$.id"
                changed_by: "$.auth.user_id"
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: committed
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: rolled_back

  - id: data_store-upd3nR6s
    type: data_store
    label: "Update Metadata Only"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.id"
      data:
        title: "$.title"
        category: "$.category"
        status: "$.status"
      returning: true
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-emit-yF3g
    type: event
    label: "Emit ContentUpdated"
    spec:
      direction: emit
      event_name: ContentUpdated
      payload:
        content_id: "$.id"
        changed_fields: "$.changed_fields"
        new_hash: "$.new_hash"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Updated"
    spec:
      outcome: success
      status: 200
      body: "$.result"

  - id: terminal-notfound-cD4e
    type: terminal
    label: "Not Found"
    spec:
      outcome: error
      status: 404
      body:
        error: "CONTENT_NOT_FOUND"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
