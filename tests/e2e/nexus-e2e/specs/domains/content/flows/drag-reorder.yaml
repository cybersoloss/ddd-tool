flow:
  id: drag-reorder
  name: "Drag Reorder"
  type: traditional
  domain: content
  description: "Handles UI drag-and-drop reorder events. Accepts an ordered list of content IDs and updates their priority in a batch transaction."
  auth:
    required: true
    roles: [admin, editor]
    strategy: jwt

trigger:
  id: trigger-drRo2xN8
  type: trigger
  label: "ui:DragDrop"
  spec:
    event: "ui:DragDrop"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Reorder"
    spec:
      fields:
        - name: ordered_ids
          type: array
          required: true
          description: "Content IDs in new display order"
          min_items: 2
    connections:
      - targetNodeId: batch-upd3nR6s
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: batch-upd3nR6s
    type: batch
    label: "Batch Update Priorities"
    spec:
      input: "$.ordered_ids"
      operation_template:
        type: data_store
        operation: update
        model: Content
        query:
          where:
            id: "$.item"
        data:
          metadata:
            priority: "$.index"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: done
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Reordered"
    spec:
      outcome: success
      status: 200
      body:
        message: "Content reordered"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
