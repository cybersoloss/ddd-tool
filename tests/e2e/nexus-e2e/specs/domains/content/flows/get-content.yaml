flow:
  id: get-content
  name: Get Content
  description: Retrieves a single content item by ID with Redis caching and related data
  type: traditional
  domain: content
  version: "1.0.0"
  trigger:
    type: http
    method: GET
    path: /api/v1/content/:id
  auth:
    required: true
    strategy: jwt

nodes:
  - id: trigger-g1h2i3j4
    type: trigger
    name: HTTP GET Content by ID
    config:
      method: GET
      path: /api/v1/content/:id

  - id: cache-k5l6m7n8
    type: cache
    name: Check Content Cache
    config:
      operation: check
      key: "content:$.id"
      store: redis

  - id: data_store-o9p0q1r2
    type: data_store
    name: Read Content with Relations
    config:
      operation: read
      model: Content
      query:
        id: "$.id"
      include:
        - relation: "content-version"
          as: "versions"
        - relation: "content-source"
          as: "source"

  - id: transform-s3t4u5v6
    type: transform
    name: Transform Content Response
    config:
      mode: schema

  - id: cache-w7x8y9z0
    type: cache
    name: Set Content Cache
    config:
      operation: set
      key: "content:$.id"
      store: redis
      ttl_ms: 60000

  - id: terminal-a1b2c3d4
    type: terminal
    name: Cache Hit Response
    config:
      status: 200
      response_type: json

  - id: terminal-e5f6g7h8
    type: terminal
    name: Content Response
    config:
      status: 200
      response_type: json

  - id: terminal-i9j0k1l2
    type: terminal
    name: Content Not Found
    config:
      status: 404
      response_type: error
      error_code: CONTENT_NOT_FOUND

connections:
  - from: trigger-g1h2i3j4
    to: cache-k5l6m7n8

  - from: cache-k5l6m7n8
    to: terminal-a1b2c3d4
    handle: hit

  - from: cache-k5l6m7n8
    to: data_store-o9p0q1r2
    handle: miss

  - from: data_store-o9p0q1r2
    to: transform-s3t4u5v6

  - from: data_store-o9p0q1r2
    to: terminal-i9j0k1l2
    handle: error

  - from: transform-s3t4u5v6
    to: cache-w7x8y9z0

  - from: cache-w7x8y9z0
    to: terminal-e5f6g7h8

metadata:
  created_at: "2026-03-14T00:00:00Z"
  updated_at: "2026-03-14T00:00:00Z"
