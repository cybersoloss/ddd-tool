flow:
  id: get-content
  name: "Get Content"
  type: traditional
  domain: content
  description: "Retrieves a single content item with its latest version, AI analysis scores, and publishing history."
  auth:
    required: true
    strategy: jwt

trigger:
  id: trigger-gtCt2xN8
  type: trigger
  label: "GET /api/content/:id"
  spec:
    event: "HTTP GET /api/content/:id"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate ID"
    spec:
      fields:
        - name: id
          type: string
          required: true
          format: uuid
    connections:
      - targetNodeId: data_store-rdCt5kQ7
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdCt5kQ7
    type: data_store
    label: "Fetch Content"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.id"
      include:
        versions:
          order_by: { changed_at: desc }
          limit: 1
        rejections: true
        source: true
        publish_records: true
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-nf8tV9w
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-nf8tV9w
    type: decision
    label: "Found?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: "true"
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: "false"

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Return Content"
    spec:
      outcome: success
      status: 200
      body: "$.result"

  - id: terminal-notfound-cD4e
    type: terminal
    label: "Not Found"
    spec:
      outcome: error
      status: 404
      body:
        error: "CONTENT_NOT_FOUND"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid Input"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "DB Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
