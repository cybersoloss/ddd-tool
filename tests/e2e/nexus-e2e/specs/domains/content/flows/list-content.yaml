flow:
  id: list-content
  name: List Content
  description: Lists content with cursor pagination, sorting, and optional filters excluding soft-deleted items
  type: traditional
  domain: content
  version: "1.0.0"
  trigger:
    type: http
    method: GET
    path: /api/v1/content
  auth:
    required: true
    strategy: jwt

nodes:
  - id: trigger-y7z8a9b0
    type: trigger
    name: HTTP GET List Content
    config:
      method: GET
      path: /api/v1/content

  - id: input-c1d2e3f4
    type: input
    name: Validate Optional Filters
    config:
      fields:
        - name: status
          type: string
          required: false
        - name: category
          type: string
          required: false
        - name: source_type
          type: string
          required: false
        - name: cursor
          type: string
          required: false
        - name: limit
          type: number
          required: false

  - id: data_store-g5h6i7j8
    type: data_store
    name: Read Content List
    config:
      operation: read
      model: Content
      pagination:
        type: cursor
        default_limit: 20
      sort:
        default: created_at
        allowed:
          - created_at
          - title
          - status
          - quality_score
      filters:
        - field: status
          required: false
        - field: category
          required: false
        - field: source_type
          required: false
      query:
        deleted_at: null

  - id: terminal-k9l0m1n2
    type: terminal
    name: Content List Response
    config:
      status: 200
      response_type: json

  - id: terminal-o3p4q5r6
    type: terminal
    name: Validation Error
    config:
      status: 422
      response_type: error

  - id: terminal-s7t8u9v0
    type: terminal
    name: Data Store Error
    config:
      status: 500
      response_type: error

connections:
  - from: trigger-y7z8a9b0
    to: input-c1d2e3f4

  - from: input-c1d2e3f4
    to: data_store-g5h6i7j8

  - from: input-c1d2e3f4
    to: terminal-o3p4q5r6
    handle: invalid

  - from: data_store-g5h6i7j8
    to: terminal-k9l0m1n2

  - from: data_store-g5h6i7j8
    to: terminal-s7t8u9v0
    handle: error

metadata:
  created_at: "2026-03-14T00:00:00Z"
  updated_at: "2026-03-14T00:00:00Z"
