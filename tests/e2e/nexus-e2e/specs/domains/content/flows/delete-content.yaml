flow:
  id: delete-content
  name: Delete Content
  description: Soft-deletes content by setting deleted_at, invalidates cache, and emits ContentDeleted event
  type: traditional
  domain: content
  version: "1.0.0"
  trigger:
    type: http
    method: DELETE
    path: /api/v1/content/:id
  auth:
    required: true
    strategy: jwt

nodes:
  - id: trigger-a3b4c5d6
    type: trigger
    name: HTTP DELETE Content
    config:
      method: DELETE
      path: /api/v1/content/:id

  - id: data_store-e7f8g9h0
    type: data_store
    name: Soft Delete Content
    config:
      operation: update
      model: Content
      query:
        id: "$.id"
      set:
        deleted_at: "$.now"
      pattern_governed: soft_delete

  - id: cache-i1j2k3l4
    type: cache
    name: Invalidate Content Cache
    config:
      operation: invalidate
      key: "content:$.id"
      store: redis

  - id: event-m5n6o7p8
    type: event
    name: Emit ContentDeleted
    config:
      event_name: ContentDeleted
      payload:
        content_id: "$.id"

  - id: terminal-q9r0s1t2
    type: terminal
    name: Delete Success
    config:
      status: 204
      response_type: empty

  - id: terminal-u3v4w5x6
    type: terminal
    name: Data Store Error
    config:
      status: 500
      response_type: error

connections:
  - from: trigger-a3b4c5d6
    to: data_store-e7f8g9h0

  - from: data_store-e7f8g9h0
    to: cache-i1j2k3l4

  - from: data_store-e7f8g9h0
    to: terminal-u3v4w5x6
    handle: error

  - from: cache-i1j2k3l4
    to: event-m5n6o7p8

  - from: event-m5n6o7p8
    to: terminal-q9r0s1t2

metadata:
  created_at: "2026-03-14T00:00:00Z"
  updated_at: "2026-03-14T00:00:00Z"
