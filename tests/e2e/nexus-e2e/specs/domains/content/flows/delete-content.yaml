flow:
  id: delete-content
  name: "Delete Content"
  type: traditional
  domain: content
  description: "Soft-deletes a content item by setting deleted_at. Does not delete publish records. Emits ContentDeleted event."
  auth:
    required: true
    roles: [admin, editor]
    strategy: jwt

trigger:
  id: trigger-dlCt2xN8
  type: trigger
  label: "DELETE /api/content/:id"
  spec:
    event: "HTTP DELETE /api/content/:id"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate ID"
    spec:
      fields:
        - name: id
          type: string
          required: true
          format: uuid
    connections:
      - targetNodeId: data_store-rdCt5kQ7
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdCt5kQ7
    type: data_store
    label: "Check Exists"
    spec:
      operation: read
      model: Content
      query:
        where:
          id: "$.id"
          deleted_at: null
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-nf8tV9w
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-nf8tV9w
    type: decision
    label: "Found?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: data_store-del7kO3p
        sourceHandle: "true"
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: "false"

  - id: data_store-del7kO3p
    type: data_store
    label: "Soft Delete"
    spec:
      operation: update
      model: Content
      query:
        where:
          id: "$.id"
      data:
        deleted_at: "$.now()"
      returning: true
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: event-emit-yF3g
    type: event
    label: "Emit ContentDeleted"
    spec:
      direction: emit
      event_name: ContentDeleted
      payload:
        content_id: "$.id"
        deleted_at: "$.result.deleted_at"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Deleted"
    spec:
      outcome: success
      status: 200
      body:
        message: "Content deleted"

  - id: terminal-notfound-cD4e
    type: terminal
    label: "Not Found"
    spec:
      outcome: error
      status: 404
      body:
        error: "CONTENT_NOT_FOUND"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
