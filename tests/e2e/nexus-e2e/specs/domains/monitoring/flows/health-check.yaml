flow:
  id: health-check
  name: "Health Check"
  type: traditional
  domain: monitoring
  description: "Aggregates health status from all services in parallel — DB, Redis, API, worker, external integrations. Returns overall status and per-service breakdown."
  auth:
    required: false

trigger:
  id: trigger-hChk2xN8
  type: trigger
  label: "GET /health"
  spec:
    event: "HTTP GET /health"
    rate_limit:
      window_ms: 60000
      max_requests: 120
  connections:
    - targetNodeId: parallel-svc4kQ7p

nodes:
  - id: parallel-svc4kQ7p
    type: parallel
    label: "Check All Services"
    spec:
      failure_policy: best_effort
      branches:
        - id: db
          label: "Check Database"
        - id: redis
          label: "Check Redis"
        - id: worker
          label: "Check Worker"
        - id: anthropic
          label: "Check Anthropic API"
        - id: sendgrid
          label: "Check SendGrid API"
    connections:
      - targetNodeId: service_call-dbHl5rT9
        sourceHandle: branch-0
      - targetNodeId: service_call-rdHl6sU0
        sourceHandle: branch-1
      - targetNodeId: service_call-wkHl7tV1
        sourceHandle: branch-2
      - targetNodeId: service_call-aiHl8uW2
        sourceHandle: branch-3
      - targetNodeId: service_call-sgHl9vX3
        sourceHandle: branch-4
      - targetNodeId: transform-agg4yY5z
        sourceHandle: done

  - id: service_call-dbHl5rT9
    type: service_call
    label: "Ping Database"
    method: GET
    spec:
      method: GET
      url: "http://localhost:3001/internal/health/db"
      fallback:
        value: { status: "down", error: "unreachable" }
        log: true
    connections:
      - targetNodeId: parallel-svc4kQ7p

  - id: service_call-rdHl6sU0
    type: service_call
    label: "Ping Redis"
    spec:
      method: GET
      url: "http://localhost:3001/internal/health/redis"
      fallback:
        value: { status: "down", error: "unreachable" }
        log: true
    connections:
      - targetNodeId: parallel-svc4kQ7p

  - id: service_call-wkHl7tV1
    type: service_call
    label: "Ping Worker"
    spec:
      method: GET
      url: "http://localhost:3002/health"
      fallback:
        value: { status: "down", error: "unreachable" }
        log: true
    connections:
      - targetNodeId: parallel-svc4kQ7p

  - id: service_call-aiHl8uW2
    type: service_call
    label: "Ping Anthropic"
    spec:
      method: GET
      integration: anthropic
      url: "https://api.anthropic.com/v1/messages"
      fallback:
        value: { status: "degraded", error: "rate_limited" }
        log: true
    connections:
      - targetNodeId: parallel-svc4kQ7p

  - id: service_call-sgHl9vX3
    type: service_call
    label: "Ping SendGrid"
    spec:
      method: GET
      integration: sendgrid
      url: "https://api.sendgrid.com/v3/user/account"
      fallback:
        value: { status: "degraded", error: "unreachable" }
        log: true
    connections:
      - targetNodeId: parallel-svc4kQ7p

  - id: transform-agg4yY5z
    type: transform
    label: "Aggregate Health"
    spec:
      mode: expression
      field_mappings:
        database: "$.branch_results.db"
        redis: "$.branch_results.redis"
        worker: "$.branch_results.worker"
        anthropic: "$.branch_results.anthropic"
        sendgrid: "$.branch_results.sendgrid"
        overall: "$.branch_results.*.status.every(s => s === 'up') ? 'healthy' : $.branch_results.*.status.some(s => s === 'down') ? 'unhealthy' : 'degraded'"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Health Response"
    spec:
      outcome: success
      status: 200
      body: "$.result"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
