flow:
  id: detect-anomaly
  name: "Detect Anomaly"
  type: traditional
  domain: monitoring
  description: "Receives AnomalyDetected events from analytics. Evaluates severity against thresholds. Fires AlertTriggered for critical anomalies."
  auth:
    required: false

trigger:
  id: trigger-dAnm2eN8
  type: trigger
  label: "event:AnomalyDetected"
  spec:
    event: "event:AnomalyDetected"
  connections:
    - targetNodeId: decision-sev5kQ7p

nodes:
  - id: decision-sev5kQ7p
    type: decision
    label: "Critical Severity?"
    spec:
      condition: "$.payload.severity === 'critical' || $.payload.severity === 'high'"
    connections:
      - targetNodeId: event-alert-eEm8tV9w
        sourceHandle: "true"
      - targetNodeId: terminal-log-xA1b
        sourceHandle: "false"

  - id: event-alert-eEm8tV9w
    type: event
    label: "Emit AlertTriggered"
    spec:
      direction: emit
      event_name: AlertTriggered
      payload:
        alert_type: "$.payload.anomaly_type"
        severity: "$.payload.severity"
        message: "$.payload.metric + ' anomaly: ' + $.payload.current_value + ' vs baseline ' + $.payload.baseline_value"
        triggered_at: "$.payload.detected_at"
        service: "$.payload.metric"
    connections:
      - targetNodeId: terminal-alerted-zQ7r

  - id: terminal-alerted-zQ7r
    type: terminal
    label: "Alert Triggered"
    spec:
      outcome: success
      status: 200
      body:
        message: "Alert triggered"

  - id: terminal-log-xA1b
    type: terminal
    label: "Logged Only"
    spec:
      outcome: success
      status: 200
      body:
        message: "Anomaly logged, below alert threshold"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
