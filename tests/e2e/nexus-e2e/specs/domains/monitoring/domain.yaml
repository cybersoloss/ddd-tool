name: Monitoring
description: "Health and anomaly detection"
role: gateway

flows:
  - id: health-check
    name: "Health Check"
    description: "System health check across all services"
    type: traditional
    tags:
      - internal
    criticality: critical

  - id: detect-anomaly
    name: "Detect Anomaly"
    description: "Infrastructure-level anomaly detection with alerting"
    type: traditional
    tags:
      - internal
    criticality: high

publishes_events:
  - event: HealthStatus
    from_flow: health-check
    description: "System health status report"
    payload:
      status: string
      services: json
      checked_at: datetime

  - event: AlertTriggered
    from_flow: detect-anomaly
    description: "Infrastructure anomaly alert triggered"
    payload:
      alert_type: string
      metric: string
      threshold: number
      current_value: number

consumes_events: []

layout:
  flows:
    health-check: { x: 100, y: 100 }
    detect-anomaly: { x: 100, y: 300 }
  portals: {}
