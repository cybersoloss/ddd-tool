name: "Monitoring"
description: "System health monitoring gateway. Exposes a health-check endpoint aggregating all service statuses, detects anomalies from analytics events, and triggers alerts to the notifications domain."
role: gateway
auth:
  required: false

owns_schemas: []

depends_on:
  - domain: analytics
    reason: Consumes AnomalyDetected events to trigger system alerts
    flows_affected: [detect-anomaly]

flows:
  - id: health-check
    name: "Health Check"
    description: "Aggregates health status from all services (API, worker, DB, Redis, external integrations). Returns overall status and per-service breakdown."
    type: traditional
    tags: [public-api, internal]
    criticality: critical
    auth:
      required: false

  - id: detect-anomaly
    name: "Detect Anomaly"
    description: "Receives AnomalyDetected events from analytics and evaluates severity. Triggers AlertTriggered event for critical anomalies."
    type: traditional
    tags: [internal]
    criticality: critical

groups:
  - id: health
    name: "Health"
    flows: [health-check, detect-anomaly]

publishes_events:
  - event: AlertTriggered
    schema: AnalyticsEvent
    from_flow: detect-anomaly
    description: "Fired when a critical anomaly exceeds alert threshold — consumed by notifications"
    payload:
      alert_type: string
      severity: string
      message: string
      triggered_at: string
      service: string

consumes_events:
  - event: AnomalyDetected
    from_domain: analytics
    description: "Triggers severity evaluation and potential alert escalation"
    handled_by: detect-anomaly

layout:
  flows:
    health-check: { x: 100, y: 100 }
    detect-anomaly: { x: 100, y: 300 }
  portals: {}

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
