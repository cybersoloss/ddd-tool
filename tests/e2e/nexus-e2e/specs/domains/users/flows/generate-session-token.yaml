flow:
  id: generate-session-token
  name: "Generate Session Token"
  type: traditional
  domain: users
  description: "Generates an opaque session token for embedded widgets or webhook contexts. Stores in Redis with 24h TTL."
  auth:
    required: true
    strategy: jwt

trigger:
  id: trigger-gsSt2xN8
  type: trigger
  label: "POST /api/auth/session"
  spec:
    event: "HTTP POST /api/auth/session"
  connections:
    - targetNodeId: crypto-tok3nR6s

nodes:
  - id: crypto-tok3nR6s
    type: crypto
    label: "Generate Token"
    spec:
      operation: generate_token
      length: 32
      encoding: hex
      output: session_token
    connections:
      - targetNodeId: cache-setTok5
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: cache-setTok5
    type: cache
    label: "Store Session Token"
    spec:
      operation: set
      key: "session:$.session_token"
      store: redis
      ttl_ms: 86400000
      value:
        user_id: "$.auth.user_id"
        role: "$.auth.role"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Session Created"
    spec:
      outcome: success
      status: 201
      body:
        session_token: "$.session_token"
        expires_in: 86400

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
