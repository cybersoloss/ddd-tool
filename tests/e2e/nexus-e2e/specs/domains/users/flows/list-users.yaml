flow:
  id: list-users
  name: "List Users"
  type: traditional
  domain: users
  description: "Returns paginated user list with optional role and plan filters. Supports cursor-based pagination. Admin only."
  auth:
    required: true
    roles: [admin]
    strategy: jwt

trigger:
  id: trigger-lstU2xN8
  type: trigger
  label: "GET /api/users"
  spec:
    event: "HTTP GET /api/users"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Filters"
    spec:
      fields:
        - name: role
          type: string
          required: false
          enum: [admin, editor, reviewer, viewer]
        - name: plan
          type: string
          required: false
          enum: [free, pro, enterprise]
        - name: cursor
          type: string
          required: false
        - name: limit
          type: number
          required: false
          default: 25
    connections:
      - targetNodeId: data_store-rdUsers5
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdUsers5
    type: data_store
    label: "Query Users"
    spec:
      operation: read
      model: User
      query:
        where:
          role_id: "$.role"
          plan: "$.plan"
          deleted_at: null
        cursor: "$.cursor"
        limit: "$.limit"
        order_by:
          created_at: desc
      include:
        profile: true
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "User List"
    spec:
      outcome: success
      status: 200
      body: "$.result"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
