flow:
  id: register-user
  name: "Register User"
  type: traditional
  domain: users
  description: "Creates a new user account. Validates email uniqueness, hashes password with bcrypt, creates UserProfile, charges Stripe for paid plans, emits UserRegistered."
  auth:
    required: false

trigger:
  id: trigger-regU2xN8
  type: trigger
  label: "POST /api/auth/register"
  spec:
    event: "HTTP POST /api/auth/register"
    rate_limit:
      window_ms: 60000
      max_requests: 10
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Input"
    spec:
      fields:
        - name: email
          type: string
          required: true
          format: email
        - name: password
          type: string
          required: true
          min_length: 8
        - name: plan
          type: string
          required: false
          default: free
          enum: [free, pro, enterprise]
        - name: role
          type: string
          required: false
          default: viewer
    connections:
      - targetNodeId: data_store-chkEmail5
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-chkEmail5
    type: data_store
    label: "Check Email Unique"
    spec:
      operation: read
      model: User
      query:
        where:
          email: "$.email"
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-emailTaken3
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-emailTaken3
    type: decision
    label: "Email Taken?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: terminal-dup-xA1b
        sourceHandle: "true"
      - targetNodeId: crypto-hsh3nR6s
        sourceHandle: "false"

  - id: crypto-hsh3nR6s
    type: crypto
    label: "Hash Password"
    spec:
      operation: hash
      algorithm: bcrypt
      input: "$.password"
      output: password_hash
    connections:
      - targetNodeId: decision-paidPlan7
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-paidPlan7
    type: decision
    label: "Paid Plan?"
    spec:
      condition: "$.plan !== 'free'"
    connections:
      - targetNodeId: service_call-stripe9
        sourceHandle: "true"
      - targetNodeId: transaction-crtUser8
        sourceHandle: "false"

  - id: service_call-stripe9
    type: service_call
    label: "Create Stripe Customer"
    spec:
      method: POST
      integration: stripe
      url: "https://api.stripe.com/v1/customers"
      request_config:
        body:
          email: "$.email"
          metadata:
            plan: "$.plan"
      error_mapping:
        402: RATE_LIMITED
    connections:
      - targetNodeId: transaction-crtUser8
        sourceHandle: success
      - targetNodeId: terminal-stripe-err
        sourceHandle: error

  - id: transaction-crtUser8
    type: transaction
    label: "Create User + Profile"
    spec:
      steps:
        - action:
            type: data_store
            operation: create
            model: User
            data:
              email: "$.email"
              password_hash: "$.password_hash"
              plan: "$.plan"
              metadata:
                stripe_customer_id: "$.stripe_customer_id"
            returning: true
          rollback:
            type: data_store
            operation: delete
            model: User
            query:
              where:
                email: "$.email"
        - action:
            type: data_store
            operation: create
            model: UserProfile
            data:
              user_id: "$.created_user_id"
              display_name: "$.email"
            returning: true
          rollback:
            type: data_store
            operation: delete
            model: UserProfile
            query:
              where:
                user_id: "$.created_user_id"
    connections:
      - targetNodeId: event-emit-yF3g
        sourceHandle: committed
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: rolled_back

  - id: event-emit-yF3g
    type: event
    label: "Emit UserRegistered"
    spec:
      direction: emit
      event_name: UserRegistered
      payload:
        user_id: "$.created_user_id"
        email: "$.email"
        role: "$.role"
        plan: "$.plan"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Registered"
    spec:
      outcome: success
      status: 201
      body:
        user_id: "$.created_user_id"
        email: "$.email"
        plan: "$.plan"

  - id: terminal-dup-xA1b
    type: terminal
    label: "Email Taken"
    spec:
      outcome: error
      status: 409
      body:
        error: "DUPLICATE_ENTRY"
        message: "Email already registered"

  - id: terminal-stripe-err
    type: terminal
    label: "Stripe Error"
    spec:
      outcome: error
      status: 502
      body:
        error: "INTERNAL_ERROR"
        message: "Payment setup failed"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
