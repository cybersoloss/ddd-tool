flow:
  id: login-user
  name: "Login User"
  type: traditional
  domain: users
  description: "Authenticates email/password, verifies bcrypt hash, generates JWT access token and opaque refresh token. Rate-limited per IP."
  auth:
    required: false

trigger:
  id: trigger-logU2xN8
  type: trigger
  label: "POST /api/auth/login"
  spec:
    event: "HTTP POST /api/auth/login"
    rate_limit:
      window_ms: 900000
      max_requests: 20
      key_by: ip
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Credentials"
    spec:
      fields:
        - name: email
          type: string
          required: true
          format: email
        - name: password
          type: string
          required: true
    connections:
      - targetNodeId: data_store-rdUser5
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdUser5
    type: data_store
    label: "Fetch User"
    spec:
      operation: read
      model: User
      query:
        where:
          email: "$.email"
          deleted_at: null
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-userFound3
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-userFound3
    type: decision
    label: "User Found?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: crypto-verify7
        sourceHandle: "true"
      - targetNodeId: terminal-unauth-cD4e
        sourceHandle: "false"

  - id: crypto-verify7
    type: crypto
    label: "Verify Password"
    spec:
      operation: verify
      algorithm: bcrypt
      input: "$.password"
      against: "$.result.password_hash"
      output: password_valid
    connections:
      - targetNodeId: decision-pwdOk9
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-pwdOk9
    type: decision
    label: "Password Valid?"
    spec:
      condition: "$.password_valid === true"
    connections:
      - targetNodeId: crypto-jwt1
        sourceHandle: "true"
      - targetNodeId: terminal-unauth-cD4e
        sourceHandle: "false"

  - id: crypto-jwt1
    type: crypto
    label: "Generate JWT"
    spec:
      operation: sign
      algorithm: HS256
      key_source:
        env: JWT_SECRET
      payload:
        user_id: "$.result.id"
        email: "$.result.email"
        role: "$.result.role_id"
        plan: "$.result.plan"
      expires_in: "15m"
      output: access_token
    connections:
      - targetNodeId: crypto-refresh2
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: crypto-refresh2
    type: crypto
    label: "Generate Refresh Token"
    spec:
      operation: generate_token
      length: 32
      encoding: base64url
      output: refresh_token
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Login Success"
    spec:
      outcome: success
      status: 200
      body:
        access_token: "$.access_token"
        refresh_token: "$.refresh_token"
        expires_in: 900

  - id: terminal-unauth-cD4e
    type: terminal
    label: "Invalid Credentials"
    spec:
      outcome: error
      status: 401
      body:
        error: "INVALID_CREDENTIALS"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
