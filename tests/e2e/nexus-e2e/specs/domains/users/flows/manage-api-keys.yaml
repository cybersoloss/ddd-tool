flow:
  id: manage-api-keys
  name: "Manage API Keys"
  type: traditional
  domain: users
  description: "CRUD for API keys: create (hashes key, encrypts for storage), list active keys, and revoke. Supports scope and IP allowlist configuration."
  auth:
    required: true
    strategy: jwt

trigger:
  id: trigger-mApi2xN8
  type: trigger
  label: "POST /api/keys/:action"
  spec:
    event: "HTTP POST /api/keys/:action"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Input"
    spec:
      fields:
        - name: action
          type: string
          required: true
          enum: [create, list, revoke]
        - name: name
          type: string
          required: false
          min_length: 2
          max_length: 100
        - name: expires_at
          type: string
          required: false
          format: date
        - name: scopes
          type: array
          required: false
        - name: allowed_ips
          type: array
          required: false
        - name: key_id
          type: string
          required: false
          description: "Required for revoke action"
    connections:
      - targetNodeId: smart_router-rAct5kQ7
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: smart_router-rAct5kQ7
    type: smart_router
    label: "Route by Action"
    spec:
      rules:
        - id: list
          condition: "$.action === 'list'"
          route: data_store-list9wX2y
          priority: 1
        - id: create
          condition: "$.action === 'create'"
          route: crypto-genKey3
          priority: 2
        - id: revoke
          condition: "$.action === 'revoke'"
          route: data_store-del7kO3p
          priority: 3
      fallback_chain: [terminal-inv-aB7cD8eF]
    connections:
      - targetNodeId: data_store-list9wX2y
        sourceHandle: list
      - targetNodeId: crypto-genKey3
        sourceHandle: create
      - targetNodeId: data_store-del7kO3p
        sourceHandle: revoke

  - id: data_store-list9wX2y
    type: data_store
    label: "List API Keys"
    spec:
      operation: read
      model: ApiKey
      query:
        where:
          user_id: "$.auth.user_id"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: crypto-genKey3
    type: crypto
    label: "Generate Raw Key"
    spec:
      operation: generate_token
      length: 32
      encoding: base64url
      output: raw_key
    connections:
      - targetNodeId: crypto-hashKey6
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: crypto-hashKey6
    type: crypto
    label: "Hash Key for Storage"
    spec:
      operation: hash
      algorithm: sha256
      input: "$.raw_key"
      output: key_hash
    connections:
      - targetNodeId: data_store-crtKey8
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-crtKey8
    type: data_store
    label: "Store API Key"
    spec:
      operation: create
      model: ApiKey
      data:
        user_id: "$.auth.user_id"
        key_hash: "$.key_hash"
        name: "$.name"
        scopes: "$.scopes"
        allowed_ips: "$.allowed_ips"
        expires_at: "$.expires_at"
      returning: true
    connections:
      - targetNodeId: terminal-created-zQ7r
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: data_store-del7kO3p
    type: data_store
    label: "Revoke Key"
    spec:
      operation: delete
      model: ApiKey
      query:
        where:
          id: "$.key_id"
          user_id: "$.auth.user_id"
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Success"
    spec:
      outcome: success
      status: 200
      body: "$.result"

  - id: terminal-created-zQ7r
    type: terminal
    label: "Key Created"
    spec:
      outcome: success
      status: 201
      body:
        key: "$.raw_key"
        id: "$.result.id"
        name: "$.result.name"
        message: "Copy this key now — it will not be shown again"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
