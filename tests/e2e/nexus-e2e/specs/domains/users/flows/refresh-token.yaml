flow:
  id: refresh-token
  name: "Refresh Token"
  type: traditional
  domain: users
  description: "Validates an opaque refresh token from Redis, verifies it hasn't expired, and issues a new JWT access token with sliding expiry."
  auth:
    required: false

trigger:
  id: trigger-rfTk2xN8
  type: trigger
  label: "POST /api/auth/refresh"
  spec:
    event: "HTTP POST /api/auth/refresh"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Input"
    spec:
      fields:
        - name: refresh_token
          type: string
          required: true
    connections:
      - targetNodeId: cache-chkTok5
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: cache-chkTok5
    type: cache
    label: "Lookup Refresh Token"
    spec:
      operation: check
      key: "refresh:$.refresh_token"
      store: redis
    connections:
      - targetNodeId: crypto-jwt1
        sourceHandle: hit
      - targetNodeId: terminal-expired-cD4e
        sourceHandle: miss

  - id: crypto-jwt1
    type: crypto
    label: "Issue New JWT"
    spec:
      operation: sign
      algorithm: HS256
      key_source:
        env: JWT_SECRET
      payload:
        user_id: "$.cached_value.user_id"
        email: "$.cached_value.email"
        role: "$.cached_value.role"
        plan: "$.cached_value.plan"
      expires_in: "15m"
      output: access_token
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "New Access Token"
    spec:
      outcome: success
      status: 200
      body:
        access_token: "$.access_token"
        expires_in: 900

  - id: terminal-expired-cD4e
    type: terminal
    label: "Token Expired"
    spec:
      outcome: error
      status: 401
      body:
        error: "TOKEN_EXPIRED"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
