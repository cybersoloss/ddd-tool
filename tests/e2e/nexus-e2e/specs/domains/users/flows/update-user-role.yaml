flow:
  id: update-user-role
  name: "Update User Role"
  type: traditional
  domain: users
  description: "Admin-only endpoint to change a user's role with permission check"
  auth:
    required: true
    strategy: jwt
    roles:
      - admin

trigger:
  id: trigger-uR1a2B3c
  type: trigger
  position: { x: 250, y: 0 }
  spec:
    event: "http PATCH /api/v1/users/:id/role"
    label: "Update user role endpoint"

nodes:
  - id: input-vR4d5E6f
    type: input
    position: { x: 250, y: 130 }
    spec:
      validate:
        role:
          required: true
          type: string

  - id: decision-hP7g8H9i
    type: decision
    position: { x: 250, y: 260 }
    spec:
      condition: "$.auth.role == 'admin'"
      description: "Check if caller has admin permission"

  - id: terminal-fB1j2K3l
    type: terminal
    position: { x: 550, y: 260 }
    spec:
      status: 403
      label: "Insufficient permissions"
      error_code: FORBIDDEN

  - id: data_store-rU4m5N6o
    type: data_store
    position: { x: 250, y: 390 }
    spec:
      operation: read
      model: User
      query:
        where:
          id: "$.params.id"

  - id: data_store-uR7p8Q9r
    type: data_store
    position: { x: 250, y: 520 }
    spec:
      operation: update
      model: User
      query:
        where:
          id: "$.params.id"
      fields:
        - name: role_id
          value: "$.role"

  - id: event-rC1s2T3u
    type: event
    position: { x: 250, y: 650 }
    spec:
      direction: emit
      event_name: RoleChanged
      payload:
        user_id: "$.params.id"
        old_role: "$.user.role"
        new_role: "$.role"
        changed_by: "$.auth.user_id"

  - id: terminal-sR4v5W6x
    type: terminal
    position: { x: 250, y: 780 }
    spec:
      status: 200
      label: "Role updated successfully"

  - id: terminal-eV7y8Z9a
    type: terminal
    position: { x: 550, y: 130 }
    spec:
      status: 422
      label: "Invalid role data"
      error_code: VALIDATION_ERROR

  - id: terminal-eD1b2C3d
    type: terminal
    position: { x: 550, y: 520 }
    spec:
      status: 500
      label: "Data store error"
      error_code: DATA_STORE_ERROR

connections:
  - source: trigger-uR1a2B3c
    target: input-vR4d5E6f
    sourceHandle: ""
  - source: input-vR4d5E6f
    target: decision-hP7g8H9i
    sourceHandle: "valid"
  - source: input-vR4d5E6f
    target: terminal-eV7y8Z9a
    sourceHandle: "invalid"
  - source: decision-hP7g8H9i
    target: terminal-fB1j2K3l
    sourceHandle: "false"
  - source: decision-hP7g8H9i
    target: data_store-rU4m5N6o
    sourceHandle: "true"
  - source: data_store-rU4m5N6o
    target: data_store-uR7p8Q9r
    sourceHandle: "success"
  - source: data_store-rU4m5N6o
    target: terminal-eD1b2C3d
    sourceHandle: "error"
  - source: data_store-uR7p8Q9r
    target: event-rC1s2T3u
    sourceHandle: "success"
  - source: data_store-uR7p8Q9r
    target: terminal-eD1b2C3d
    sourceHandle: "error"
  - source: event-rC1s2T3u
    target: terminal-sR4v5W6x
    sourceHandle: "success"

metadata:
