flow:
  id: update-user-role
  name: "Update User Role"
  type: traditional
  domain: users
  description: "Changes a user's role assignment. Validates that admin cannot demote the last remaining admin in the system. Admin only."
  auth:
    required: true
    roles: [admin]
    strategy: jwt

trigger:
  id: trigger-updR2xN8
  type: trigger
  label: "PATCH /api/users/:id/role"
  spec:
    event: "HTTP PATCH /api/users/:id/role"
  connections:
    - targetNodeId: input-vAl3kP4r

nodes:
  - id: input-vAl3kP4r
    type: input
    label: "Validate Input"
    spec:
      fields:
        - name: id
          type: string
          required: true
          format: uuid
        - name: role
          type: string
          required: true
          enum: [admin, editor, reviewer, viewer]
    connections:
      - targetNodeId: data_store-rdUser5
        sourceHandle: valid
      - targetNodeId: terminal-inv-aB7cD8eF
        sourceHandle: invalid

  - id: data_store-rdUser5
    type: data_store
    label: "Fetch Target User"
    spec:
      operation: read
      model: User
      query:
        where:
          id: "$.id"
          deleted_at: null
      safety: strict
      returning: true
    connections:
      - targetNodeId: decision-nf8tV9w
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-nf8tV9w
    type: decision
    label: "User Found?"
    spec:
      condition: "$.result !== null"
    connections:
      - targetNodeId: decision-lastAdmin3
        sourceHandle: "true"
      - targetNodeId: terminal-notfound-cD4e
        sourceHandle: "false"

  - id: decision-lastAdmin3
    type: decision
    label: "Demoting Last Admin?"
    spec:
      condition: "$.result.role_id === 'admin' && $.role !== 'admin'"
    connections:
      - targetNodeId: data_store-cntAdmins7
        sourceHandle: "true"
      - targetNodeId: data_store-upd3nR6s
        sourceHandle: "false"

  - id: data_store-cntAdmins7
    type: data_store
    label: "Count Admins"
    spec:
      operation: aggregate
      model: User
      query:
        where:
          role_id: admin
          deleted_at: null
      aggregate_fields:
        - function: count
          field: id
          alias: admin_count
      returning: true
    connections:
      - targetNodeId: decision-onlyAdmin9
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: decision-onlyAdmin9
    type: decision
    label: "Last Admin?"
    spec:
      condition: "$.result.admin_count <= 1"
    connections:
      - targetNodeId: terminal-lastAdmin-xA1b
        sourceHandle: "true"
      - targetNodeId: data_store-upd3nR6s
        sourceHandle: "false"

  - id: data_store-upd3nR6s
    type: data_store
    label: "Update Role"
    spec:
      operation: update
      model: User
      query:
        where:
          id: "$.id"
      data:
        role_id: "$.role"
      returning: true
    connections:
      - targetNodeId: terminal-ok-zQ7rS8tU
        sourceHandle: success
      - targetNodeId: terminal-err-pSz2wV3b
        sourceHandle: error

  - id: terminal-ok-zQ7rS8tU
    type: terminal
    label: "Role Updated"
    spec:
      outcome: success
      status: 200
      body:
        user_id: "$.id"
        new_role: "$.role"

  - id: terminal-lastAdmin-xA1b
    type: terminal
    label: "Cannot Demote Last Admin"
    spec:
      outcome: error
      status: 422
      body:
        error: "VALIDATION_ERROR"
        message: "Cannot demote the last admin"

  - id: terminal-notfound-cD4e
    type: terminal
    label: "User Not Found"
    spec:
      outcome: error
      status: 404
      body:
        error: "USER_NOT_FOUND"

  - id: terminal-inv-aB7cD8eF
    type: terminal
    label: "Invalid"
    spec:
      outcome: error
      status: 400
      body:
        error: "VALIDATION_ERROR"

  - id: terminal-err-pSz2wV3b
    type: terminal
    label: "Error"
    spec:
      outcome: error
      status: 500
      body:
        error: "INTERNAL_ERROR"

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
