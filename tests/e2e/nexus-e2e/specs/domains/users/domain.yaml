name: Users
description: "Auth and user management"
role: entity

auth:
  required: true
  strategy: jwt

owns_schemas:
  - User
  - UserProfile
  - Role
  - ApiKey

flows:
  - id: register-user
    name: "Register User"
    description: "User registration with email validation and password hashing"
    type: traditional
    tags:
      - public-api

  - id: login-user
    name: "Login User"
    description: "User login with JWT issuance"
    type: traditional
    tags:
      - public-api

  - id: generate-session-token
    name: "Generate Session Token"
    description: "Generate a session token for authenticated user"
    type: traditional
    tags:
      - public-api

  - id: manage-api-keys
    name: "Manage API Keys"
    description: "CRUD operations for API keys"
    type: traditional
    tags:
      - public-api

  - id: update-user-role
    name: "Update User Role"
    description: "Change user role with permission check"
    type: traditional
    tags:
      - public-api

  - id: list-users
    name: "List Users"
    description: "List users with filters and pagination"
    type: traditional
    tags:
      - public-api

  - id: refresh-token
    name: "Refresh Token"
    description: "Refresh JWT using refresh token"
    type: traditional
    tags:
      - public-api

  - id: delete-user
    name: "Delete User"
    description: "Soft delete a user account"
    type: traditional
    tags:
      - public-api

publishes_events:
  - event: UserRegistered
    from_flow: register-user
    description: "New user registered"
    payload:
      user_id: uuid
      email: string
      plan: string

  - event: RoleChanged
    from_flow: update-user-role
    description: "User role changed"
    payload:
      user_id: uuid
      old_role: string
      new_role: string
      changed_by: uuid

consumes_events: []

layout:
  flows:
    register-user: { x: 100, y: 100 }
    login-user: { x: 100, y: 300 }
    generate-session-token: { x: 100, y: 500 }
    manage-api-keys: { x: 100, y: 700 }
    update-user-role: { x: 100, y: 900 }
    list-users: { x: 100, y: 1100 }
    refresh-token: { x: 100, y: 1300 }
    delete-user: { x: 100, y: 1500 }
  portals: {}
