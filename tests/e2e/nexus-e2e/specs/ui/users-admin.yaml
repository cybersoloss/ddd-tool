page: users-admin
title: Users
layout: full

sections:
  - id: users-header
    component: page-header
    title: User Management
    subtitle: "$.total_count users · $.active_count active"
    actions:
      buttons:
        - label: Invite User
          flow: users/register-user
          variant: primary
          icon: user-plus

  - id: user-filters
    component: filter-bar
    apply_flow: users/list-users
    reset_label: Clear
    fields:
      - key: role
        type: select
        label: Role
        options: [admin, editor, reviewer, viewer]
      - key: plan
        type: select
        label: Plan
        options: [free, pro, enterprise]

  - id: users-list
    component: item-list
    data_source: users/list-users
    item_template:
      title: "$.display_name || $.email"
      subtitle: "$.email · $.plan"
      badge: "$.role_name"
      timestamp: "$.created_at"
    item_actions:
      - label: Edit Role
        action:
          type: call_flow
          flow: users/update-user-role
      - label: View API Keys
        action:
          type: navigate
          path: "/settings/api-keys?user=$.id"
      - label: Delete
        action:
          type: call_flow
          flow: users/delete-user
        confirm: true
        confirm_message: "Delete this user account? This is a soft delete and can be reversed."
    empty_state:
      message: "No users found"
      icon: users
    interactions:
      - pattern: bulk-select
        description: Select multiple users for bulk role change
      - pattern: inline-edit
        update_flow: users/update-user-role
        fields: [role]
    pagination:
      limit: 25
      strategy: cursor

forms:
  - id: invite-form
    fields:
      - name: email
        type: text
        label: Email Address
        placeholder: user@example.com
        required: true
        validation:
          format: email
      - name: role
        type: select
        label: Role
        options: [admin, editor, reviewer, viewer]
        required: true
        default: viewer
      - name: plan
        type: select
        label: Plan
        options: [free, pro, enterprise]
        required: true
        default: free
      - name: access_expires
        type: date
        label: Access Expires (optional)
        required: false
    submit:
      flow: users/register-user
      label: Invite User
      loading_label: "Inviting..."
      success:
        message: "User invited successfully"
        redirect: /admin/users
      error:
        message: "Failed to invite user"
        retry: true

state:
  store: users-admin-store
  initial_fetch:
    - users/list-users

loading: skeleton
error: error-page
refresh: manual

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
