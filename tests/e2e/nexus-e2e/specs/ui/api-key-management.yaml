page: api-key-management
title: API Keys
layout: full

sections:
  - id: keys-header
    component: page-header
    title: API Keys
    subtitle: "$.active_count active keys"
    actions:
      buttons:
        - label: Create API Key
          flow: users/manage-api-keys
          variant: primary
          icon: plus

  - id: active-keys
    component: item-list
    data_source: users/manage-api-keys
    item_template:
      title: "$.name"
      subtitle: "Last used: $.last_used_at · Expires: $.expires_at"
      badge: "$.scopes.length + ' scopes'"
      timestamp: "$.created_at"
    item_actions:
      - label: Copy Key
        action:
          type: call_flow
          flow: users/manage-api-keys
        visible_when: "$.show_key === true"
      - label: Revoke
        action:
          type: call_flow
          flow: users/manage-api-keys
        confirm: true
        confirm_message: "Revoke this API key? All requests using it will fail immediately."
    empty_state:
      message: "No API keys created yet"
      icon: key
      cta:
        label: Create your first API key
        action:
          type: call_flow
          flow: users/manage-api-keys
    pagination:
      limit: 20

forms:
  - id: create-key-form
    fields:
      - name: name
        type: text
        label: Key Name
        placeholder: e.g. CI Pipeline, Mobile App
        required: true
        validation:
          min_length: 2
          max_length: 100
      - name: expires_at
        type: date
        label: Expiry Date (optional)
        required: false
      - name: scopes
        type: multi-select
        label: Allowed Scopes
        options:
          - "read:content"
          - "write:content"
          - "read:analytics"
          - "admin:users"
          - "admin:settings"
        required: false
      - name: allowed_ips
        type: tag-input
        label: IP Allowlist (optional)
        placeholder: 192.168.1.1 or 0.0.0.0/0 for all
        required: false
    submit:
      flow: users/manage-api-keys
      label: Generate Key
      loading_label: Generating...
      success:
        message: "API key created — copy it now, it won't be shown again"
        action: refresh
      error:
        message: "Failed to create API key"
        retry: true

state:
  store: api-keys-store
  initial_fetch:
    - users/manage-api-keys

loading: skeleton
error: toast
refresh: manual

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
