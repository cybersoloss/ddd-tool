page: dashboard
title: Dashboard
layout: sidebar

sections:
  - id: header
    component: page-header
    title: "Dashboard"
    subtitle: "Real-time pipeline health and ingestion overview"
    actions:
      buttons:
        - label: "Trigger Reprocess"
          flow: editorial/trigger-bulk-reprocess
          variant: secondary
          icon: refresh-cw

  - id: pipeline-stats
    component: stat-card
    data_source: analytics/query-analytics
    fields:
      - key: ingested_today
        value: "$.ingested_count"
        subtitle: "Ingested today"
        trend:
          value: "$.ingested_yesterday"
          direction: auto
          format: percent
      - key: processed_today
        value: "$.processed_count"
        subtitle: "Processed today"
        trend:
          value: "$.processed_yesterday"
          direction: auto
          format: delta
      - key: published_today
        value: "$.published_count"
        subtitle: "Published today"
        trend:
          value: "$.published_yesterday"
          direction: auto
          format: percent
      - key: queue_depth
        value: "$.queue_depth"
        subtitle: "Pending review"
        urgency:
          field: "$.queue_depth"
          rules:
            - threshold: 50
              level: warning
              color: "#f59e0b"
            - threshold: 100
              level: critical
              color: "#ef4444"
    empty_state:
      message: "No data yet — content will appear as it's ingested"
      icon: bar-chart-2

  - id: ingestion-chart
    component: chart
    chart_type: area
    data_source: analytics/query-analytics
    fields:
      series: "$.hourly_ingestion"
      labels: "$.hour_labels"
      values: "$.counts"
    description: Hourly ingestion rate over the last 24 hours
    empty_state:
      message: "No ingestion data yet"
      icon: trending-up

  - id: pipeline-health
    component: status-bar
    data_source: monitoring/health-check
    items:
      - label: API
        value: "$.services.api.status"
        color_when:
          - condition: "$.services.api.status === 'healthy'"
            color: "#22c55e"
          - condition: "$.services.api.status === 'degraded'"
            color: "#f59e0b"
          - condition: "$.services.api.status === 'down'"
            color: "#ef4444"
      - label: Worker
        value: "$.services.worker.status"
        color_when:
          - condition: "$.services.worker.status === 'healthy'"
            color: "#22c55e"
          - condition: "$.services.worker.status === 'down'"
            color: "#ef4444"
      - label: Database
        value: "$.services.postgres.status"
        color_when:
          - condition: "$.services.postgres.status === 'healthy'"
            color: "#22c55e"
          - condition: "$.services.postgres.status === 'down'"
            color: "#ef4444"
      - label: Cache
        value: "$.services.redis.status"
        color_when:
          - condition: "$.services.redis.status === 'healthy'"
            color: "#22c55e"
          - condition: "$.services.redis.status === 'down'"
            color: "#ef4444"

  - id: recent-alerts
    component: item-list
    data_source: analytics/query-analytics
    item_template:
      title: "$.alert_type"
      subtitle: "$.metric"
      badge: "$.severity"
      timestamp: "$.triggered_at"
    item_actions:
      - label: View Details
        action:
          type: navigate
          path: /analytics
    empty_state:
      message: "No active alerts — system is healthy"
      icon: check-circle
    virtual_scroll: false
    pagination:
      limit: 10

state:
  store: dashboard-store
  initial_fetch:
    - analytics/query-analytics
    - monitoring/health-check
  realtime:
    enabled: true
    subscription: ws/dashboard
    events: [metric_update]

realtime_behavior:
  on_new_item: prepend
  on_update: update_in_place
  highlight_duration_ms: 3000

loading: skeleton
error: retry-banner
refresh: auto-30s

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
