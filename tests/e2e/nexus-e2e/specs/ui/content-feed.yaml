page: content-feed
title: Content Feed
layout: full

sections:
  - id: filter-controls
    component: filter-bar
    apply_flow: content/list-content
    reset_label: Clear filters
    fields:
      - key: category
        type: search
        label: Category
        source: content/list-categories
      - key: status
        type: select
        label: Status
        options: [draft, review, approved, rejected, published, archived]
      - key: date_range
        type: date-range
        label: Created between
      - key: show_deleted
        type: toggle
        label: Show deleted

  - id: bulk-actions
    component: button-group
    buttons:
      - label: "Bulk Approve"
        flow: editorial/bulk-approve
        variant: primary
        icon: check
        visible_when: "$.selected_count > 0"
        confirm: true
        confirm_message: "Approve all selected content items?"
      - label: "Bulk Reject"
        flow: content/update-content
        variant: danger
        icon: x
        visible_when: "$.selected_count > 0"
        confirm: true
        confirm_message: "Reject all selected content items?"
      - label: "Import Content"
        flow: ingestion/import-csv-content
        variant: secondary
        icon: upload

  - id: content-list
    component: item-list
    data_source: content/list-content
    item_template:
      title: "$.title"
      subtitle: "$.source_type · $.category"
      badge: "$.status"
      timestamp: "$.created_at"
    item_actions:
      - label: View
        action:
          type: navigate
          path: "/content/$.id"
      - label: Quick Edit
        action:
          type: call_flow
          flow: content/update-content
      - label: Delete
        action:
          type: call_flow
          flow: content/delete-content
        confirm: true
        confirm_message: "Delete this content item? This can be undone."
    empty_state:
      message: "No content found"
      icon: file-text
      cta:
        label: Import content
        action:
          type: navigate
          path: /sources
    interactions:
      - pattern: bulk-select
        description: Select all or individual items for bulk operations
      - pattern: inline-edit
        update_flow: content/update-content
        fields: [title]
    pagination:
      limit: 20
      strategy: cursor

state:
  store: content-store
  initial_fetch:
    - content/list-content

loading: skeleton
error: toast
refresh: manual

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
