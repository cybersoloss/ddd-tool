page: general-settings
title: General Settings
layout: centered

sections:
  - id: settings-header
    component: page-header
    title: General Settings
    subtitle: Platform-wide configuration

  - id: settings-form-card
    component: detail-card
    data_source: settings/get-settings
    fields:
      - key: app_name
        value: "$.app_name"
        label: Application Name
      - key: quality_threshold
        value: "$.quality_threshold"
        label: Quality Threshold
      - key: brand_color
        value: "$.brand_color"
        label: Brand Color
    empty_state:
      message: "Settings not loaded"
      icon: settings

forms:
  - id: settings-form
    auto_save:
      debounce_ms: 1500
      flow: settings/update-settings
    fields:
      - name: app_name
        type: text
        label: Application Name
        placeholder: Nexus
        required: true
        validation:
          min_length: 1
          max_length: 100
      - name: support_email
        type: text
        label: Support Email
        placeholder: support@yourcompany.com
        required: false
        validation:
          format: email
      - name: rate_limit_per_minute
        type: number
        label: API Rate Limit (req/min)
        placeholder: 100
        required: false
        validation:
          min: 1
          max: 10000
      - name: max_batch_size
        type: number
        label: Max Batch Size
        placeholder: 100
        required: false
        validation:
          min: 1
          max: 1000
      - name: enable_ai_processing
        type: toggle
        label: Enable AI Processing
        default: true
      - name: enable_auto_publish
        type: toggle
        label: Enable Auto-Publish (high-quality content)
        default: false
      - name: timezone
        type: select
        label: Default Timezone
        options: ["UTC", "America/New_York", "America/Los_Angeles", "Europe/London", "Asia/Tokyo"]
        default: UTC
      - name: language
        type: select
        label: Interface Language
        options: [en, es, fr, de, ja]
        default: en
      - name: quality_threshold
        type: slider
        label: Auto-Approve Quality Threshold
        required: false
        min: 0
        max: 100
        default: 75
      - name: brand_color
        type: color
        label: Brand Color
        default: "#6366f1"
      - name: terms_of_service
        type: markdown
        label: Terms of Service
        required: false
        markdown_config:
          mode: toggle
          toolbar: false
          min_height: 200

state:
  store: settings-store
  initial_fetch:
    - settings/get-settings

loading: spinner
error: toast
refresh: manual

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
