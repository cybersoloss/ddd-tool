page: editorial-queue
title: Editorial Queue
layout: full

sections:
  - id: queue-header
    component: page-header
    title: "Editorial Queue"
    subtitle: "$.total_pending items pending review"
    breadcrumbs:
      - label: Editorial Queue
    actions:
      buttons:
        - label: Bulk Approve
          flow: editorial/bulk-approve
          variant: primary
          icon: check-check
          visible_when: "$.selected_count > 0"
          confirm: true
          confirm_message: "Approve all selected items? This cannot be undone."
        - label: Trigger Reprocess
          flow: editorial/trigger-bulk-reprocess
          variant: secondary
          icon: refresh-cw

  - id: filter-controls
    component: filter-bar
    apply_flow: editorial/list-editorial-queue
    reset_label: Clear filters
    fields:
      - key: reviewer
        type: search
        label: Reviewer
        source: users/list-users
      - key: priority
        type: select
        label: Priority
        options: [critical, high, normal, low]
      - key: submitted_after
        type: date-range
        label: Submitted after
      - key: unassigned_only
        type: toggle
        label: Unassigned only

  - id: queue-items
    component: item-list
    data_source: editorial/list-editorial-queue
    item_template:
      title: "$.title"
      subtitle: "$.category · Score: $.quality_score"
      badge: "$.priority"
      timestamp: "$.created_at"
    item_actions:
      - label: Review
        action:
          type: navigate
          path: "/editorial/review/$.id"
      - label: Assign
        action:
          type: call_flow
          flow: editorial/assign-reviewer
      - label: Quick Approve
        action:
          type: call_flow
          flow: editorial/quick-approve
        confirm: true
        confirm_message: "Quick-approve this item without full review?"
      - label: Escalate
        action:
          type: call_flow
          flow: editorial/escalate-to-senior
    empty_state:
      message: "Queue is empty — all caught up!"
      icon: check-circle
    interactions:
      - pattern: bulk-select
        description: Select multiple items for bulk approve/reject
      - pattern: reorder
        update_flow: editorial/assign-reviewer
        description: Drag to reprioritize review order
    pagination:
      limit: 25
      strategy: cursor

  - id: ai-assistant
    component: chat-interface
    data_source: processing/classify-content
    streaming_source: analytics/stream-sse-metrics
    message_roles:
      user: user
      assistant: assistant
    input_config:
      placeholder: "Ask AI about this content batch..."
      submit_flow: processing/classify-content
      submit_key: Enter
    typing_indicator: true
    message_template:
      content_field: "$.content"
      role_field: "$.role"
      timestamp_field: "$.created_at"
    empty_state:
      message: "Ask the AI assistant about the queue"
      icon: bot

state:
  store: editorial-store
  initial_fetch:
    - editorial/list-editorial-queue
  realtime:
    enabled: true
    subscription: ws/editorial
    events: [queue_updated, item_approved, item_rejected]

realtime_behavior:
  on_new_item: prepend
  on_update: update_in_place
  highlight_duration_ms: 2000

loading: skeleton
error: retry-banner
refresh: pull-to-refresh

keyboard_shortcuts:
  - keys: "Cmd+Shift+A"
    label: "Quick approve selected"
    action:
      type: call_flow
      flow: editorial/quick-approve

metadata:
  created: "2026-03-14T00:00:00Z"
  modified: "2026-03-14T00:00:00Z"
