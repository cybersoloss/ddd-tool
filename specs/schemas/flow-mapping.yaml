name: FlowMapping
description: >
  Implementation tracking record for a single flow or page.
  Stored in .ddd/mapping.yaml under flows.{domain}/{flow-id} or pages.{page-id}.

fields:
  - name: spec
    type: string
    required: true
    description: Relative path to the spec YAML file

  - name: specHash
    type: string
    required: true
    description: SHA-256 of the spec file at last sync

  - name: files
    type: string[]
    required: true
    description: Implementation source files that implement this flow

  - name: fileHashes
    type: json
    required: true
    description: Map of filePath → SHA-256 for each implementation file

  - name: implementedAt
    type: datetime
    required: true
    description: Timestamp of last implementation or sync

  - name: mode
    type: enum
    values: [new, update]
    required: false
    description: Whether this was first implementation or an update

  - name: syncState
    type: enum
    values: [synced, spec_ahead, code_ahead, diverged]
    required: false
    description: >
      The TypeScript SyncState type uses 'synced' (not 'in_sync') as the in-sync value.
      Mapping entries written by the app always contain 'synced'. Any external tool or
      YAML editor writing 'in_sync' will be overwritten to 'synced' on next load via
      implementation-store's updateMapping(). The detect-drift flow spec previously said
      'in_sync' — this is the canonical corrected vocabulary.

  - name: annotationCount
    type: number
    required: false
    default: 0

indexes:
  - fields: [spec]
    unique: true
    description: Each spec has exactly one mapping entry
