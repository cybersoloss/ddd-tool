name: flow-mapping
description: "Implementation tracking entry from .ddd/mapping.yaml — links a flow spec to its implementation files with hash-based drift detection"
fields:
  - name: spec
    type: string
    required: true
    description: "Relative path to the flow spec YAML file from project root"
  - name: spec_hash
    type: string
    required: true
    description: "SHA-256 hash (first 12 chars) of the spec file at implementation time"
  - name: files
    type: json
    required: true
    description: "Array of relative paths to implementation source files"
  - name: file_hashes
    type: json
    required: false
    description: "Map of file path to SHA-256 hash — used for reverse drift detection"
  - name: implemented_at
    type: datetime
    required: true
    description: "ISO 8601 timestamp of when the flow was last implemented"
  - name: mode
    type: enum
    required: true
    description: "Whether this was a fresh implementation or an update to existing code"
    values: [new, update]
  - name: sync_state
    type: enum
    required: false
    description: "Current synchronization state between spec and code"
    values: [synced, spec_ahead, code_ahead, diverged]
  - name: annotation_count
    type: number
    required: false
    description: "Number of implementation annotations captured for this flow"
indexes:
  - fields: [spec]
    unique: true
    description: "One mapping entry per spec file"
  - fields: [sync_state]
    unique: false
    description: "Filter flows by their sync state for drift reports"
  - fields: [implemented_at]
    unique: false
    description: "Sort flows by implementation recency"
