name: FlowDocument
description: >
  The persisted YAML structure for a single DDD flow spec file.
  Written to specs/domains/{domain}/flows/{flow-id}.yaml.

inherits: _base

fields:
  - name: flow.id
    type: string
    required: true
    description: Flow ID (kebab-case, matches filename)

  - name: flow.name
    type: string
    required: true
    description: Human-readable flow name

  - name: flow.type
    type: enum
    values: [traditional, agent]
    required: true
    description: Flow execution model

  - name: flow.domain
    type: string
    required: true
    description: Parent domain ID

  - name: flow.description
    type: string
    required: false

  - name: flow.auth
    type: json
    required: false
    description: Auth config — required, roles, strategy (jwt|api_key|none)

  - name: flow.emits
    type: string[]
    required: false
    description: Events emitted by this flow

  - name: flow.listens_to
    type: string[]
    required: false

  - name: trigger
    type: json
    required: true
    description: Trigger node (type=trigger, id, position, connections, spec)

  - name: nodes
    type: json[]
    required: true
    description: Array of DddFlowNode — all non-trigger nodes

  - name: metadata.created
    type: datetime
    required: true

  - name: metadata.modified
    type: datetime
    required: true

indexes:
  - fields: [flow.id, flow.domain]
    unique: true
    description: Each flow ID is unique within its domain
