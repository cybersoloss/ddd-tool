name: DomainConfig
description: >
  The persisted YAML structure for a domain spec file.
  Written to specs/domains/{domain}/domain.yaml.

fields:
  - name: name
    type: string
    required: true

  - name: description
    type: string
    required: false

  - name: role
    type: enum
    values: [entity, process, interface, orchestration]
    required: false

  - name: owns_schemas
    type: string[]
    required: false
    description: Schema names owned by this domain

  - name: stores
    type: json[]
    required: false
    description: Zustand store definitions for this domain

  - name: flows
    type: json[]
    required: true
    description: Array of DomainFlowEntry — flow registry for the domain

  - name: publishes_events
    type: json[]
    required: true
    description: Events published by this domain (EventWiring objects)

  - name: consumes_events
    type: json[]
    required: true
    description: Events consumed by this domain (EventWiring objects)

  - name: layout.flows
    type: json
    required: true
    description: Map of flowId → {x,y} canvas positions

  - name: layout.portals
    type: json
    required: true
    description: Map of portalId → {x,y} for cross-domain portal nodes
