name: ProjectConfig
description: >
  Root project configuration file.
  Written to {projectPath}/ddd-project.json.

fields:
  - name: name
    type: string
    required: true
    description: Project name (also directory name)

  - name: description
    type: string
    required: false

  - name: techStack
    type: json
    required: false
    description: Tech stack metadata set during project creation

  - name: domains
    type: json[]
    required: true
    description: Array of domain entries — {id?, name, description?, role?}

  - name: createdAt
    type: datetime
    required: false

indexes:
  - fields: [name]
    unique: true
