name: git-status
description: "Git repository state snapshot — current branch and categorized file changes from the working tree"
fields:
  - name: branch
    type: string
    required: true
    description: "Name of the currently checked-out branch"
  - name: staged
    type: json
    required: true
    description: "Array of staged file entries — each has path (string) and status (new|modified|deleted)"
  - name: unstaged
    type: json
    required: true
    description: "Array of unstaged file entries — each has path (string) and status (new|modified|deleted)"
  - name: untracked
    type: json
    required: true
    description: "Array of untracked file paths (strings) not yet added to git"
