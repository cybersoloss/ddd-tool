name: validation-result
description: "Output of the validation engine — aggregated issues for a specific scope and target with severity counts"
fields:
  - name: scope
    type: enum
    required: true
    description: "The level at which validation was performed"
    values: [flow, domain, system]
  - name: target_id
    type: string
    required: true
    description: "ID of the validated entity (flow ID, domain name, or 'system')"
  - name: issues
    type: json
    required: true
    description: "Array of ValidationIssue — each has id, scope, severity, category, message, suggestion?, nodeId?, flowId?, domainId?"
  - name: error_count
    type: number
    required: true
    description: "Number of issues with severity 'error'"
  - name: warning_count
    type: number
    required: true
    description: "Number of issues with severity 'warning'"
  - name: info_count
    type: number
    required: true
    description: "Number of issues with severity 'info'"
  - name: is_valid
    type: boolean
    required: true
    description: "Whether validation passed (true if zero errors)"
  - name: validated_at
    type: datetime
    required: true
    description: "ISO 8601 timestamp of when validation was run"
indexes:
  - fields: [scope, target_id]
    unique: true
    description: "One validation result per scope+target combination"
  - fields: [is_valid]
    unique: false
    description: "Quick filter for valid vs invalid entities"
