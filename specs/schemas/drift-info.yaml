name: drift-info
description: "Drift detection result — identifies when a flow spec or its implementation has changed since last sync"
fields:
  - name: flow_key
    type: string
    required: true
    description: "Domain-qualified flow key (e.g., 'auth/login')"
  - name: flow_name
    type: string
    required: true
    description: "Human-readable flow name"
  - name: domain_id
    type: string
    required: true
    description: "ID of the domain containing this flow"
  - name: spec_path
    type: string
    required: true
    description: "Relative path to the flow spec YAML file"
  - name: previous_hash
    type: string
    required: true
    description: "SHA-256 hash (first 12 chars) of the spec at last implementation"
  - name: current_hash
    type: string
    required: true
    description: "SHA-256 hash (first 12 chars) of the current spec file"
  - name: implemented_at
    type: datetime
    required: true
    description: "ISO 8601 timestamp of when the flow was last implemented"
  - name: detected_at
    type: datetime
    required: true
    description: "ISO 8601 timestamp of when drift was detected"
  - name: direction
    type: enum
    required: true
    description: "Direction of drift — forward means spec changed, reverse means code changed"
    values: [forward, reverse]
  - name: drift_type
    type: enum
    required: false
    description: "Classification of the kind of drift detected"
    values: [metadata, spec_enriched, code_ahead, new_logic]
indexes:
  - fields: [flow_key]
    unique: true
    description: "One drift entry per flow"
  - fields: [domain_id]
    unique: false
    description: "Find all drifted flows in a domain"
  - fields: [direction]
    unique: false
    description: "Filter by drift direction for reconciliation prioritization"
  - fields: [detected_at]
    unique: false
    description: "Sort drift entries by detection time"
