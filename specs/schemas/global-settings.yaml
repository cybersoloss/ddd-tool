name: GlobalSettings
description: >
  User-level settings persisted to ~/.ddd-tool/settings.json.
  Can be partially overridden per-project via {project}/.ddd/config.yaml.

fields:
  - name: claudeCode.enabled
    type: boolean
    required: true
    default: true

  - name: claudeCode.command
    type: string
    required: true
    default: claude
    description: Shell command to invoke Claude Code CLI

  - name: editor.gridSnap
    type: boolean
    required: true
    default: true

  - name: editor.autoSave
    type: boolean
    required: true
    default: false

  - name: editor.autoSaveInterval
    type: number
    required: true
    default: 30
    description: Auto-save interval in seconds

  - name: editor.theme
    type: enum
    values: [light, dark, system]
    required: true
    default: dark

  - name: editor.fontSize
    type: number
    required: true
    default: 14

  - name: editor.saveNotification
    type: boolean
    required: true
    default: true

  - name: git.autoCommitMessage
    type: string
    required: true
    default: "DDD: {action} in {flow_id}"

  - name: git.branchNaming
    type: string
    required: true
    default: "ddd/{flow_id}"

storage:
  settings_file: ~/.ddd-tool/settings.json
  recent_projects_file: ~/.ddd-tool/recent-projects.json
  merge_strategy: >
    On load, DEFAULT_SETTINGS is deep-merged with persisted JSON so new fields
    added between app versions always have a safe fallback. Missing keys fall back
    to DEFAULT_SETTINGS values; explicit persisted values override defaults.
  notes: >
    The ~/.ddd-tool/ directory is created on first run if it does not exist.
    Both files are read at boot in the load-settings flow.
