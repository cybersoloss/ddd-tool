name: Diagram
description: >
  A visual ideation diagram. Stored as YAML in specs/diagrams/.
  Each shape node can have its own recursive children tree (branches/subtopics)
  rendered in a chosen layout style (mind-map, org-chart, tree-chart, logic-chart).
  Children are properties of a shape — they live INSIDE the shape, not as separate
  canvas nodes. Shapes can also connect to other shapes via edges (independent wiring).

fields:
  - name: name
    type: string
    required: true
    description: Human-readable diagram name (renameable in UI)

  - name: description
    type: string
    required: false
    description: Multi-line description visible in sidebar and panel

  - name: tags
    type: string[]
    required: false
    description: Tags for filtering and searching across diagrams

  - name: nodes
    type: DiagramNode[]
    required: true
    description: >
      Top-level shape nodes (backward compat for single-sheet diagrams).
      When sheets[] is present, these are ignored — each sheet holds its own nodes.
      Each shape can independently have children (recursive tree) rendered in
      its chosen layout_type. Shapes can also connect to other shapes via edges.
    nested_fields:
      - name: id
        type: string
        required: true
      - name: label
        type: string
        required: true
      - name: shape
        type: string
        required: false
        description: "rectangle | rounded-rectangle | cylinder | diamond | circle | hexagon | cloud | person | document | folder | stack | custom"
      - name: position
        type: "{ x: number, y: number }"
        required: false
        description: Position on canvas
      - name: description
        type: string
        required: false
      - name: notes
        type: string
        required: false
        description: Extended text, multi-line
      - name: style
        type: object
        required: false
        description: "{ border_color, fill_color, fill_opacity, border_thickness, size, shadow }"
      - name: icon
        type: string
        required: false
        description: Lucide icon name
      - name: color_group
        type: string
        required: false
        description: >
          Color group identifier (e.g. "red", "blue", "yellow", "white").
          Sets the shape's border color and cascades to children branch lines.
      - name: layout_type
        type: string
        required: false
        description: >
          How this shape's children tree is rendered visually. Per-shape setting.
          mind-map — children radiate left/right from shape, curved connectors
          org-chart — children below shape, centered, vertical connectors
          tree-chart — children below-right with bracket connectors
          logic-chart — children in a vertical stack with bracket connectors;
            orientation (left or right of the shape) is controlled by the
            branch_orientation field (default right)
          Default: mind-map (when children exist)
      - name: branch_orientation
        type: string
        required: false
        description: >
          Direction children render relative to the shape, for logic-chart only.
          Values: left | right. Default: right.
          Ignored for mind-map (splits both sides), org-chart (children below),
          and tree-chart (no horizontal choice yet). Set via the side panel;
          mirrors the BranchTree side prop in the renderer.
      - name: children
        type: MindMapChild[]
        required: false
        description: >
          Recursive tree of branches/subtopics attached to this shape.
          Each child has a label and optional nested children.
          Tab/Enter on a selected shape adds a child. Backspace deletes.
          Arrow keys navigate. Children render visually per layout_type.
        nested_fields:
          - name: label
            type: string
            required: true
            description: Branch label text
          - name: children
            type: MindMapChild[]
            required: false
            description: Recursive sub-branches (same structure)
      - name: status
        type: string
        required: false
        description: "draft | active | deprecated"
      - name: link
        type: string
        required: false
        description: Cross-link to another diagram or DDD flow (diagrams/id or domains/flow-id)

  - name: edges
    type: DiagramEdge[]
    required: true
    description: >
      Top-level edges (backward compat for single-sheet diagrams).
      When sheets[] is present, these are ignored — each sheet holds its own edges.
      Connections between shape nodes — independent wiring between shapes (A→B).
      They do NOT define parent-child hierarchy — that's what the children
      property on each shape does.
    nested_fields:
      - name: id
        type: string
        required: true
      - name: from
        type: string
        required: true
        description: Source node ID
      - name: to
        type: string
        required: true
        description: Target node ID
      - name: direction
        type: string
        required: false
        description: "one-way | two-way | conditional"
      - name: style
        type: string
        required: false
        description: "solid | dashed | dotted"
      - name: labels
        type: string[]
        required: false
        description: One or more labels on the edge
      - name: weight
        type: string
        required: false
        description: "primary | secondary — affects visual thickness"
      - name: routing
        type: string
        required: false
        description: >
          Path geometry between endpoints. Values:
          straight     — direct A→B line, no bends
          orthogonal   — right-angle (step) segments, like a flowchart
          smoothstep   — rounded right-angle segments
          bezier       — curved smooth path
          Default: bezier (matches legacy behavior when omitted).
      - name: waypoints
        type: "Array<{ x: number, y: number }>"
        required: false
        description: >
          User-defined intermediate points the edge passes through, in canvas
          coordinates and in order from source to target. When present, the
          edge router visits each waypoint before reaching the target. Most
          meaningful with routing: straight or orthogonal (creating polylines);
          bezier and smoothstep also honor waypoints as control anchors.
          UX: double-click an edge to add a waypoint at the click position;
          drag a waypoint handle to move it; right-click a waypoint to delete.
          An edge with empty/absent waypoints uses pure geometric routing.

  - name: text_boxes
    type: TextBox[]
    required: false
    description: >
      Top-level text boxes (backward compat for single-sheet diagrams).
      When sheets[] is present, these are ignored — each sheet holds its own text_boxes.
    nested_fields:
      - name: id
        type: string
        required: true
      - name: position
        type: "{ x: number, y: number }"
        required: true
      - name: text
        type: string
        required: true
      - name: style
        type: object
        required: false
        description: "{ size: small|medium|large, border, background }"

  - name: sheets
    type: DiagramSheet[]
    required: false
    description: >
      Ordered list of sheets (pages/tabs) within the diagram. Each sheet has
      its own independent canvas with nodes, edges, and text boxes. When sheets[]
      is present, the top-level nodes/edges/text_boxes are ignored — all content
      lives inside sheets. When sheets[] is absent, the diagram has a single
      implicit sheet from the top-level nodes/edges/text_boxes (backward compat).
    nested_fields:
      - name: id
        type: string
        required: true
        description: Unique sheet identifier (nanoid)
      - name: name
        type: string
        required: true
        description: Sheet tab label (e.g. "Overview", "Detail", "Layer 2")
      - name: nodes
        type: DiagramNode[]
        required: true
        description: Shape nodes on this sheet's canvas
      - name: edges
        type: DiagramEdge[]
        required: true
        description: Connections between shapes on this sheet
      - name: text_boxes
        type: TextBox[]
        required: false
        description: Freeform text on this sheet's canvas

