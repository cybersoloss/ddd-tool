flow:
  id: edit-schema
  name: Edit Schema
  type: traditional
  domain: specs-sidebar
  description: User edits schema fields/indexes/relationships in SchemaEditor UI; persist changes to disk

trigger:
  id: trigger-editSchema
  type: trigger
  position: { x: 250, y: 0 }
  label: Edit Schema
  spec:
    event: "ui:schema-editor-change"
    description: User modifies a field, index, or relationship in SchemaEditor; debounced 500ms
  connections:
    - targetNodeId: process-updateStore

nodes:
  - id: process-updateStore
    type: process
    position: { x: 250, y: 130 }
    label: Update specs-store
    spec:
      action: Apply the field/index/relationship change to specs-store.schemas[modelName] in memory
    connections:
      - targetNodeId: ipc-writeSchemaYaml

  - id: ipc-writeSchemaYaml
    type: ipc_call
    position: { x: 250, y: 260 }
    label: Write schema YAML
    spec:
      command: write_file
      args:
        path: "{projectPath}/specs/schemas/{modelName}.yaml"
        contents: stringify(updatedSchema)
      description: markWriting() called first
    connections:
      - targetNodeId: terminal-success
        sourceHandle: success
      - targetNodeId: terminal-error
        sourceHandle: error

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 390 }
    label: Schema Saved
    spec:
      outcome: success
      status: 200
      body: { schemaName: "{{modelName}}" }

  - id: terminal-error
    type: terminal
    position: { x: 550, y: 260 }
    label: Save Error
    spec:
      outcome: error
      status: 500
      body: { error: FILE_WRITE_FAILED }

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
