flow:
  id: edit-ui-page
  name: Edit UI Page
  type: traditional
  domain: specs-sidebar
  description: User edits page spec sections/forms in UIPageEditor; persist changes to disk

trigger:
  id: trigger-editUiPage
  type: trigger
  position: { x: 250, y: 0 }
  label: Edit UI Page
  spec:
    event: "ui:page-editor-change"
    description: User modifies a section, form field, or data_source binding in UIPageEditor; debounced 500ms
  connections:
    - targetNodeId: process-updateStore

nodes:
  - id: process-updateStore
    type: process
    position: { x: 250, y: 130 }
    label: Update specs-store
    spec:
      action: Apply the section/form change to specs-store.uiPages[pageId] in memory
    connections:
      - targetNodeId: ipc-writePageYaml

  - id: ipc-writePageYaml
    type: ipc_call
    position: { x: 250, y: 260 }
    label: Write page YAML
    spec:
      command: write_file
      args:
        path: "{projectPath}/specs/ui/{pageId}.yaml"
        contents: stringify(updatedPage)
      description: markWriting() called first
    connections:
      - targetNodeId: terminal-success
        sourceHandle: success
      - targetNodeId: terminal-error
        sourceHandle: error

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 390 }
    label: Page Spec Saved
    spec:
      outcome: success
      status: 200
      body: { pageId: "{{pageId}}" }

  - id: terminal-error
    type: terminal
    position: { x: 550, y: 260 }
    label: Save Error
    spec:
      outcome: error
      status: 500
      body: { error: FILE_WRITE_FAILED }

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
