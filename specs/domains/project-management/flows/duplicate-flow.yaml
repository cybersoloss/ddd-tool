flow:
  id: duplicate-flow
  name: Duplicate Flow
  type: traditional
  domain: project-management
  description: Read flow, remap all node IDs to new unique IDs, write as new flow, add to domain

trigger:
  id: trigger-duplicateFlow
  type: trigger
  position: { x: 250, y: 0 }
  label: Duplicate Flow
  spec:
    event: "ui:duplicate-flow-button"
    description: User clicks duplicate on a flow block in domain map
  connections:
    - targetNodeId: ipc-readSourceFlow

nodes:
  - id: ipc-readSourceFlow
    type: ipc_call
    position: { x: 250, y: 130 }
    label: Read Source Flow YAML
    spec:
      command: read_file
      args:
        path: "{projectPath}/specs/domains/{domainId}/flows/{sourceFlowId}.yaml"
    connections:
      - targetNodeId: process-remapNodeIds
        sourceHandle: success
      - targetNodeId: terminal-error
        sourceHandle: error

  - id: process-remapNodeIds
    type: process
    position: { x: 250, y: 260 }
    label: Remap Node IDs
    spec:
      action: Generate new 8-char random IDs for every node; update all connection targetNodeId references; set new flow.id, flow.name (append " Copy"); update metadata timestamps
    connections:
      - targetNodeId: ipc-writeNewFlow

  - id: ipc-writeNewFlow
    type: ipc_call
    position: { x: 250, y: 390 }
    label: Write New flow.yaml
    spec:
      command: write_file
      args:
        path: "{projectPath}/specs/domains/{domainId}/flows/{newFlowId}.yaml"
        contents: stringify(newFlowDocument)
      description: markWriting() called first
    connections:
      - targetNodeId: process-updateDomainYaml
        sourceHandle: success
      - targetNodeId: terminal-error
        sourceHandle: error

  - id: process-updateDomainYaml
    type: process
    position: { x: 250, y: 520 }
    label: Update domain.yaml
    spec:
      action: Append new flow entry to domain.flows[], compute auto-position below last flow, write domain.yaml
    connections:
      - targetNodeId: process-recordHistory

  - id: process-recordHistory
    type: process
    position: { x: 250, y: 650 }
    label: Record Change History
    spec:
      action: change-history-store.recordSave({specFile, level:L3, domain, flow:newFlowId, action:created})
    connections:
      - targetNodeId: terminal-success

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 780 }
    label: Flow Duplicated
    spec:
      outcome: success
      status: 201
      body: { newFlowId: "{{newFlowId}}", domainId: "{{domainId}}" }

  - id: terminal-error
    type: terminal
    position: { x: 550, y: 390 }
    label: Duplicate Error
    spec:
      outcome: error
      status: 500
      body: { error: FILE_WRITE_FAILED }

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
