flow:
  id: rename-flow
  name: Rename Flow
  type: traditional
  domain: project-management
  description: Update flow name in domain.yaml flow entry and flow YAML metadata

trigger:
  id: trigger-renameFlow
  type: trigger
  position: { x: 250, y: 0 }
  label: Rename Flow
  spec:
    event: "ui:rename-flow-dialog"
    description: User submits RenameFlowDialog with new name
  connections:
    - targetNodeId: process-updateDomainYaml

nodes:
  - id: process-updateDomainYaml
    type: process
    position: { x: 250, y: 130 }
    label: Update domain.yaml
    spec:
      action: Update flow entry name in domain.flows[], write domain.yaml
    connections:
      - targetNodeId: ipc-updateFlowYaml

  - id: ipc-updateFlowYaml
    type: ipc_call
    position: { x: 250, y: 260 }
    label: Update flow.yaml Name
    spec:
      command: read_file
      args:
        path: "{projectPath}/specs/domains/{domainId}/flows/{flowId}.yaml"
      description: Read flow YAML, update flow.name field, write back with markWriting()
    connections:
      - targetNodeId: process-recordHistory
        sourceHandle: success
      - targetNodeId: terminal-error
        sourceHandle: error

  - id: process-recordHistory
    type: process
    position: { x: 250, y: 390 }
    label: Record Change History
    spec:
      action: change-history-store.recordSave({specFile, level:L3, domain, flow, action:updated})
    connections:
      - targetNodeId: terminal-success

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 520 }
    label: Flow Renamed
    spec:
      outcome: success
      status: 200
      body: { flowId: "{{flowId}}", newName: "{{newName}}" }

  - id: terminal-error
    type: terminal
    position: { x: 550, y: 390 }
    label: Update Error
    spec:
      outcome: error
      status: 500
      body: { error: FILE_WRITE_FAILED }

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
