flow:
  id: commit-changes
  name: "Commit Changes"
  type: traditional
  domain: git
  description: "Commits staged changes with a message"

trigger:
  id: trigger-qV2iB5eF
  type: trigger
  position: { x: 300, y: 0 }
  label: "Commit"
  spec:
    event: "ui:commit"
    description: "User clicks Commit in the Git panel"
  connections:
    - targetNodeId: input-rW3jC6fG

nodes:
  - id: input-rW3jC6fG
    type: input
    position: { x: 300, y: 130 }
    label: "Commit Message"
    spec:
      fields:
        - name: message
          type: string
          required: true
      validation: "Message must be non-empty"
    connections:
      - targetNodeId: ipc-sX4kD7gH
        sourceHandle: "valid"
      - targetNodeId: terminal-vA7nG1jK
        sourceHandle: "invalid"

  - id: ipc-sX4kD7gH
    type: ipc_call
    position: { x: 300, y: 260 }
    label: "Git Commit"
    spec:
      command: "git_commit"
      payload: "Commit message string"
    connections:
      - targetNodeId: process-tY5lE8hJ
        sourceHandle: "success"
      - targetNodeId: terminal-wB8pH2kL
        sourceHandle: "error"

  - id: process-tY5lE8hJ
    type: process
    position: { x: 300, y: 390 }
    label: "Refresh Status"
    spec:
      action: "Trigger refresh-status flow to update git-store after commit"
    connections:
      - targetNodeId: terminal-uZ6mF9iK

  - id: terminal-uZ6mF9iK
    type: terminal
    position: { x: 300, y: 520 }
    label: "Committed"
    spec:
      outcome: success
      description: "Changes committed and status refreshed"
    connections: []

  - id: terminal-vA7nG1jK
    type: terminal
    position: { x: 550, y: 260 }
    label: "Invalid Message"
    spec:
      outcome: failure
      description: "Commit message validation failed"
    connections: []

  - id: terminal-wB8pH2kL
    type: terminal
    position: { x: 550, y: 390 }
    label: "Commit Error"
    spec:
      outcome: failure
      description: "Git commit operation failed"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
