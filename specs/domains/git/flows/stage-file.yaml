flow:
  id: stage-file
  name: "Stage File"
  type: traditional
  domain: git
  description: "Stages a single file for the next commit"

trigger:
  id: trigger-fK1xQ3tU
  type: trigger
  position: { x: 300, y: 0 }
  label: "Stage File"
  spec:
    event: "ui:stage-file"
    description: "User clicks the stage button on an unstaged file entry"
  connections:
    - targetNodeId: ipc-gL2yR4uV

nodes:
  - id: ipc-gL2yR4uV
    type: ipc_call
    position: { x: 300, y: 130 }
    label: "Git Stage File"
    spec:
      command: "git_stage_file"
      payload: "File path relative to project root"
    connections:
      - targetNodeId: process-hM3zS5vW
        sourceHandle: "success"
      - targetNodeId: terminal-jP5bU7xY
        sourceHandle: "error"

  - id: process-hM3zS5vW
    type: process
    position: { x: 300, y: 260 }
    label: "Refresh Status"
    spec:
      action: "Trigger refresh-status flow to update git-store with new staging state"
    connections:
      - targetNodeId: terminal-iN4aT6wX

  - id: terminal-iN4aT6wX
    type: terminal
    position: { x: 300, y: 390 }
    label: "File Staged"
    spec:
      outcome: success
      description: "File moved to staged area and status refreshed"
    connections: []

  - id: terminal-jP5bU7xY
    type: terminal
    position: { x: 550, y: 260 }
    label: "Stage Error"
    spec:
      outcome: failure
      description: "Failed to stage file"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
