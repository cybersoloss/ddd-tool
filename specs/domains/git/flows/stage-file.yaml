flow:
  id: stage-file
  name: Stage File
  type: traditional
  domain: git
  description: Stage a specific file via Tauri IPC git_stage_file; refresh git status

trigger:
  id: trigger-stageFile
  type: trigger
  position: { x: 250, y: 0 }
  label: Stage File
  spec:
    event: "ui:stage-file-button"
    description: User clicks stage button on a file in git panel unstaged/untracked list
  connections:
    - targetNodeId: ipc-stageFile

nodes:
  - id: ipc-stageFile
    type: ipc_call
    position: { x: 250, y: 130 }
    label: Stage File
    spec:
      command: git_stage_file
      args:
        path: "{{projectPath}}"
        file: "{{filePath}}"
    connections:
      - targetNodeId: process-refreshStatus
        sourceHandle: success
      - targetNodeId: terminal-error
        sourceHandle: error

  - id: process-refreshStatus
    type: process
    position: { x: 250, y: 260 }
    label: Refresh Status
    spec:
      action: Trigger get-status flow to reload staged/unstaged lists
    connections:
      - targetNodeId: terminal-success

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 390 }
    label: File Staged
    spec:
      outcome: success
      status: 200
      body: { file: "{{filePath}}" }

  - id: terminal-error
    type: terminal
    position: { x: 550, y: 260 }
    label: Stage Error
    spec:
      outcome: error
      status: 500
      body: { error: GIT_STAGE_FAILED }

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
