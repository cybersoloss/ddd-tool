flow:
  id: view-log
  name: "View Log"
  type: traditional
  domain: git
  description: "Displays recent git commit history"

trigger:
  id: trigger-xC9qJ3lM
  type: trigger
  position: { x: 300, y: 0 }
  label: "View Log"
  spec:
    event: "ui:view-log"
    description: "User switches to History tab in the Git panel"
  connections:
    - targetNodeId: ipc-yD1rK4mN

nodes:
  - id: ipc-yD1rK4mN
    type: ipc_call
    position: { x: 300, y: 130 }
    label: "Git Log"
    spec:
      command: "git_log"
      payload: "Project root path, limit: 100"
    connections:
      - targetNodeId: terminal-zE2sL5nP
        sourceHandle: "success"
      - targetNodeId: terminal-aF3tM6pQ
        sourceHandle: "error"

  - id: terminal-zE2sL5nP
    type: terminal
    position: { x: 300, y: 260 }
    label: "Log Displayed"
    spec:
      outcome: success
      description: "Commit history loaded and displayed in Git panel"
    connections: []

  - id: terminal-aF3tM6pQ
    type: terminal
    position: { x: 550, y: 260 }
    label: "Log Error"
    spec:
      outcome: failure
      description: "Failed to read git log"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
