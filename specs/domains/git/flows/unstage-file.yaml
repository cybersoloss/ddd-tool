flow:
  id: unstage-file
  name: "Unstage File"
  type: traditional
  domain: git
  description: "Removes a file from the staging area"

trigger:
  id: trigger-kQ6cV8yZ
  type: trigger
  position: { x: 300, y: 0 }
  label: "Unstage File"
  spec:
    event: "ui:unstage-file"
    description: "User clicks the unstage button on a staged file entry"
  connections:
    - targetNodeId: ipc-lR7dW9zA

nodes:
  - id: ipc-lR7dW9zA
    type: ipc_call
    position: { x: 300, y: 130 }
    label: "Git Unstage File"
    spec:
      command: "git_unstage_file"
      payload: "File path relative to project root"
    connections:
      - targetNodeId: process-mS8eX1aB
        sourceHandle: "success"
      - targetNodeId: terminal-pU1hA4dE
        sourceHandle: "error"

  - id: process-mS8eX1aB
    type: process
    position: { x: 300, y: 260 }
    label: "Refresh Status"
    spec:
      action: "Trigger refresh-status flow to update git-store with new staging state"
    connections:
      - targetNodeId: terminal-nT9fY2bC

  - id: terminal-nT9fY2bC
    type: terminal
    position: { x: 300, y: 390 }
    label: "File Unstaged"
    spec:
      outcome: success
      description: "File removed from staging area and status refreshed"
    connections: []

  - id: terminal-pU1hA4dE
    type: terminal
    position: { x: 550, y: 260 }
    label: "Unstage Error"
    spec:
      outcome: failure
      description: "Failed to unstage file"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
