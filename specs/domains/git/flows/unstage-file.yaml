flow:
  id: unstage-file
  name: Unstage File
  type: traditional
  domain: git
  description: Unstage a specific file via Tauri IPC git_unstage_file; refresh git status

trigger:
  id: trigger-unstageFile
  type: trigger
  position: { x: 250, y: 0 }
  label: Unstage File
  spec:
    event: "ui:unstage-file-button"
    description: User clicks unstage button on a file in git panel staged list
  connections:
    - targetNodeId: ipc-unstageFile

nodes:
  - id: ipc-unstageFile
    type: ipc_call
    position: { x: 250, y: 130 }
    label: Unstage File
    spec:
      command: git_unstage_file
      args:
        path: "{{projectPath}}"
        file: "{{filePath}}"
    connections:
      - targetNodeId: process-refreshStatus
        sourceHandle: success
      - targetNodeId: terminal-error
        sourceHandle: error

  - id: process-refreshStatus
    type: process
    position: { x: 250, y: 260 }
    label: Refresh Status
    spec:
      action: Trigger get-status flow to reload staged/unstaged lists
    connections:
      - targetNodeId: terminal-success

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 390 }
    label: File Unstaged
    spec:
      outcome: success
      status: 200
      body: { file: "{{filePath}}" }

  - id: terminal-error
    type: terminal
    position: { x: 550, y: 260 }
    label: Unstage Error
    spec:
      outcome: error
      status: 500
      body: { error: GIT_UNSTAGE_FAILED }

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
