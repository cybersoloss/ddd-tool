flow:
  id: auto-layout
  name: "Auto Layout"
  type: traditional
  domain: spec-editing
  description: "Computes and applies DAG-based layout to flow nodes"

trigger:
  id: trigger-vZ9mE2hJ
  type: trigger
  position: { x: 300, y: 0 }
  label: "Auto Layout"
  spec:
    event: "ui:auto-layout"
    description: "User clicks the auto-layout button on the flow canvas toolbar"
  connections:
    - targetNodeId: process-wA1nF3iK

nodes:
  - id: process-wA1nF3iK
    type: process
    position: { x: 300, y: 130 }
    label: "Compute DAG Layout"
    spec:
      action: "Build directed acyclic graph from node connections, compute topological sort, assign vertical positions with 130px spacing, offset error terminals to the right"
    connections:
      - targetNodeId: process-xB2pG4jL

  - id: process-xB2pG4jL
    type: process
    position: { x: 300, y: 260 }
    label: "Apply Positions"
    spec:
      action: "Update node positions in flow-store, push undo snapshot before applying"
    connections:
      - targetNodeId: event-yC3qH5kM

  - id: event-yC3qH5kM
    type: event
    position: { x: 300, y: 390 }
    label: "Flow Saved"
    spec:
      event_name: "flow-saved"
      payload: "{ flowId, action: 'layout-applied' }"
    connections:
      - targetNodeId: terminal-zD4rJ6lN

  - id: terminal-zD4rJ6lN
    type: terminal
    position: { x: 300, y: 520 }
    label: "Layout Applied"
    spec:
      outcome: success
      description: "All nodes repositioned with DAG-based layout"
    connections: []

