flow:
  id: edit-schema
  name: "Edit Schema"
  type: traditional
  domain: spec-editing
  description: "Opens a schema YAML for editing in the left sidebar"

trigger:
  id: trigger-uW9lB2eF
  type: trigger
  position: { x: 300, y: 0 }
  label: "Edit Schema"
  spec:
    event: "ui:edit-schema"
    description: "User clicks a schema entry in the Project Specs sidebar Data tab"
  connections:
    - targetNodeId: ipc-vX1mC3fG

nodes:
  - id: ipc-vX1mC3fG
    type: ipc_call
    position: { x: 300, y: 130 }
    label: "Read Schema YAML"
    spec:
      command: "read_file"
      payload: "specs/schemas/{schemaId}.yaml"
    connections:
      - targetNodeId: process-wY2nD4gH
        sourceHandle: "success"
      - targetNodeId: terminal-yA4pF6jK
        sourceHandle: "error"

  - id: process-wY2nD4gH
    type: process
    position: { x: 300, y: 260 }
    label: "Parse Schema"
    spec:
      action: "Parse YAML to extract fields, relationships, indexes, transitions, seed data"
    connections:
      - targetNodeId: terminal-xZ3qE5hJ

  - id: terminal-xZ3qE5hJ
    type: terminal
    position: { x: 300, y: 390 }
    label: "Schema Editor Open"
    spec:
      outcome: success
      description: "SchemaEditor populated with parsed schema data"
    connections: []

  - id: terminal-yA4pF6jK
    type: terminal
    position: { x: 550, y: 260 }
    label: "Read Error"
    spec:
      outcome: failure
      description: "Failed to read schema YAML file"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
