flow:
  id: manage-directory
  name: "Manage Directory"
  type: traditional
  domain: persistence
  description: "Creates directories recursively"

trigger:
  id: trigger-vC9mJ3iK
  type: trigger
  position: { x: 300, y: 0 }
  label: "Create Directory"
  spec:
    event: "ipc:create_directory"
    description: "Tauri IPC command to create directories"
  connections:
    - targetNodeId: process-wD1nK4jL

nodes:
  - id: process-wD1nK4jL
    type: process
    position: { x: 300, y: 130 }
    label: "Create Dirs Recursively"
    spec:
      action: "Create all directories in path using std::fs::create_dir_all"
    connections:
      - targetNodeId: terminal-xE2pL5kM

  - id: terminal-xE2pL5kM
    type: terminal
    position: { x: 300, y: 260 }
    label: "Success"
    spec:
      outcome: success
      description: "Directory created (or already existed)"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
