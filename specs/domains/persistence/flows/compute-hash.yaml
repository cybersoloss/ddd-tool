flow:
  id: compute-hash
  name: "Compute Hash"
  type: traditional
  domain: persistence
  description: "Computes SHA-256 hash of a file for drift detection"

trigger:
  id: trigger-dL8vS2rT
  type: trigger
  position: { x: 300, y: 0 }
  label: "Compute Hash"
  spec:
    event: "ipc:compute_file_hash"
    description: "Tauri IPC command to compute SHA-256 hash of a file"
  connections:
    - targetNodeId: process-eM9wT3sU

nodes:
  - id: process-eM9wT3sU
    type: process
    position: { x: 300, y: 130 }
    label: "Read File"
    spec:
      action: "Read file bytes from disk at specified path"
    connections:
      - targetNodeId: process-fN1xU4tV

  - id: process-fN1xU4tV
    type: process
    position: { x: 300, y: 260 }
    label: "SHA-256 Digest"
    spec:
      action: "Compute SHA-256 hash of file bytes using sha2 crate, return hex string"
    connections:
      - targetNodeId: terminal-gP2yV5uW

  - id: terminal-gP2yV5uW
    type: terminal
    position: { x: 300, y: 390 }
    label: "Hex Hash"
    spec:
      outcome: success
      description: "SHA-256 hex digest string returned"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
