flow:
  id: write-file
  name: "Write File"
  type: traditional
  domain: persistence
  description: "Writes content to disk, creating parent directories if needed"

trigger:
  id: trigger-pW3gC6cD
  type: trigger
  position: { x: 300, y: 0 }
  label: "Write File"
  spec:
    event: "ipc:write_file"
    description: "Tauri IPC command to write content to a file"
  connections:
    - targetNodeId: process-qX4hD7dE

nodes:
  - id: process-qX4hD7dE
    type: process
    position: { x: 300, y: 130 }
    label: "Create Parent Dirs"
    spec:
      action: "Ensure parent directories exist using std::fs::create_dir_all"
    connections:
      - targetNodeId: process-rY5iE8eF

  - id: process-rY5iE8eF
    type: process
    position: { x: 300, y: 260 }
    label: "Write to Disk"
    spec:
      action: "Write content string to specified path using std::fs::write"
    connections:
      - targetNodeId: decision-sZ6jF9fG

  - id: decision-sZ6jF9fG
    type: decision
    position: { x: 300, y: 390 }
    label: "Write Success?"
    spec:
      condition: "File write completed without error"
    connections:
      - targetNodeId: terminal-tA7kG1gH
        sourceHandle: "true"
      - targetNodeId: terminal-uB8lH2hJ
        sourceHandle: "false"

  - id: terminal-tA7kG1gH
    type: terminal
    position: { x: 300, y: 520 }
    label: "Success"
    spec:
      outcome: success
      description: "File written to disk"
    connections: []

  - id: terminal-uB8lH2hJ
    type: terminal
    position: { x: 550, y: 520 }
    label: "Write Error"
    spec:
      outcome: failure
      description: "Failed to write file — permission denied or disk full"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
