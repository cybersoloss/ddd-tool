name: "File Persistence"
description: "Low-level file system operations via Tauri IPC commands — reading, writing, directory management, file watching, hashing, auto-save, crash recovery, and Mermaid export."
role: entity
flows:
  - id: read-file
    name: "Read File"
    description: "Reads file contents from disk via IPC"
  - id: write-file
    name: "Write File"
    description: "Writes content to disk, creating parent directories if needed"
  - id: manage-directory
    name: "Manage Directory"
    description: "Creates directories recursively"
  - id: watch-specs
    name: "Watch Specs"
    description: "Sets up a file watcher for YAML/JSON changes in the specs directory"
  - id: compute-hash
    name: "Compute Hash"
    description: "Computes SHA-256 hash of a file for drift detection"
  - id: auto-save
    name: "Auto Save"
    description: "Periodically saves the current flow to .ddd/autosave/"
  - id: crash-recovery
    name: "Crash Recovery"
    description: "Detects and restores unsaved work from autosave files on app boot"
  - id: export-mermaid
    name: "Export Mermaid"
    description: "Transforms a flow into Mermaid markdown and writes to file"
publishes_events:
  - event: spec-files-changed
    description: "Emitted by file watcher when YAML/JSON files change in specs/"
consumes_events: []
