name: "Design Validation"
description: "Validates flow graphs, domain configurations, and system-level wiring. Provides real-time node indicators (green/amber/red), validation panel with scope tabs, and implementation gate checks."
role: process
flows:
  - id: validate-flow
    name: "Validate Flow"
    description: "Runs all flow-scope validation rules on save — trigger, paths, orphans, branches, extended nodes, agent patterns"
  - id: validate-domain
    name: "Validate Domain"
    description: "Checks domain-level rules — duplicate flow IDs, event groups, schema references"
  - id: validate-system
    name: "Validate System"
    description: "Validates system-wide constraints — event wiring, portal targets, cross-pillar references"
  - id: check-implement-gate
    name: "Check Implement Gate"
    description: "Aggregates all validation results to determine if a flow is ready for implementation"
publishes_events: []
consumes_events:
  - event: flow-saved
    description: "Triggers re-validation when a flow is saved"
