flow:
  id: validate-system
  name: Validate System
  type: traditional
  domain: validation
  description: Run L1 system-level validation — cross-domain event consumers exist, all domains have flows

trigger:
  id: trigger-validateSystem
  type: trigger
  position: { x: 250, y: 0 }
  label: Validate System
  spec:
    event: "ipc:validate-system"
    description: Triggered after project load completes and when navigating to system map
  connections:
    - targetNodeId: process-runSystemRules

nodes:
  - id: process-runSystemRules
    type: process
    position: { x: 250, y: 130 }
    label: Run System Rules
    spec:
      action: >
        Apply L1 validation rules:
        - Each event in publishes_events has at least one consumer in another domain's consumes_events
        - Each event in consumes_events has a publisher in at least one other domain's publishes_events
        - All domains referenced in ddd-project.json have existing domain.yaml files
        - All domains have at least one flow
        - No circular event dependencies
        - system-layout.yaml position exists for all domains
    connections:
      - targetNodeId: process-updateStore

  - id: process-updateStore
    type: process
    position: { x: 250, y: 260 }
    label: Update validation-store
    spec:
      action: Set validation-store.systemIssues; update DomainBlock indicators on system map for domains with issues; update overall qualityScore
    connections:
      - targetNodeId: terminal-success

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 390 }
    label: System Validation Complete
    spec:
      outcome: success
      status: 200
      body: { issueCount: "{{systemIssues.length}}", qualityScore: "{{qualityScore}}" }

metadata:
  created: "2026-02-28T00:00:00.000Z"
