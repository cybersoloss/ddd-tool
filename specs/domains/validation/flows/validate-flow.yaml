flow:
  id: validate-flow
  name: Validate Flow
  type: traditional
  domain: validation
  description: Run L3 flow validation rules against current flow-store nodes and connections; emit per-node validation indicators

trigger:
  id: trigger-validateFlow
  type: trigger
  position: { x: 250, y: 0 }
  label: Validate Flow
  spec:
    event: "ipc:validate-flow"
    description: Debounced 500ms after any node/edge change in flow-store; also triggered on flow load
  connections:
    - targetNodeId: process-runFlowRules

nodes:
  - id: process-runFlowRules
    type: process
    position: { x: 250, y: 130 }
    label: Run Flow Rules
    spec:
      action: >
        Apply 12+ L3 validation rules:
        - Exactly one trigger node
        - All paths from trigger reach a terminal (no dead ends)
        - No orphaned nodes (all reachable from trigger)
        - input nodes have both valid/invalid connections
        - decision nodes have both true/false connections
        - data_store/service_call/ipc_call nodes have success/error connections
        - loop nodes have body/done connections
        - agent flows have agent_loop node
        - terminal nodes have outcome, status, body
        - input nodes have at least one field
        - data_store nodes have operation and model
        - No duplicate node IDs
    connections:
      - targetNodeId: process-emitNodeIndicators

  - id: process-emitNodeIndicators
    type: process
    position: { x: 250, y: 260 }
    label: Emit Node Indicators
    spec:
      action: For each node, set ValidationDot color (green=valid, amber=warning, red=error); update validation-store.flowIssues; update qualityScore; check implementGate threshold
    connections:
      - targetNodeId: terminal-success

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 390 }
    label: Validation Complete
    spec:
      outcome: success
      status: 200
      body: { issueCount: "{{flowIssues.length}}", gateOpen: "{{implementGateOpen}}" }

