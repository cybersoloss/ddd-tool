flow:
  id: validate-domain
  name: Validate Domain
  type: traditional
  domain: validation
  description: Run L2 domain-level validation rules — event wiring consistency, orphaned flows, duplicate IDs

trigger:
  id: trigger-validateDomain
  type: trigger
  position: { x: 250, y: 0 }
  label: Validate Domain
  spec:
    event: "ipc:validate-domain"
    description: Triggered when navigating to domain map or when domain config changes (add/delete/rename flow)
  connections:
    - targetNodeId: process-runDomainRules

nodes:
  - id: process-runDomainRules
    type: process
    position: { x: 250, y: 130 }
    label: Run Domain Rules
    spec:
      action: >
        Apply L2 validation rules:
        - All flows in domain.yaml have corresponding flow YAML files
        - No duplicate flow IDs within domain
        - All from_flow in publishes_events reference valid flow IDs
        - All handled_by_flow in consumes_events reference valid flow IDs
        - Domain has at least one flow
        - Event payload shapes are defined for published events
    connections:
      - targetNodeId: process-updateStore

  - id: process-updateStore
    type: process
    position: { x: 250, y: 260 }
    label: Update validation-store
    spec:
      action: Set validation-store.domainIssues; update FlowBlock indicators in domain map for flows with issues
    connections:
      - targetNodeId: terminal-success

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 390 }
    label: Domain Validation Complete
    spec:
      outcome: success
      status: 200
      body: { domainId: "{{domainId}}", issueCount: "{{domainIssues.length}}" }

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
