name: Diagrams
description: >
  Visual ideation canvas for mind maps, org charts, tree charts, and logic charts.
  Each shape node has its own recursive children tree rendered in a chosen layout
  style. Children are internal to a shape — Tab/Enter adds children, Arrow keys
  navigate, Backspace deletes. Shapes can also connect to other shapes via edges
  for independent wiring. Accessed via the Diagrams menu.
role: interface

owns_schemas:
  - Diagram

stores:
  - name: diagram-store
    shape:
      diagrams: "DiagramMeta[]"
      currentDiagram: "DiagramDocument | null"
      isDirty: boolean
      isSaving: boolean
    access_pattern: read_write

flows:
  - id: load-diagram-list
    name: Load Diagram List
    description: Scan specs/diagrams/*.yaml and populate sidebar with diagram names, descriptions, and tags
    type: traditional

  - id: load-diagram
    name: Load Diagram
    description: Load a single diagram YAML from disk, parse nodes/edges/text-boxes, set diagram-store
    type: traditional

  - id: save-diagram
    name: Save Diagram
    description: Serialize current diagram state to YAML and write to specs/diagrams/{id}.yaml
    type: traditional

  - id: create-diagram
    name: Create Diagram
    description: Create a new empty diagram with name and description
    type: traditional

  - id: delete-diagram
    name: Delete Diagram
    description: Delete a diagram YAML file and remove from sidebar list
    type: traditional

  - id: rename-diagram
    name: Rename Diagram
    description: Update diagram name and description metadata
    type: traditional

  - id: add-diagram-node
    name: Add Diagram Node
    description: Add a freeform shape node to the canvas at click position
    type: traditional

  - id: add-diagram-edge
    name: Add Diagram Edge
    description: Connect two shape nodes with a styled edge (independent wiring, NOT parent-child)
    type: traditional

  - id: add-text-box
    name: Add Text Box
    description: Place a freeform text box on the canvas (title, annotation, callout)
    type: traditional

  - id: update-diagram-node
    name: Update Diagram Node
    description: >
      Edit node properties — label, description, shape, color_group, layout_type,
      style, icon, status, link. Children are managed by manage-branches flow.
    type: traditional

  - id: manage-branches
    name: Manage Branches
    description: >
      Keyboard-driven branch tree editor for shape children. Each shape has its own
      recursive children tree rendered in the shape's layout_type style.
      Tab/Enter = add child, Arrow keys = navigate, Backspace = delete,
      Shift+Tab = outdent, double-click = edit label.
      The visual rendering adapts to layout_type: mind-map (radiate left/right),
      org-chart (below centered), tree-chart (below-right bracket),
      logic-chart (right vertical bracket).
    type: traditional

  - id: update-diagram-edge
    name: Update Diagram Edge
    description: Edit edge properties — direction, style, labels, weight
    type: traditional

publishes_events: []
consumes_events: []

layout:
  flows:
    load-diagram-list: { x: 100, y: 100 }
    load-diagram: { x: 100, y: 200 }
    save-diagram: { x: 100, y: 300 }
    create-diagram: { x: 300, y: 100 }
    delete-diagram: { x: 300, y: 200 }
    rename-diagram: { x: 300, y: 300 }
    add-diagram-node: { x: 500, y: 100 }
    add-diagram-edge: { x: 500, y: 200 }
    add-text-box: { x: 500, y: 300 }
    update-diagram-node: { x: 700, y: 100 }
    update-diagram-edge: { x: 700, y: 200 }
    manage-branches: { x: 700, y: 300 }
  portals: {}
