flow:
  id: resolve-drift
  name: Resolve Drift
  type: traditional
  domain: implementation
  description: User-triggered reconciliation — run full drift detection and write timestamped reconciliation report to .ddd/reconciliations/

trigger:
  id: trigger-resolveDrift
  type: trigger
  position: { x: 250, y: 0 }
  label: Resolve Drift
  spec:
    event: "ui:reconcile-button"
    description: User clicks Reconcile button in drift banner or FlowBlock context menu
  connections:
    - targetNodeId: process-runDriftDetection

nodes:
  - id: process-runDriftDetection
    type: process
    position: { x: 250, y: 130 }
    label: Run Drift Detection
    spec:
      action: Call detect-drift flow synchronously; collect full drift results with per-mapping details
    connections:
      - targetNodeId: process-buildReport

  - id: process-buildReport
    type: process
    position: { x: 250, y: 260 }
    label: Build Reconciliation Report
    spec:
      action: Build YAML report with timestamp, syncScore, per-flow drift results, in_sync/spec_ahead/code_ahead/diverged counts
    connections:
      - targetNodeId: ipc-writeReport

  - id: ipc-writeReport
    type: ipc_call
    position: { x: 250, y: 390 }
    label: Write Report
    spec:
      command: write_file
      args:
        path: "{projectPath}/.ddd/reconciliations/{timestamp}.yaml"
        contents: stringify(report)
    connections:
      - targetNodeId: terminal-success
        sourceHandle: success
      - targetNodeId: terminal-error
        sourceHandle: error

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 520 }
    label: Report Written
    spec:
      outcome: success
      status: 200
      body: { reportPath: "{{reportPath}}", syncScore: "{{syncScore}}" }

  - id: terminal-error
    type: terminal
    position: { x: 550, y: 390 }
    label: Write Error
    spec:
      outcome: error
      status: 500
      body: { error: FILE_WRITE_FAILED }

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
