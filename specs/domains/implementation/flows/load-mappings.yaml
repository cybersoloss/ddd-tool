flow:
  id: load-mappings
  name: Load Mappings
  type: traditional
  domain: implementation
  description: Read .ddd/mapping.yaml into implementation-store on project open

trigger:
  id: trigger-loadMappings
  type: trigger
  position: { x: 250, y: 0 }
  label: Load Mappings
  spec:
    event: "ipc:load-project"
    description: Called by project-store.loadProject() as part of project open sequence (non-blocking)
  connections:
    - targetNodeId: ipc-readMappingYaml

nodes:
  - id: ipc-readMappingYaml
    type: ipc_call
    position: { x: 250, y: 130 }
    label: Read mapping.yaml
    spec:
      command: read_file
      args: { path: "{projectPath}/.ddd/mapping.yaml" }
    connections:
      - targetNodeId: process-parseMappings
        sourceHandle: success
      - targetNodeId: process-initEmptyMappings
        sourceHandle: error
        label: no mapping.yaml yet

  - id: process-initEmptyMappings
    type: process
    position: { x: 550, y: 130 }
    label: Init Empty Mappings
    spec:
      action: Set implementation-store.mappings = {}; loading=false
    connections:
      - targetNodeId: terminal-success

  - id: process-parseMappings
    type: process
    position: { x: 250, y: 260 }
    label: Parse Mappings
    spec:
      action: Parse YAML; set implementation-store.mappings from flows and pages sections; loading=false
    connections:
      - targetNodeId: process-detectDrift

  - id: process-detectDrift
    type: process
    position: { x: 250, y: 390 }
    label: Trigger Drift Detection
    spec:
      action: Call detect-drift flow non-blocking to compute initial sync state
    connections:
      - targetNodeId: terminal-success

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 520 }
    label: Mappings Loaded
    spec:
      outcome: success
      status: 200
      body: { mappingCount: "{{mappings.length}}" }

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
