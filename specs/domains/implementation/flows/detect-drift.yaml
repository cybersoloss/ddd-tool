flow:
  id: detect-drift
  name: Detect Drift
  type: traditional
  domain: implementation
  description: Compute SHA-256 of current spec files and compare against stored specHash/fileHashes values; classify each mapping as synced, spec_ahead, code_ahead, or diverged using bidirectional hash comparison

trigger:
  id: trigger-detectDrift
  type: trigger
  position: { x: 250, y: 0 }
  label: Detect Drift
  spec:
    event: "ipc:detect-drift"
    description: Called after load-mappings and after flow:saved events
  connections:
    - targetNodeId: loop-checkMappings

nodes:
  - id: loop-checkMappings
    type: loop
    position: { x: 250, y: 130 }
    label: Check Each Mapping
    spec:
      collection: implementation-store.mappings
      iterator: mapping
      on_error: continue
      description: >
        For each mapping, performs bidirectional drift detection:
        (1) Forward hash: SHA-256 of spec file vs stored specHash (spec changed?).
        (2) Reverse hash: SHA-256 of each file in fileHashes vs stored values (code changed?).
        4-way classification:
          diverged   — both spec AND code changed (hasForwardDrift && hasReverseDrift)
          spec_ahead — only spec changed (hasForwardDrift only) → needs /ddd-implement
          code_ahead — only code changed (hasReverseDrift only) → needs /ddd-reflect
          synced     — neither changed (neither drift) → mapping syncState set to 'synced'
        Note: the SyncState type uses 'synced' (not 'in_sync'). Any mapping entry
        containing 'in_sync' will be overwritten to 'synced' on next updateMapping() call.
    connections:
      - targetNodeId: process-computeSyncScore
        sourceHandle: done
      - targetNodeId: loop-checkMappings
        sourceHandle: body

  - id: process-computeSyncScore
    type: process
    position: { x: 250, y: 260 }
    label: Compute Sync Score
    spec:
      action: Count in_sync vs drifted mappings; compute overall sync percentage; update implementation-store.syncScore and driftResults
    connections:
      - targetNodeId: terminal-success

  - id: terminal-success
    type: terminal
    position: { x: 250, y: 390 }
    label: Drift Detected
    spec:
      outcome: success
      status: 200
      body: { syncScore: "{{syncScore}}", driftCount: "{{driftResults.length}}" }

