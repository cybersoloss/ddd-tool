flow:
  id: clone-project
  name: "Clone Project"
  type: traditional
  domain: project
  description: "Clones a remote git repository and opens it as a DDD project"

trigger:
  id: trigger-bD7sE3iG
  type: trigger
  position: { x: 300, y: 0 }
  label: "Clone Project"
  spec:
    event: "ui:clone"
    description: "User clicks Clone in the launcher"
  connections:
    - targetNodeId: input-cE8tF4jH

nodes:
  - id: input-cE8tF4jH
    type: input
    position: { x: 300, y: 130 }
    label: "Clone Details"
    spec:
      fields:
        - name: url
          type: string
          required: true
        - name: path
          type: string
          required: true
      validation: "URL must be valid git remote; path must be writable"
    connections:
      - targetNodeId: ipc-dF9uG5kJ
        sourceHandle: "valid"
      - targetNodeId: terminal-gJ2xK8nM
        sourceHandle: "invalid"

  - id: ipc-dF9uG5kJ
    type: ipc_call
    position: { x: 300, y: 260 }
    label: "Git Clone"
    spec:
      command: "git_clone"
      payload: "{ url, path }"
    connections:
      - targetNodeId: process-eG1vH6lK
        sourceHandle: "success"
      - targetNodeId: terminal-hK3yL9pN
        sourceHandle: "error"

  - id: process-eG1vH6lK
    type: process
    position: { x: 300, y: 390 }
    label: "Open Project"
    spec:
      action: "Delegate to open-project flow with cloned path"
    connections:
      - targetNodeId: terminal-fH2wJ7mL

  - id: terminal-fH2wJ7mL
    type: terminal
    position: { x: 300, y: 520 }
    label: "Cloned"
    spec:
      outcome: success
      description: "Repository cloned and project opened"
    connections: []

  - id: terminal-gJ2xK8nM
    type: terminal
    position: { x: 550, y: 260 }
    label: "Invalid Input"
    spec:
      outcome: failure
      description: "URL or path validation failed"
    connections: []

  - id: terminal-hK3yL9pN
    type: terminal
    position: { x: 550, y: 390 }
    label: "Clone Failed"
    spec:
      outcome: failure
      description: "Git clone operation failed"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
