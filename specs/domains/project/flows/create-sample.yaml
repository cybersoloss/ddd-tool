flow:
  id: create-sample
  name: "Create Sample"
  type: traditional
  domain: project
  description: "Generates a sample project with demo data for first-time users"

trigger:
  id: trigger-wY7mA2dC
  type: trigger
  position: { x: 300, y: 0 }
  label: "Create Sample"
  spec:
    event: "ui:create-sample"
    description: "User clicks Create Sample Project in the launcher"
  connections:
    - targetNodeId: process-xZ8nB3eD

nodes:
  - id: process-xZ8nB3eD
    type: process
    position: { x: 300, y: 130 }
    label: "Generate Sample Data"
    spec:
      action: "Build sample project config with domains, flows, schemas, and demo nodes"
    connections:
      - targetNodeId: ipc-yA9pC4fE

  - id: ipc-yA9pC4fE
    type: ipc_call
    position: { x: 300, y: 260 }
    label: "Create Directory"
    spec:
      command: "create_directory"
      payload: "Sample project root and subdirectory tree"
    connections:
      - targetNodeId: ipc-zB1qD5gF
        sourceHandle: "success"
      - targetNodeId: terminal-bD3sF7jH
        sourceHandle: "error"

  - id: ipc-zB1qD5gF
    type: ipc_call
    position: { x: 300, y: 390 }
    label: "Write Sample Files"
    spec:
      command: "write_file"
      payload: "Multiple sample YAML and JSON files (project config, domains, flows, schemas)"
    connections:
      - targetNodeId: terminal-aC2rE6hG
        sourceHandle: "success"
      - targetNodeId: terminal-bD3sF7jH
        sourceHandle: "error"

  - id: terminal-aC2rE6hG
    type: terminal
    position: { x: 300, y: 520 }
    label: "Sample Created"
    spec:
      outcome: success
      description: "Sample project created with demo data"
    connections: []

  - id: terminal-bD3sF7jH
    type: terminal
    position: { x: 550, y: 390 }
    label: "Error"
    spec:
      outcome: failure
      description: "Failed to create sample project files"
    connections: []

