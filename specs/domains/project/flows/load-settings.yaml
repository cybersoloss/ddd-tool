flow:
  id: load-settings
  name: "Load Settings"
  type: traditional
  domain: project
  description: "Loads application settings from disk on app boot"

trigger:
  id: trigger-jL4zM1qP
  type: trigger
  position: { x: 300, y: 0 }
  label: "App Boot"
  spec:
    event: "ui:app-boot"
    description: "Application starts up"
  connections:
    - targetNodeId: ipc-kM5aN2rQ

nodes:
  - id: ipc-kM5aN2rQ
    type: ipc_call
    position: { x: 300, y: 130 }
    label: "Check Settings Exist"
    spec:
      command: "path_exists"
      payload: "Settings file path in app data directory"
    connections:
      - targetNodeId: decision-lN6bP3sR
        sourceHandle: "success"
      - targetNodeId: terminal-qS1gU8xW
        sourceHandle: "error"

  - id: decision-lN6bP3sR
    type: decision
    position: { x: 300, y: 260 }
    label: "Settings Exist?"
    spec:
      condition: "settingsFileExists === true"
    connections:
      - targetNodeId: ipc-mP7cQ4tS
        sourceHandle: "true"
      - targetNodeId: terminal-pR9fT7wV
        sourceHandle: "false"

  - id: ipc-mP7cQ4tS
    type: ipc_call
    position: { x: 300, y: 390 }
    label: "Read Settings File"
    spec:
      command: "read_file"
      payload: "Settings file path"
    connections:
      - targetNodeId: process-nQ8dR5uT
        sourceHandle: "success"
      - targetNodeId: terminal-qS1gU8xW
        sourceHandle: "error"

  - id: process-nQ8dR5uT
    type: process
    position: { x: 300, y: 520 }
    label: "Parse Settings"
    spec:
      action: "Parse JSON settings, merge with defaults for any missing keys"
    connections:
      - targetNodeId: terminal-pR9fT7wV

  - id: terminal-pR9fT7wV
    type: terminal
    position: { x: 300, y: 650 }
    label: "Settings Loaded"
    spec:
      outcome: success
      description: "Settings loaded from disk or defaults applied"
    connections: []

  - id: terminal-qS1gU8xW
    type: terminal
    position: { x: 550, y: 390 }
    label: "Read Error"
    spec:
      outcome: failure
      description: "Failed to read settings file from disk"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
