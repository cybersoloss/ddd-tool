name: "Project Management"
description: "Manages project lifecycle — creation, opening, cloning, settings, and sample generation. Owns the ddd-project.json config and project directory structure."
role: entity
flows:
  - id: create-project
    name: "Create Project"
    description: "Creates a new DDD project with directory structure, domain YAMLs, and optional git init"
  - id: open-project
    name: "Open Project"
    description: "Opens an existing DDD project by reading ddd-project.json and loading domain configs"
  - id: clone-project
    name: "Clone Project"
    description: "Clones a remote git repository and opens it as a DDD project"
  - id: load-settings
    name: "Load Settings"
    description: "Loads application settings from disk on app boot"
  - id: save-settings
    name: "Save Settings"
    description: "Persists application settings to disk"
  - id: create-sample
    name: "Create Sample"
    description: "Generates a sample project with demo data for first-time users"
publishes_events:
  - event: domain-saved
    description: "Emitted when a domain is created during project setup"
consumes_events: []
