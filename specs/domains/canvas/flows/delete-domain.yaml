flow:
  id: delete-domain
  name: "Delete Domain"
  type: traditional
  domain: canvas
  description: "Removes a domain and its directory after confirmation"

trigger:
  id: trigger-rU1iX4aZ
  type: trigger
  position: { x: 300, y: 0 }
  label: "Delete Domain"
  spec:
    event: "ui:delete-domain"
    description: "User clicks delete on a domain block"
  connections:
    - targetNodeId: decision-sV2jY5bA

nodes:
  - id: decision-sV2jY5bA
    type: decision
    position: { x: 300, y: 130 }
    label: "Confirm Delete?"
    spec:
      condition: "User confirms destructive action in confirmation dialog"
    connections:
      - targetNodeId: ipc-tW3kZ6cB
        sourceHandle: "true"
      - targetNodeId: terminal-xA7pD1gF
        sourceHandle: "false"

  - id: ipc-tW3kZ6cB
    type: ipc_call
    position: { x: 300, y: 260 }
    label: "Delete Directory"
    spec:
      command: "delete_directory"
      payload: "specs/domains/{domainId}/ (recursive)"
    connections:
      - targetNodeId: process-uX4lA7dC
        sourceHandle: "success"
      - targetNodeId: terminal-yB8qE2hG
        sourceHandle: "error"

  - id: process-uX4lA7dC
    type: process
    position: { x: 300, y: 390 }
    label: "Update ddd-project.json"
    spec:
      action: "Remove domain entry from project config domains array"
    connections:
      - targetNodeId: event-vY5mB8eD

  - id: event-vY5mB8eD
    type: event
    position: { x: 300, y: 520 }
    label: "Domain Saved"
    spec:
      event_name: "domain-saved"
      payload: "{ domainId, action: 'deleted' }"
    connections:
      - targetNodeId: terminal-wZ6nC9fE

  - id: terminal-wZ6nC9fE
    type: terminal
    position: { x: 300, y: 650 }
    label: "Domain Deleted"
    spec:
      outcome: success
      description: "Domain directory removed and project config updated"
    connections: []

  - id: terminal-xA7pD1gF
    type: terminal
    position: { x: 550, y: 260 }
    label: "Cancelled"
    spec:
      outcome: success
      description: "User cancelled domain deletion"
    connections: []

  - id: terminal-yB8qE2hG
    type: terminal
    position: { x: 550, y: 390 }
    label: "Delete Error"
    spec:
      outcome: failure
      description: "Failed to delete domain directory"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
