flow:
  id: view-system-map
  name: "View System Map"
  type: traditional
  domain: canvas
  description: "Renders the L1 system map with domain blocks, event arrows, and zone boundaries"

trigger:
  id: trigger-cE4tG8kJ
  type: trigger
  position: { x: 300, y: 0 }
  label: "Navigate to System"
  spec:
    event: "ui:navigate-system"
    description: "User navigates to system map via breadcrumb or project open"
  connections:
    - targetNodeId: process-dF5uH9lK

nodes:
  - id: process-dF5uH9lK
    type: process
    position: { x: 300, y: 130 }
    label: "Build System Map Data"
    spec:
      action: "Transform project domains into positioned DomainBlock nodes with flow count badges"
    connections:
      - targetNodeId: process-eG6vJ1mL

  - id: process-eG6vJ1mL
    type: process
    position: { x: 300, y: 260 }
    label: "Compute Event Arrows"
    spec:
      action: "Parse domain events (emits/listens) to create cross-domain arrow edges"
    connections:
      - targetNodeId: process-fH7wK2nM

  - id: process-fH7wK2nM
    type: process
    position: { x: 300, y: 390 }
    label: "Compute Zone Boundaries"
    spec:
      action: "Group domains by zone (if configured) and compute bounding rectangles"
    connections:
      - targetNodeId: terminal-gJ8xL3pN

  - id: terminal-gJ8xL3pN
    type: terminal
    position: { x: 300, y: 520 }
    label: "Render L1"
    spec:
      outcome: success
      description: "System map rendered with domain blocks, event arrows, and zones"
    connections: []

