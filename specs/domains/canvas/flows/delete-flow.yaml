flow:
  id: delete-flow
  name: "Delete Flow"
  type: traditional
  domain: canvas
  description: "Removes a flow file and updates domain config"

trigger:
  id: trigger-mQ4eT6wX
  type: trigger
  position: { x: 300, y: 0 }
  label: "Delete Flow"
  spec:
    event: "ui:delete-flow"
    description: "User clicks delete on a flow block"
  connections:
    - targetNodeId: decision-nR5fU7xY

nodes:
  - id: decision-nR5fU7xY
    type: decision
    position: { x: 300, y: 130 }
    label: "Confirm Delete?"
    spec:
      condition: "User confirms destructive action in confirmation dialog"
    connections:
      - targetNodeId: ipc-pS6gV8yZ
        sourceHandle: "true"
      - targetNodeId: terminal-tW1kZ3cD
        sourceHandle: "false"

  - id: ipc-pS6gV8yZ
    type: ipc_call
    position: { x: 300, y: 260 }
    label: "Delete Flow File"
    spec:
      command: "delete_file"
      payload: "specs/domains/{domainId}/flows/{flowId}.yaml"
    connections:
      - targetNodeId: process-qT7hW9zA
        sourceHandle: "success"
      - targetNodeId: terminal-uX2lA4dE
        sourceHandle: "error"

  - id: process-qT7hW9zA
    type: process
    position: { x: 300, y: 390 }
    label: "Update domain.yaml"
    spec:
      action: "Remove flow entry from domain config flows array"
    connections:
      - targetNodeId: event-rU8iX1aB

  - id: event-rU8iX1aB
    type: event
    position: { x: 300, y: 520 }
    label: "Flow Saved"
    spec:
      event_name: "flow-saved"
      payload: "{ domainId, flowId, action: 'deleted' }"
    connections:
      - targetNodeId: terminal-sV9jY2bC

  - id: terminal-sV9jY2bC
    type: terminal
    position: { x: 300, y: 650 }
    label: "Flow Deleted"
    spec:
      outcome: success
      description: "Flow YAML removed and domain config updated"
    connections: []

  - id: terminal-tW1kZ3cD
    type: terminal
    position: { x: 550, y: 260 }
    label: "Cancelled"
    spec:
      outcome: success
      description: "User cancelled flow deletion"
    connections: []

  - id: terminal-uX2lA4dE
    type: terminal
    position: { x: 550, y: 390 }
    label: "Delete Error"
    spec:
      outcome: failure
      description: "Failed to delete flow file"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
