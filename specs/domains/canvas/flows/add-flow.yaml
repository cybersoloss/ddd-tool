flow:
  id: add-flow
  name: "Add Flow"
  type: traditional
  domain: canvas
  description: "Creates a new flow within a domain"

trigger:
  id: trigger-dG4vK7mN
  type: trigger
  position: { x: 300, y: 0 }
  label: "Add Flow"
  spec:
    event: "ui:add-flow"
    description: "User clicks Add Flow on the domain map"
  connections:
    - targetNodeId: input-eH5wL8nP

nodes:
  - id: input-eH5wL8nP
    type: input
    position: { x: 300, y: 130 }
    label: "Flow Details"
    spec:
      fields:
        - name: name
          type: string
          required: true
        - name: description
          type: string
          required: false
        - name: type
          type: string
          required: true
        - name: template
          type: string
          required: false
      validation: "Name must be unique within domain; type must be traditional, agent, or orchestration"
    connections:
      - targetNodeId: process-fJ6xM9pQ
        sourceHandle: "valid"
      - targetNodeId: terminal-kN2cR4uV
        sourceHandle: "invalid"

  - id: process-fJ6xM9pQ
    type: process
    position: { x: 300, y: 260 }
    label: "Create Flow Document"
    spec:
      action: "Build flow YAML document with trigger, metadata, and optional template nodes"
    connections:
      - targetNodeId: ipc-gK7yN1qR

  - id: ipc-gK7yN1qR
    type: ipc_call
    position: { x: 300, y: 390 }
    label: "Write flow.yaml"
    spec:
      command: "write_file"
      payload: "Serialized flow YAML to specs/domains/{domainId}/flows/{flowId}.yaml"
    connections:
      - targetNodeId: process-hL8zP2rS
        sourceHandle: "success"
      - targetNodeId: terminal-lP3dS5vW
        sourceHandle: "error"

  - id: process-hL8zP2rS
    type: process
    position: { x: 300, y: 520 }
    label: "Update domain.yaml"
    spec:
      action: "Add flow entry to domain config flows array"
    connections:
      - targetNodeId: event-jM1bQ3tU

  - id: event-jM1bQ3tU
    type: event
    position: { x: 300, y: 650 }
    label: "Flow Saved"
    spec:
      event_name: "flow-saved"
      payload: "{ domainId, flowId, action: 'created' }"
    connections:
      - targetNodeId: terminal-iM9aP3sT

  - id: terminal-iM9aP3sT
    type: terminal
    position: { x: 300, y: 780 }
    label: "Flow Added"
    spec:
      outcome: success
      description: "Flow created with YAML file and domain config updated"
    connections: []

  - id: terminal-kN2cR4uV
    type: terminal
    position: { x: 550, y: 260 }
    label: "Invalid Input"
    spec:
      outcome: failure
      description: "Flow details validation failed"
    connections: []

  - id: terminal-lP3dS5vW
    type: terminal
    position: { x: 550, y: 520 }
    label: "Write Error"
    spec:
      outcome: failure
      description: "Failed to write flow YAML file"
    connections: []

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
