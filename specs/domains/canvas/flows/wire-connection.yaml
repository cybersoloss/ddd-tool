flow:
  id: wire-connection
  name: "Wire Connection"
  type: traditional
  domain: canvas
  description: "Creates an edge between two nodes on the flow canvas"

trigger:
  id: trigger-fG4xM6qR
  type: trigger
  position: { x: 300, y: 0 }
  label: "Connect Nodes"
  spec:
    event: "ui:connect-nodes"
    description: "User drags a connection from one node handle to another"
  connections:
    - targetNodeId: process-gH5yN7rS

nodes:
  - id: process-gH5yN7rS
    type: process
    position: { x: 300, y: 130 }
    label: "Validate Connection"
    spec:
      action: "Check sourceHandle matches source node type, verify target accepts incoming, prevent duplicate edges"
    connections:
      - targetNodeId: process-hJ6zP8sT

  - id: process-hJ6zP8sT
    type: process
    position: { x: 300, y: 260 }
    label: "Update Flow Connections"
    spec:
      action: "Add connection to source node's connections array with targetNodeId and sourceHandle"
    connections:
      - targetNodeId: event-iK7aQ9tU

  - id: event-iK7aQ9tU
    type: event
    position: { x: 300, y: 390 }
    label: "Flow Saved"
    spec:
      event_name: "flow-saved"
      payload: "{ flowId, action: 'connection-wired' }"
    connections:
      - targetNodeId: terminal-jL8bR1uV

  - id: terminal-jL8bR1uV
    type: terminal
    position: { x: 300, y: 520 }
    label: "Connection Wired"
    spec:
      outcome: success
      description: "Edge created between nodes and flow document updated"
    connections: []

