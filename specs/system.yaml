project: ddd-tool
name: DDD Tool
description: >
  Design Driven Development desktop app. Lets users design software visually
  using flow diagrams (YAML specs), then invoke Claude Code to implement those
  specs as real code.

tech_stack:
  frontend:
    language: TypeScript
    version: "5.8"
    framework: React
    framework_version: "19"
    bundler: Vite 7
    ui_library: Tailwind CSS 4 + Radix UI
    canvas: "@xyflow/react 12 (React Flow)"
    state: Zustand 5
    yaml_parser: js-yaml (yaml 2)
    id_generation: nanoid
  backend:
    language: Rust
    edition: "2021"
    framework: Tauri 2.0
    git_binding: git2 (libgit2)
    hashing: sha2 (SHA-256)
    file_watch: notify 7
    async_runtime: tokio
  storage:
    type: local-filesystem
    format: YAML (specs) + JSON (config)
    no_database: true
  deployment:
    type: desktop-app
    target: macOS / Windows / Linux (via Tauri)

environments:
  development:
    command: npm run tauri dev
    hot_reload: true
  production:
    command: npm run tauri build
    output: src-tauri/target/release/bundle

integrations:
  - name: Claude Code CLI
    purpose: Invoke /ddd-scaffold, /ddd-implement, /ddd-reverse, /ddd-sync etc.
    how: run_command IPC → shell subprocess
  - name: System Git
    purpose: Clone repositories (uses user auth config)
    how: git_clone IPC → system git binary
  - name: libgit2
    purpose: All other git operations (status, stage, commit, log)
    how: git2 Rust crate directly

