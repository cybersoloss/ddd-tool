project: ddd-tool

# No traditional .env file — this is a desktop app.
# Configuration is stored in ~/.ddd-tool/settings.json (global settings)
# and {projectPath}/.ddd/config.yaml (per-project overrides).

global_settings_path: "~/.ddd-tool/settings.json"
recent_projects_path: "~/.ddd-tool/recent-projects.json"
log_path: "~/.ddd-tool/logs/ddd-tool.log"

defaults:
  claude_code:
    enabled: true
    command: claude
  editor:
    grid_snap: true
    auto_save: false
    auto_save_interval_seconds: 30
    theme: dark
    font_size: 14
    save_notification: true
  git:
    auto_commit_message: "DDD: {action} in {flow_id}"
    branch_naming: "ddd/{flow_id}"

project_overrides:
  path: "{projectPath}/.ddd/config.yaml"
  mergeable_keys: [claudeCode, editor, git]

log_rotation:
  max_bytes_per_file: 10485760  # 10 MB
  max_files: 5

metadata:
  created: "2026-02-28T00:00:00.000Z"
  modified: "2026-02-28T00:00:00.000Z"
