errors:
  - code: FILE_NOT_FOUND
    message: "File not found"
    http_status: 404
    description: Requested file path does not exist

  - code: FILE_READ_FAILED
    message: "Failed to read file"
    http_status: 500
    description: OS-level failure reading file from disk

  - code: FILE_WRITE_FAILED
    message: "Failed to write file"
    http_status: 500
    description: OS-level failure writing file to disk

  - code: PROJECT_NOT_LOADED
    message: "No project loaded"
    http_status: 400
    description: An operation requiring a project was attempted with no project open

  - code: DOMAIN_NOT_FOUND
    message: "Domain not found"
    http_status: 404
    description: Referenced domain ID does not exist in domainConfigs

  - code: FLOW_NOT_FOUND
    message: "Flow not found"
    http_status: 404
    description: Referenced flow ID does not exist in domain

  - code: GIT_INIT_FAILED
    message: "Failed to init git repo"
    http_status: 500
    description: git2 Repository::init failed

  - code: GIT_CLONE_FAILED
    message: "Clone failed"
    http_status: 500
    description: System git clone returned non-zero exit code

  - code: GIT_STATUS_FAILED
    message: "Failed to get git status"
    http_status: 500
    description: git2 statuses() failed

  - code: GIT_COMMIT_FAILED
    message: "Failed to commit"
    http_status: 500
    description: git2 commit() failed (empty tree or other error)

  - code: HASH_COMPUTE_FAILED
    message: "Failed to compute file hash"
    http_status: 500
    description: SHA-256 computation failed (file unreadable)

  - code: COMMAND_EXEC_FAILED
    message: "Failed to execute command"
    http_status: 500
    description: run_command IPC failed to spawn subprocess

  - code: YAML_PARSE_FAILED
    message: "Failed to parse YAML"
    http_status: 500
    description: YAML content is malformed or incompatible with expected type

  - code: VALIDATION_ERRORS
    message: "Spec has validation errors"
    http_status: 422
    description: Flow or domain spec fails DDD validation rules

  - code: UNSAVED_CHANGES
    message: "Unsaved changes would be lost"
    http_status: 409
    description: Navigation attempted with dirty flow that has unsaved edits
