page: system-map
route: /project/system-map

sections:
  - id: canvas
    component: react-flow-canvas
    label: System Map Canvas (L1)
    description: >
      Infinite canvas showing all domains as DomainBlock nodes.
      Event arrows (EventArrow) drawn between domains that share events.
      Drag domains to reposition. Double-click to drill into Domain Map (L2).
    item_template:
      node_type: DomainBlock
      fields:
        - label: domain name
        - badge: flow count
        - badge: schema count
        - indicator: role (entity/process/interface/orchestration)
    item_actions:
      - label: Drill In
        action: navigate-to-domain-map
        trigger: double-click
      - label: Add Domain
        flow: project-management/add-domain
        trigger: toolbar-button
      - label: Delete Domain
        flow: project-management/delete-domain
        confirm: true
        confirm_message: Delete domain and all its flows?
      - label: Rename Domain
        flow: project-management/rename-domain
      - label: Auto Layout
        flow: canvas-views/auto-layout-domains
      - label: Add Event Wiring
        flow: canvas-views/add-event-wiring-dialog

  - id: breadcrumb
    component: breadcrumb
    position: top
    fields:
      level: L1
      project_name: "{{project.name}}"

  - id: toolbar
    component: button-group
    position: top-right
    buttons:
      - label: Add Domain
        flow: project-management/add-domain
      - label: Auto Layout
        flow: canvas-views/auto-layout-domains
      - label: Git
        navigate: /git-panel
      - label: Settings
        navigate: /settings

state:
  store: project-store
  initial_fetch: [project-management/load-project]
  local:
    showAddDomain: false
    showEventWiring: false

forms:
  - id: add-domain-dialog
    label: Add Domain
    position: modal
    fields:
      - name: name
        type: text
        label: Domain Name
        required: true
      - name: description
        type: textarea
        label: Description
        required: false
    submit:
      flow: project-management/add-domain
      label: Add Domain
      success:
        message: Domain added

  - id: event-wiring-dialog
    label: Add Event Wiring
    position: modal
    fields:
      - name: sourceDomainId
        type: select
        label: Source Domain
        options_source: project-store/domain-ids
        required: true
      - name: targetDomainId
        type: select
        label: Target Domain
        options_source: project-store/domain-ids
        required: true
      - name: eventName
        type: text
        label: Event Name
        required: true
      - name: fromFlow
        type: text
        label: From Flow ID
        required: false
      - name: handledByFlow
        type: text
        label: Handled By Flow ID
        required: false
    submit:
      flow: project-management/add-event-arrow
      label: Add Event Wiring
