page_id: system-map
name: System Map (L1)
description: Visual canvas showing all domains with event arrows and zone grouping
layout: full
auth_required: false

sections:
  - id: canvas
    type: canvas
    layout: full
    description: Full-screen draggable canvas with domain blocks, event arrows, and zone boundaries
    library: react-flow
    features:
      - pan-and-zoom
      - fit-view
      - minimap
      - grid-background
    node_types:
      - type: domain-block
        description: Rectangular block representing a domain
        displays: [name, description, role, flowCount]
        badge: flow-count
        actions:
          - double-click: navigateToDomain
          - context-menu: [editDomain, deleteDomain, moveDomain]
      - type: zone-boundary
        description: Dashed boundary grouping domains into logical zones
        displays: [zoneName]
        style: dashed-border
    edge_types:
      - type: event-arrow
        description: Arrow showing event flow between domains
        displays: [eventName]
        style: animated-dashed
        label_position: center
    interactions:
      - drag-domain: reposition domain block on canvas
      - double-click-domain: drill down to Domain Map (L2)
      - right-click-canvas: context menu with add domain
      - right-click-domain: context menu with edit/delete
      - select-domain: highlight and show in spec panel

  - id: toolbar
    type: toolbar
    layout: horizontal
    position: top-right
    elements:
      - type: button
        label: Add Domain
        icon: Plus
        action: openAddDomainDialog
        shortcut: D
      - type: button
        label: Auto Layout
        icon: LayoutGrid
        action: autoLayout
        shortcut: Cmd+L
      - type: button
        label: Reload
        icon: RefreshCw
        action: reloadProject
        shortcut: Cmd+R
      - type: separator
      - type: button
        label: Generate CLAUDE.md
        icon: FileText
        action: generateClaudeMd
        tooltip: Generate CLAUDE.md context file for the project
      - type: button
        label: Copy Implement Command
        icon: Copy
        action: copyImplementCommand
        tooltip: Copy /ddd-implement command to clipboard

forms:
  - id: add-domain-dialog
    type: single
    title: Add Domain
    presentation: dialog
    fields:
      - key: name
        label: Domain Name
        type: text
        required: true
        placeholder: e.g., auth, billing, notifications
        validation:
          pattern: "^[a-z][a-z0-9-]*$"
          message: Lowercase letters, numbers, and hyphens; must start with letter
      - key: description
        label: Description
        type: textarea
        required: false
        placeholder: What this domain is responsible for
      - key: role
        label: Role
        type: select
        options: [core, supporting, generic]
        default: core
    actions:
      submit:
        label: Add Domain
        action: addDomain
      cancel:
        label: Cancel
        action: closeDialog

  - id: event-wiring-dialog
    type: single
    title: Wire Event
    presentation: dialog
    fields:
      - key: eventName
        label: Event Name
        type: text
        required: true
        placeholder: e.g., user.created, order.completed
      - key: fromDomain
        label: From Domain
        type: select
        options_depends_on: project-store.domains
        required: true
      - key: toDomain
        label: To Domain
        type: select
        options_depends_on: project-store.domains
        required: true
    actions:
      submit:
        label: Wire Event
        action: wireEvent
      cancel:
        label: Cancel
        action: closeDialog

  - id: new-event-dialog
    type: single
    title: New Event
    presentation: dialog
    fields:
      - key: event
        label: Event Name
        type: text
        required: true
        placeholder: e.g., user.registered
      - key: payload
        label: Payload Schema
        type: code
        language: yaml
        required: false
        placeholder: |
          user_id: string
          email: string
    actions:
      submit:
        label: Create Event
        action: createEvent
      cancel:
        label: Cancel
        action: closeDialog

state:
  domains:
    source: project-store
    type: array
  selectedDomainId:
    type: string
    default: null
  canvasViewport:
    type: object
    default: { x: 0, y: 0, zoom: 1 }
  addDomainDialogOpen:
    type: boolean
    default: false
  eventWiringDialogOpen:
    type: boolean
    default: false
