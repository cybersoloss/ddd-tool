page_id: launcher
name: Project Launcher
description: Landing page to open, create, or clone projects
layout: centered
auth_required: false

sections:
  - id: hero
    type: content
    layout: centered
    elements:
      - type: icon
        icon: Layers
        size: 48
        color: primary
      - type: heading
        level: 1
        text: DDD Tool
      - type: paragraph
        text: Design Driven Development — visual flow-based software design
        muted: true

  - id: actions
    type: button-group
    layout: centered
    gap: 12
    elements:
      - type: button
        label: New Project
        variant: primary
        icon: Plus
        action: openNewProjectWizard
        shortcut: Cmd+N
      - type: button
        label: Open Existing
        variant: secondary
        icon: FolderOpen
        action: openFilePicker
        shortcut: Cmd+O
      - type: button
        label: Clone from Git
        variant: secondary
        icon: GitBranch
        action: openCloneDialog
      - type: button
        label: Settings
        variant: ghost
        icon: Settings
        action: openSettings

  - id: recent-projects
    type: list
    layout: vertical
    title: Recent Projects
    empty_state: No recent projects
    data_source: app-store.recentProjects
    item:
      type: recent-project-card
      fields:
        - key: name
          type: text
          weight: bold
        - key: path
          type: text
          muted: true
          truncate: true
        - key: lastOpenedAt
          type: relative-time
          muted: true
      actions:
        - id: open
          label: Open
          icon: FolderOpen
          action: openProject
          primary: true
        - id: remove
          label: Remove
          icon: X
          action: removeFromRecent
          confirm: false

forms:
  - id: new-project-wizard
    type: multi-step
    title: New Project
    presentation: dialog
    steps:
      - id: basics
        title: Project Basics
        fields:
          - key: name
            label: Project Name
            type: text
            required: true
            placeholder: my-awesome-project
            validation:
              pattern: "^[a-z0-9-]+$"
              message: Lowercase letters, numbers, and hyphens only
          - key: location
            label: Location
            type: directory-picker
            required: true
            default: "~/dev"
          - key: description
            label: Description
            type: textarea
            required: false
            placeholder: Brief project description
      - id: tech-stack
        title: Tech Stack
        fields:
          - key: language
            label: Language
            type: select
            options: [TypeScript, Python, Go, Rust, Java]
            default: TypeScript
          - key: framework
            label: Framework
            type: text
            placeholder: e.g., Express, FastAPI, Gin
          - key: database
            label: Database
            type: text
            placeholder: e.g., PostgreSQL, MongoDB
      - id: domains
        title: Initial Domains
        fields:
          - key: domains
            label: Domains
            type: repeating_group
            min: 1
            add_label: Add Domain
            fields:
              - key: name
                label: Name
                type: text
                required: true
              - key: description
                label: Description
                type: text
    actions:
      submit:
        label: Create Project
        action: createProject
      cancel:
        label: Cancel
        action: closeDialog

  - id: clone-dialog
    type: single
    title: Clone from Git
    presentation: dialog
    fields:
      - key: url
        label: Repository URL
        type: text
        required: true
        placeholder: https://github.com/user/repo.git
        validation:
          pattern: "^https?://.*\\.git$"
          message: Must be a valid git URL
      - key: destination
        label: Destination
        type: directory-picker
        required: true
        default: "~/dev"
    actions:
      submit:
        label: Clone
        action: cloneProject
      cancel:
        label: Cancel
        action: closeDialog

state:
  recentProjects:
    source: app-store
    type: array
  isLoading:
    type: boolean
    default: false
  wizardOpen:
    type: boolean
    default: false
  cloneDialogOpen:
    type: boolean
    default: false
