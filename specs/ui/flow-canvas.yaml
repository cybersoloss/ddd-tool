page: flow-canvas
route: /project/{domainId}/{flowId}

sections:
  - id: canvas
    component: react-flow-canvas
    label: Flow Canvas (L3)
    description: >
      Node graph editor for a single DDD flow. Trigger node at top, nodes below.
      Drag to add nodes from NodeToolbar. Click to select and edit in SpecPanel.
      Draw connections by dragging from source handle to target node.
      Supports all 29 DDD node types with proper source handles.
    item_template:
      node_type: DddFlowNode
      fields:
        - badge: node type
        - label: node label (inline editable)
        - indicator: validation dot (green/amber/red)
        - handle: output handles per node type
    item_actions:
      - label: Select Node
        action: show-spec-panel
        trigger: click
      - label: Delete Node
        action: delete-node
        trigger: Delete/Backspace key
      - label: Edit Label
        action: inline-edit-label
        trigger: double-click

  - id: node-toolbar
    component: draggable-toolbar
    position: left
    label: Node Palette
    description: Drag node type cards onto canvas to add nodes
    fields:
      node_types: [trigger, input, process, decision, terminal, data_store, service_call,
                   event, loop, parallel, sub_flow, llm_call, delay, cache, transform,
                   collection, parse, crypto, batch, transaction, ipc_call,
                   agent_loop, guardrail, human_gate, orchestrator, smart_router,
                   handoff, agent_group, websocket_broadcast]

  - id: spec-panel
    component: sidebar
    position: right
    label: Spec Panel
    description: >
      Editable spec panel for selected node. Shows type-specific spec editor.
      Also shows ConnectionEditor for editing edges between nodes.
    data_source: flow-editor/get-selected-node

  - id: stale-banner
    component: alert-banner
    position: top
    visible_when: flow.syncState === 'spec_ahead'
    description: "Spec has changed since last implementation. Run /ddd-implement to update."

  - id: breadcrumb
    component: breadcrumb
    position: top
    fields:
      level: L3
      domain_name: "{{domain.name}}"
      flow_name: "{{flow.name}}"
      flow_type: "{{flow.type}}"

  - id: flow-toolbar
    component: button-group
    position: top-right
    buttons:
      - label: Save
        flow: flow-editor/save-flow
        variant: primary
      - label: Auto Layout
        flow: flow-editor/auto-layout
      - label: Export Mermaid
        flow: flow-editor/export-mermaid
      - label: Flow Settings
        navigate: /flow-settings
      - label: Minimap Toggle
        action: toggle-minimap

  - id: minimap
    component: minimap
    position: bottom-right
    visible_when: ui.minimapVisible === true

  - id: bracket-overlay
    component: visual-overlay
    description: Dashed bracket boundaries for loop/parallel container nodes

state:
  store: flow-store
  local:
    selectedNodeId: null
    isDirty: false
    minimapVisible: true
  implementation:
    auto_save:
      strategy: timer
      interval_setting: editor.autoSaveInterval
      default_interval_s: 30
      path_pattern: "{projectPath}/.ddd/autosave/{flowId}.yaml"
      lifecycle: >
        startAutoSave() is called immediately after flow state is set in flow-store
        (as a side effect of loadFlow, not a separate user action). stopAutoSave()
        and cleanupAutoSave() are called when the user navigates away. The autosave
        path is distinct from the real spec path and is used for crash recovery.
    flush_on_navigate: >
      If a debounced save is pending when the user navigates away, performSave() is
      called immediately before clearing flow-store state. This ensures no unsaved
      changes are lost mid-500ms-debounce window when switching flows.

loading: skeleton
error: retry-banner
refresh: manual
