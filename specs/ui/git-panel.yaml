page: git-panel
route: /project/git

sections:
  - id: staged-files
    component: list
    label: Staged Changes
    data_source: git/get-status
    item_template:
      primary: path
      secondary: status
    item_actions:
      - label: Unstage
        flow: git/unstage-file
        args: { filePath: "{{item.path}}" }
    empty_state:
      message: No staged changes
      description: Stage files below to include in the commit

  - id: unstaged-files
    component: list
    label: Unstaged Changes
    data_source: git/get-status
    item_template:
      primary: path
      secondary: status
    item_actions:
      - label: Stage
        flow: git/stage-file
        args: { filePath: "{{item.path}}" }
    empty_state:
      message: No unstaged changes

  - id: untracked-files
    component: list
    label: Untracked Files
    data_source: git/get-status
    item_template:
      primary: path
    item_actions:
      - label: Stage
        flow: git/stage-file
        args: { filePath: "{{item.path}}" }
    empty_state:
      message: No untracked files

  - id: commit-history
    component: list
    label: Recent Commits
    data_source: git/get-log
    item_template:
      primary: message
      secondary: oid (first 8 chars)
      meta: timestamp (relative)
    empty_state:
      message: No commits yet

forms:
  - id: commit-form
    label: Commit
    position: inline
    fields:
      - name: message
        type: textarea
        label: Commit Message
        required: true
        placeholder: "Describe your changes"
    submit:
      flow: git/commit
      label: Commit
      loading_label: Committing...
      success:
        message: Committed successfully

state:
  initial_fetch: [git/get-status, git/get-log]
  local:
    polling: true
    poll_interval_ms: 10000
