page: domain-map
route: /project/{domainId}

sections:
  - id: canvas
    component: react-flow-canvas
    label: Domain Map Canvas (L2)
    description: >
      Per-domain canvas showing flow blocks and portal nodes.
      FlowBlock nodes display flow name, type badge (traditional/agent), and tag chips.
      PortalNode nodes represent cross-domain event wiring connections.
      Double-click a flow block to drill into Flow Canvas (L3).
    item_template:
      node_type: FlowBlock
      fields:
        - label: flow name
        - badge: flow type (traditional/agent)
        - chips: tags
        - indicator: drift status (stale banner if spec hash changed)
    item_actions:
      - label: Open Flow
        action: navigate-to-flow-canvas
        trigger: double-click
      - label: Add Flow
        flow: project-management/add-flow
        trigger: toolbar-button
      - label: Delete Flow
        flow: project-management/delete-flow
        confirm: true
      - label: Rename Flow
        flow: project-management/rename-flow
      - label: Duplicate Flow
        flow: project-management/duplicate-flow
      - label: Move Flow
        flow: project-management/move-flow
      - label: Change Flow Type
        flow: project-management/change-flow-type
      - label: Auto Layout
        flow: canvas-views/auto-layout-flows

  - id: breadcrumb
    component: breadcrumb
    position: top
    fields:
      level: L2
      project_name: "{{project.name}}"
      domain_name: "{{domain.name}}"

  - id: toolbar
    component: button-group
    position: top-right
    buttons:
      - label: Add Flow
        flow: project-management/add-flow
      - label: Auto Layout
        flow: canvas-views/auto-layout-flows

state:
  store: project-store
  local:
    showAddFlow: false
    showMoveFlow: false

forms:
  - id: add-flow-dialog
    label: Add Flow
    position: modal
    fields:
      - name: name
        type: text
        label: Flow Name
        required: true
      - name: description
        type: textarea
        label: Description
        required: false
      - name: flowType
        type: select
        label: Flow Type
        options: [traditional, agent]
        default: traditional
      - name: templateId
        type: select
        label: Template (optional)
        options_source: flow-templates/list
        required: false
    submit:
      flow: project-management/add-flow
      label: Add Flow
      success:
        message: Flow added

  - id: move-flow-dialog
    label: Move Flow to Domain
    position: modal
    fields:
      - name: targetDomainId
        type: select
        label: Target Domain
        options_source: project-store/domain-ids
        required: true
    submit:
      flow: project-management/move-flow
      label: Move Flow
