page_id: settings
name: Settings
description: Global and project settings dialog with scope toggle
layout: centered
auth_required: false

sections:
  - id: scope-toggle
    type: toggle-group
    layout: horizontal
    description: Switch between global settings (apply to all projects) and project-specific settings
    elements:
      - type: toggle
        id: global
        label: Global
        icon: Globe
        active_when: scope == global
        action: setScope(global)
      - type: toggle
        id: project
        label: Project
        icon: Folder
        active_when: scope == project
        action: setScope(project)
        disabled_when: noProjectOpen == true

forms:
  - id: editor-settings
    type: single
    title: Editor
    presentation: inline
    icon: Edit3
    fields:
      - key: autoSave
        label: Auto Save
        type: toggle
        default: true
        description: Automatically save changes to YAML files
      - key: autoSaveInterval
        label: Auto Save Interval
        type: number
        unit: seconds
        default: 30
        min: 5
        max: 300
        visible_when: autoSave == true
        description: How often to auto-save (in seconds)
      - key: gridSnap
        label: Snap to Grid
        type: toggle
        default: true
        description: Snap nodes to grid when dragging
      - key: theme
        label: Theme
        type: select
        options: [system, dark, light]
        default: system
        description: Application color theme
      - key: fontSize
        label: Font Size
        type: number
        unit: px
        default: 14
        min: 10
        max: 24
        description: Base font size for the editor
      - key: saveNotification
        label: Save Notification
        type: toggle
        default: true
        description: Show a brief notification when files are saved

  - id: claude-code-settings
    type: single
    title: Claude Code
    presentation: inline
    icon: Terminal
    fields:
      - key: enabled
        label: Enabled
        type: toggle
        default: false
        description: Enable Claude Code integration for AI-assisted implementation
      - key: commandPath
        label: Command Path
        type: text
        placeholder: claude
        default: claude
        visible_when: enabled == true
        description: Path to the Claude Code CLI binary

  - id: git-settings
    type: single
    title: Git
    presentation: inline
    icon: GitBranch
    fields:
      - key: commitTemplate
        label: Commit Message Template
        type: textarea
        placeholder: "feat: {description}"
        default: ""
        description: Template for commit messages. Use {description} as placeholder.
      - key: branchNaming
        label: Branch Naming Convention
        type: text
        placeholder: "feature/{flow-name}"
        default: ""
        description: Template for new branch names. Use {flow-name}, {domain-name} as placeholders.

state:
  scope:
    type: string
    enum: [global, project]
    default: global
  noProjectOpen:
    type: boolean
    computed: true
  settings:
    source: app-store.settings
    type: object
